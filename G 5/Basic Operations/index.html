<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Operations Paddle Game</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#e8f7ff;text-align:center;overflow:hidden}
.screen{position:fixed;inset:0;background:linear-gradient(#eaf9ff,#fff);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px}
.logo{width:160px;margin-bottom:18px}
button{border:0;border-radius:14px;background:#0066ff;color:white;font-size:20px;font-weight:bold;padding:13px 26px;cursor:pointer}
#hud{display:flex;justify-content:space-around;font-size:20px;font-weight:bold;padding:10px}
#question{width:92%;margin:5px auto;background:white;border:3px solid #004aad;border-radius:16px;padding:12px;font-size:22px;font-weight:bold}
#gameArea{position:relative;width:900px;max-width:96vw;height:500px;margin:8px auto;background:#fff6d5;border:5px solid #222;border-radius:16px;overflow:hidden}
.brick{position:absolute;width:220px;height:70px;background:white;border:4px solid #222;border-radius:14px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:21px;font-weight:bold;padding:6px}
#paddle{position:absolute;bottom:18px;width:150px;height:22px;background:#0066ff;border-radius:14px}
#ball{position:absolute;width:28px;height:28px;background:#ffbe0b;border:4px solid #222;border-radius:50%}
#msg{font-size:26px;font-weight:bold;min-height:35px}
#controls{display:flex;justify-content:center;gap:18px;margin-top:8px}
.ctrl{width:120px;height:50px;font-size:22px}
.instructions{font-size:21px;line-height:1.6;max-width:700px}
</style>
</head>

<body>

<div id="loader" class="screen">
  <img src="assets/logo.png" class="logo">
  <h2>Loading Game...</h2>
</div>

<div id="instructions" class="screen" style="display:none">
  <img src="assets/logo.png" class="logo">
  <h1>Basic Operations Paddle Game</h1>
  <div class="instructions">
    <p>Read the question.</p>
    <p>Move the paddle to hit the ball.</p>
    <p>Break the brick with the correct answer.</p>
    <p>Use arrow keys or touch buttons.</p>
    <p>You get only <b>2 chances</b>.</p>
  </div>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="end" class="screen" style="display:none">
  <img src="assets/logo.png" class="logo">
  <h1 id="endTitle">Game Over!</h1>
  <h2>Your Score: <span id="finalScore"></span></h2>
  <button onclick="location.reload()">Play Again</button>
</div>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Chances: <span id="chances">2</span></div>
  <div>Question: <span id="qno">1</span>/10</div>
</div>

<div id="question">Question will appear here.</div>

<div id="gameArea">
  <div id="paddle"></div>
  <div id="ball"></div>
</div>

<div id="msg"></div>

<div id="controls">
  <button class="ctrl" onclick="movePaddle(-45)">⬅ Left</button>
  <button class="ctrl" onclick="movePaddle(45)">Right ➡</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const questions=[
{q:"Add: 45,678 + 23,456",options:["69,134","68,134","69,034"],ans:"69,134"},
{q:"Subtract: 86,542 - 24,318",options:["62,224","61,224","62,124"],ans:"62,224"},
{q:"Multiply: 2,345 × 6",options:["14,070","13,070","14,700"],ans:"14,070"},
{q:"Divide: 78 ÷ 10. What is the quotient?",options:["7","8","78"],ans:"7"},
{q:"Divide: 78 ÷ 10. What is the remainder?",options:["7","8","0"],ans:"8"},
{q:"Divide: 409 ÷ 100. What is the quotient?",options:["4","40","9"],ans:"4"},
{q:"Divide: 409 ÷ 100. What is the remainder?",options:["9","09","409"],ans:"9"},
{q:"Divide: 8049 ÷ 1000. What is the quotient?",options:["8","80","49"],ans:"8"},
{q:"In addition, if the sum of a place is more than 9, we:",options:["carry over","borrow","divide"],ans:"carry over"},
{q:"In subtraction, when the top digit is smaller, we:",options:["borrow","carry over","multiply"],ans:"borrow"}
];

let current=0,score=0,chances=2;
let paddleX=370,ballX=430,ballY=410,dx=4,dy=-4;
let running=false,locked=false,gameLoop;
const area=document.getElementById("gameArea");
const paddle=document.getElementById("paddle");
const ball=document.getElementById("ball");

window.onload=()=>{
 setTimeout(()=>{
  document.getElementById("loader").style.display="none";
  document.getElementById("instructions").style.display="flex";
 },900);
};

function startGame(){
 document.getElementById("instructions").style.display="none";
 running=true;
 loadQuestion();
 gameLoop=setInterval(updateGame,20);
}

function loadQuestion(){
 locked=false;
 clearBricks();

 if(current>=questions.length){winGame();return;}

 document.getElementById("qno").textContent=current+1;
 document.getElementById("question").textContent="Q"+(current+1)+". "+questions[current].q;
 document.getElementById("msg").textContent="";

 createBricks();
 resetBall();
}

function createBricks(){
 const item=questions[current];
 const shuffled=[...item.options].sort(()=>Math.random()-0.5);
 const positions=[80,340,600];

 shuffled.forEach((opt,i)=>{
  const b=document.createElement("div");
  b.className="brick";
  b.textContent=opt;
  b.dataset.answer=opt;
  b.style.left=positions[i]+"px";
  b.style.top="45px";
  area.appendChild(b);
 });
}

function clearBricks(){
 document.querySelectorAll(".brick").forEach(b=>b.remove());
}

function resetBall(){
 paddleX=370;
 ballX=430;
 ballY=410;
 dx=4;
 dy=-4;
 paddle.style.left=paddleX+"px";
 ball.style.left=ballX+"px";
 ball.style.top=ballY+"px";
}

function movePaddle(step){
 paddleX+=step;
 if(paddleX<0)paddleX=0;
 if(paddleX>750)paddleX=750;
 paddle.style.left=paddleX+"px";
}

document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft")movePaddle(-45);
 if(e.key==="ArrowRight")movePaddle(45);
});

function updateGame(){
 if(!running || locked)return;

 ballX+=dx;
 ballY+=dy;

 if(ballX<=0 || ballX>=872)dx*=-1;
 if(ballY<=0)dy*=-1;

 const pr=paddle.getBoundingClientRect();
 const br=ball.getBoundingClientRect();

 if(!(br.right<pr.left || br.left>pr.right || br.bottom<pr.top || br.top>pr.bottom)){
  dy=-Math.abs(dy);
 }

 document.querySelectorAll(".brick").forEach(b=>{
  const r=b.getBoundingClientRect();
  if(!(br.right<r.left || br.left>r.right || br.bottom<r.top || br.top>r.bottom)){
   locked=true;
   checkAnswer(b.dataset.answer);
  }
 });

 if(ballY>500){
  wrong("Ball missed!");
 }
 
 ball.style.left=ballX+"px";
 ball.style.top=ballY+"px";
}

function checkAnswer(selected){
 if(selected===questions[current].ans){
  score++;
  document.getElementById("score").textContent=score;
  document.getElementById("correctSound").play();
  document.getElementById("msg").style.color="green";
  document.getElementById("msg").textContent="Correct!";
  current++;
  setTimeout(loadQuestion,900);
 }else{
  wrong("Wrong brick!");
 }
}

function wrong(text){
 locked=true;
 chances--;
 document.getElementById("chances").textContent=chances;
 document.getElementById("wrongSound").play();
 document.getElementById("msg").style.color="red";

 if(chances<=0){
  document.getElementById("msg").textContent="You Lose!";
  setTimeout(loseGame,900);
 }else{
  document.getElementById("msg").textContent=text+" One chance left.";
  setTimeout(loadQuestion,900);
 }
}

function winGame(){
 running=false;
 clearInterval(gameLoop);
 clearBricks();
 document.getElementById("clapSound").play();
 document.getElementById("endTitle").textContent="You Win!";
 document.getElementById("finalScore").textContent=score+" / "+questions.length;
 document.getElementById("end").style.display="flex";
}

function loseGame(){
 running=false;
 clearInterval(gameLoop);
 clearBricks();
 document.getElementById("endTitle").textContent="You Lose!";
 document.getElementById("finalScore").textContent=score+" / "+questions.length;
 document.getElementById("end").style.display="flex";
}
</script>

</body>
</html>
