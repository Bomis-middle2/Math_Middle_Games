<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Operations Maze Game</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#dff6ff;
  overflow:hidden;
}

.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(#eaf9ff,#fff);
  z-index:50;
  padding:20px;
}

.logo{
  width:160px;
  margin-bottom:16px;
}

button{
  border:0;
  border-radius:14px;
  background:#0066ff;
  color:white;
  font-size:20px;
  font-weight:bold;
  padding:12px 24px;
  cursor:pointer;
}

#game{
  width:100vw;
  height:100vh;
  position:relative;
  background:#dff6ff;
  overflow:hidden;
}

#hud{
  position:absolute;
  top:10px;
  left:15px;
  right:15px;
  display:flex;
  justify-content:space-between;
  font-size:19px;
  font-weight:bold;
  z-index:10;
}

#question{
  position:absolute;
  top:55px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  background:white;
  border:3px solid #004aad;
  border-radius:16px;
  padding:13px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
  z-index:10;
}

#maze{
  position:absolute;
  top:130px;
  left:50%;
  transform:translateX(-50%);
  width:900px;
  max-width:96vw;
  height:430px;
  background:#fff6d5;
  border:5px solid #333;
  border-radius:16px;
  overflow:hidden;
}

.wall{
  position:absolute;
  background:#333;
  border-radius:8px;
  z-index:3;
}

#player{
  position:absolute;
  width:42px;
  height:42px;
  border-radius:50%;
  background:#ffb703;
  border:4px solid #222;
  font-size:27px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:6;
}

.gate{
  position:absolute;
  width:170px;
  height:70px;
  background:white;
  border:4px solid #222;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  padding:6px;
  z-index:5;
}

#msg{
  position:absolute;
  top:105px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  border-radius:12px;
  padding:8px 22px;
  font-size:25px;
  font-weight:bold;
  display:none;
  z-index:20;
}

#controls{
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  display:grid;
  grid-template-columns:80px 80px 80px;
  gap:8px;
  z-index:30;
}

.ctrl{
  height:48px;
  border-radius:12px;
  font-size:22px;
  padding:0;
}

.blank{
  visibility:hidden;
}

.instructions{
  font-size:20px;
  line-height:1.55;
  max-width:700px;
}
</style>
</head>

<body>

<div id="loader" class="screen">
  <img src="assets/logo.png" class="logo">
  <h2>Loading Game...</h2>
</div>

<div id="instructions" class="screen" style="display:none">
  <img src="assets/logo.png" class="logo">

  <h1>Basic Operations Maze</h1>

  <div class="instructions">
    <p>Read the question carefully.</p>
    <p>Move through the maze without touching black blocks.</p>
    <p>Reach the correct answer gate.</p>
    <p>Use keyboard arrows or touch buttons.</p>
    <p>You get only <b>2 chances</b>.</p>
  </div>

  <button onclick="startGame()">Start Game</button>
</div>

<div id="game">

  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Chances: <span id="chances">2</span></div>
    <div>Question: <span id="qno">1</span>/10</div>
  </div>

  <div id="question"></div>
  <div id="msg"></div>

  <div id="maze">

    <div id="player">🙂</div>

    <!-- LEFT SIDE -->
    <div class="wall" style="left:140px;top:0;width:18px;height:145px"></div>
    <div class="wall" style="left:140px;top:245px;width:18px;height:185px"></div>

    <!-- MIDDLE -->
    <div class="wall" style="left:280px;top:90px;width:18px;height:140px"></div>

    <!-- FIXED CENTER OPENING -->
    <div class="wall" style="left:420px;top:250px;width:18px;height:180px"></div>

    <!-- RIGHT SIDE -->
    <div class="wall" style="left:560px;top:0;width:18px;height:160px"></div>

    <div class="wall" style="left:700px;top:0;width:18px;height:145px"></div>
    <div class="wall" style="left:700px;top:245px;width:18px;height:185px"></div>

    <!-- CONNECTORS -->
    <div class="wall" style="left:140px;top:145px;width:155px;height:18px"></div>

    <div class="wall" style="left:280px;top:320px;width:155px;height:18px"></div>

    <div class="wall" style="left:420px;top:145px;width:155px;height:18px"></div>

    <div class="wall" style="left:560px;top:320px;width:155px;height:18px"></div>

    <div id="gates"></div>

  </div>

  <div id="controls">
    <button class="ctrl blank"></button>
    <button class="ctrl" onclick="movePlayer(0,-20)">⬆</button>
    <button class="ctrl blank"></button>

    <button class="ctrl" onclick="movePlayer(-20,0)">⬅</button>
    <button class="ctrl" onclick="resetPlayer()">↺</button>
    <button class="ctrl" onclick="movePlayer(20,0)">➡</button>

    <button class="ctrl blank"></button>
    <button class="ctrl" onclick="movePlayer(0,20)">⬇</button>
    <button class="ctrl blank"></button>
  </div>

</div>

<div id="end" class="screen" style="display:none">
  <img src="assets/logo.png" class="logo">

  <h1 id="endTitle">Game Over!</h1>

  <h2>Your Score:
    <span id="finalScore"></span>
  </h2>

  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const questions = [

{
q:"Add: 45,678 + 23,456",
options:["69,134","68,134","69,034"],
ans:"69,134"
},

{
q:"Subtract: 86,542 - 24,318",
options:["62,224","61,224","62,124"],
ans:"62,224"
},

{
q:"Multiply: 2,345 × 6",
options:["14,070","13,070","14,700"],
ans:"14,070"
},

{
q:"Divide: 78 ÷ 10. What is the quotient?",
options:["7","8","78"],
ans:"7"
},

{
q:"Divide: 78 ÷ 10. What is the remainder?",
options:["7","8","0"],
ans:"8"
},

{
q:"Divide: 409 ÷ 100. What is the quotient?",
options:["4","40","9"],
ans:"4"
},

{
q:"Divide: 409 ÷ 100. What is the remainder?",
options:["9","09","409"],
ans:"9"
},

{
q:"Divide: 8049 ÷ 1000. What is the quotient?",
options:["8","80","49"],
ans:"8"
},

{
q:"In addition, if the sum of a place is more than 9, we:",
options:["carry over","borrow","divide"],
ans:"carry over"
},

{
q:"In subtraction, when the top digit is smaller, we:",
options:["borrow","carry over","multiply"],
ans:"borrow"
}

];

let current = 0;
let score = 0;
let chances = 2;

let px = 60;
let py = 360;

let locked = false;

const player = document.getElementById("player");

window.onload = () => {

setTimeout(() => {

document.getElementById("loader").style.display = "none";

document.getElementById("instructions").style.display = "flex";

},900);

};

function startGame(){

document.getElementById("instructions").style.display = "none";

loadQuestion();

}

function loadQuestion(){

locked = false;

if(current >= questions.length){

winGame();

return;

}

document.getElementById("qno").textContent = current + 1;

document.getElementById("question").textContent =
"Q" + (current+1) + ". " + questions[current].q;

resetPlayer();

createGates();

}

function createGates(){

const gates = document.getElementById("gates");

gates.innerHTML = "";

const pos = [60,180,300];

const shuffled = [...questions[current].options]
.sort(() => Math.random()-0.5);

shuffled.forEach((opt,i)=>{

const g = document.createElement("div");

g.className = "gate";

g.textContent = opt;

g.dataset.answer = opt;

g.style.left = "715px";

g.style.top = pos[i] + "px";

gates.appendChild(g);

});

}

function resetPlayer(){

px = 60;
py = 360;

player.style.left = px + "px";

player.style.top = py + "px";

}

function movePlayer(dx,dy){

if(locked)return;

const oldX = px;
const oldY = py;

px += dx;
py += dy;

if(px < 0)px = 0;
if(py < 0)py = 0;

if(px > 858)px = 858;
if(py > 388)py = 388;

player.style.left = px + "px";
player.style.top = py + "px";

if(hitWall()){

px = oldX;
py = oldY;

player.style.left = px + "px";
player.style.top = py + "px";

}

checkGate();

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp")movePlayer(0,-20);

if(e.key==="ArrowDown")movePlayer(0,20);

if(e.key==="ArrowLeft")movePlayer(-20,0);

if(e.key==="ArrowRight")movePlayer(20,0);

});

function hitWall(){

const pr = player.getBoundingClientRect();

const walls = document.querySelectorAll(".wall");

for(let w of walls){

const wr = w.getBoundingClientRect();

if(!(pr.right < wr.left ||
     pr.left > wr.right ||
     pr.bottom < wr.top ||
     pr.top > wr.bottom)){

return true;

}

}

return false;

}

function checkGate(){

const pr = player.getBoundingClientRect();

document.querySelectorAll(".gate").forEach(g=>{

const gr = g.getBoundingClientRect();

if(!(pr.right < gr.left ||
     pr.left > gr.right ||
     pr.bottom < gr.top ||
     pr.top > gr.bottom)){

locked = true;

if(g.dataset.answer === questions[current].ans){

correct();

}else{

wrong();

}

}

});

}

function correct(){

document.getElementById("correctSound").play();

score++;

document.getElementById("score").textContent = score;

showMsg("Correct!");

current++;

setTimeout(loadQuestion,850);

}

function wrong(){

document.getElementById("wrongSound").play();

chances--;

document.getElementById("chances").textContent = chances;

if(chances <= 0){

showMsg("You Lose!");

setTimeout(loseGame,900);

}else{

showMsg("Wrong! One chance left.");

setTimeout(loadQuestion,900);

}

}

function showMsg(t){

const m = document.getElementById("msg");

m.textContent = t;

m.style.display = "block";

setTimeout(()=>m.style.display="none",800);

}

function winGame(){

document.getElementById("clapSound").play();

document.getElementById("endTitle").textContent = "You Win!";

document.getElementById("finalScore").textContent =
score + " / " + questions.length;

document.getElementById("end").style.display = "flex";

}

function loseGame(){

document.getElementById("endTitle").textContent = "You Lose!";

document.getElementById("finalScore").textContent =
score + " / " + questions.length;

document.getElementById("end").style.display = "flex";

}
</script>

</body>
</html>
