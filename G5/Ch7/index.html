<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Blueprint Connector</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e14;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial', sans-serif;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #04060a;
        }
        canvas {
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
            display: block;
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1024" height="576"></canvas>
</div>

<audio id="snd-correct" src="assets/correct.mp3"></audio>
<audio id="snd-wrong" src="assets/wrong.mp3"></audio>
<audio id="snd-win" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME SYSTEM STATES ---
const STATES = {
    BRANDING: 0,
    INSTRUCTIONS: 1,
    PLAYING: 2,
    GAMEOVER: 3
};
let currentState = STATES.BRANDING;
let stateStartTime = Date.now();

// --- ASSETS ---
const logoImg = new Image();
logoImg.src = 'assets/logo.png';

const audioCorrect = document.getElementById('snd-correct');
const audioWrong = document.getElementById('snd-wrong');
const audioWin = document.getElementById('snd-win');

// --- THE GEOMETRY SCHEMATIC MAP DATA ---
const shapeNodes = [
    { id: "equilateral", name: "Equilateral Triangle", matchId: "prop1", x: 200, y: 150, r: 50, color: "#38bdf8" },
    { id: "rightangle", name: "Right-Angled Triangle", matchId: "prop2", x: 200, y: 255, r: 50, color: "#a855f7" },
    { id: "circle", name: "Perfect Circle", matchId: "prop3", x: 200, y: 360, r: 50, color: "#06b6d4" },
    { id: "rectangle", name: "Rectangle Quadrilateral", matchId: "prop4", x: 200, y: 465, r: 50, color: "#f43f5e" }
];

const propertyTokens = [
    { id: "prop3", label: "Diameter = 2 × Radius", matchId: "circle", x: 800, y: 150, w: 280, h: 60, color: "#06b6d4" },
    { id: "prop1", label: "3 Equal Sides & Angles", matchId: "equilateral", x: 800, y: 255, w: 280, h: 60, color: "#38bdf8" },
    { id: "prop4", label: "Opposite Sides Match (90°)", matchId: "rectangle", x: 800, y: 360, w: 280, h: 60, color: "#f43f5e" },
    { id: "prop2", label: "Contains a 90° Corner Angle", matchId: "rightangle", x: 800, y: 465, w: 280, h: 60, color: "#a855f7" }
];

// --- INTERACTION REGISTERS ---
let selectedShape = null;
let selectedProperty = null;
let connections = []; // Tracks locked configuration links
let gameScore = 0;
let feedbackMessage = "Connect the shapes to their mathematical law profiles!";
let feedbackColor = "#94a3b8";
let feedbackTimer = 0;

function resetMatchLayout() {
    connections = [];
    selectedShape = null;
    selectedProperty = null;
    gameScore = 0;
    feedbackMessage = "Connect the shapes to their mathematical law profiles!";
    feedbackColor = "#94a3b8";
    
    // Scramble right-hand property locations dynamically to keep replays clever
    const verticalSlots = [150, 255, 360, 465].sort(() => Math.random() - 0.5);
    propertyTokens.forEach((token, idx) => {
        token.y = verticalSlots[idx];
    });
}

// --- RENDER VEHICLES ---

function drawBranding() {
    // FIX: Tight background paint prevents all potential white screen leaks
    ctx.fillStyle = "#0b0e14";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    if (logoImg.complete && logoImg.naturalWidth !== 0) {
        ctx.drawImage(logoImg, canvas.width / 2 - logoImg.width / 2, canvas.height / 2 - logoImg.height / 2);
    } else {
        ctx.fillStyle = "#38bdf8";
        ctx.font = "bold 45px 'Comic Sans MS'";
        ctx.textAlign = "center";
        ctx.fillText("INNOVINE", canvas.width / 2, canvas.height / 2);
    }
}

function drawInstructions() {
    ctx.fillStyle = "#0b0e14";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Decorative blue-grid lines
    ctx.strokeStyle = "rgba(56, 189, 248, 0.04)";
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width; i += 40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }

    ctx.fillStyle = "#38bdf8";
    ctx.font = "bold 40px 'Comic Sans MS'";
    ctx.textAlign = "center";
    ctx.fillText("📐 GEOMETRIC LINK ARCHITECT 📐", canvas.width / 2, 140);

    ctx.fillStyle = "#ffffff";
    ctx.font = "21px 'Comic Sans MS'";
    ctx.fillText("1. Tap a visual wireframe shape profile on the Left Board.", canvas.width / 2, 235);
    ctx.fillText("2. Tap its matching textbook property token on the Right Board.", canvas.width / 2, 290);
    ctx.fillText("Link all blueprints together correctly to construct the final architecture!", canvas.width / 2, 345);

    let pulse = Math.sin(Date.now() / 140) * 4;
    ctx.fillStyle = "#10b981";
    ctx.beginPath();
    ctx.roundRect(canvas.width / 2 - 130, 420 + pulse, 260, 60, 15);
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 21px 'Comic Sans MS'";
    ctx.fillText("OPEN MATRIX", canvas.width / 2, 456 + pulse);
}

function renderShapeVectorWireframe(id, x, y) {
    ctx.save();
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 3;
    ctx.fillStyle = "rgba(255, 255, 255, 0.06)";

    if (id === "equilateral") {
        ctx.beginPath();
        ctx.moveTo(x, y - 24);
        ctx.lineTo(x - 28, y + 22);
        ctx.lineTo(x + 28, y + 22);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
    } 
    else if (id === "rightangle") {
        ctx.beginPath();
        ctx.moveTo(x - 20, y - 24);
        ctx.lineTo(x - 20, y + 22);
        ctx.lineTo(x + 25, y + 22);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // Little corner square box indicator
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x - 20, y + 12, 10, 10);
    } 
    else if (id === "circle") {
        ctx.beginPath();
        ctx.arc(x, y, 25, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // Inner line indicator showing context rules
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(x - 25, y); ctx.lineTo(x + 25, y); ctx.stroke();
    } 
    else if (id === "rectangle") {
        ctx.beginPath();
        ctx.rect(x - 35, y - 20, 70, 40);
        ctx.fill(); ctx.stroke();
    }
    ctx.restore();
}

function drawPlayingState() {
    ctx.fillStyle = "#0f121d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Render Status Task Bar
    ctx.fillStyle = "#1e293b";
    ctx.fillRect(0, 0, canvas.width, 80);
    ctx.strokeStyle = "rgba(56, 189, 248, 0.3)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 80); ctx.lineTo(canvas.width, 80); ctx.stroke();

    // Text instructions
    if (Date.now() - feedbackTimer > 2000) {
        feedbackMessage = "Tap a vector wireframe on the left, then link its match on the right.";
        feedbackColor = "#94a3b8";
    }
    ctx.fillStyle = feedbackColor;
    ctx.font = "bold 19px 'Comic Sans MS'";
    ctx.textAlign = "center";
    ctx.fillText(feedbackMessage, canvas.width / 2, 46);

    // Draw active structural connections
    connections.forEach(link => {
        ctx.strokeStyle = "rgba(16, 185, 129, 0.65)";
        ctx.lineWidth = 5;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#10b981";
        ctx.beginPath();
        ctx.moveTo(link.sx, link.sy);
        ctx.lineTo(link.px, link.py);
        ctx.stroke();
        ctx.shadowBlur = 0; // Clear blur immediately
    });

    // Draw active temporary tracking lines if elements are partially clicked
    if (selectedShape) {
        ctx.strokeStyle = "rgba(56, 189, 248, 0.4)";
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 6]);
        ctx.beginPath();
        ctx.moveTo(selectedShape.x + 60, selectedShape.y);
        ctx.lineTo(canvas.width / 2 + 100, canvas.height / 2 + 50);
        ctx.stroke();
        ctx.setLineDash([]); // clear dash lines mapping
    }

    // --- DRAW SHAPE CARDS (LEFT BOARD) ---
    shapeNodes.forEach(node => {
        let isLinked = connections.some(c => c.shapeId === node.id);
        let isSelected = selectedShape && selectedShape.id === node.id;

        // Interactive container pad housing shapes
        ctx.fillStyle = isSelected ? "#1e293b" : "#111827";
        ctx.beginPath();
        ctx.roundRect(node.x - 140, node.y - 42, 280, 84, 12);
        ctx.fill();
        ctx.strokeStyle = isSelected ? "#38bdf8" : (isLinked ? "#10b981" : "#374151");
        ctx.lineWidth = isSelected ? 3 : 1.5;
        ctx.stroke();

        renderShapeVectorWireframe(node.id, node.x - 80, node.y);

        // Core descriptor title string
        ctx.fillStyle = isLinked ? "#94a3b8" : "#ffffff";
        ctx.font = "bold 16px 'Comic Sans MS'";
        ctx.textAlign = "left";
        ctx.fillText(node.name, node.x - 25, node.y + 6);
    });

    // --- DRAW RECTANGULAR TOKENS (RIGHT BOARD) ---
    propertyTokens.forEach(token => {
        let isLinked = connections.some(c => c.tokenId === token.id);
        let isSelected = selectedProperty && selectedProperty.id === token.id;

        ctx.fillStyle = isSelected ? "#2d1b4e" : "#111827";
        ctx.beginPath();
        ctx.roundRect(token.x - token.w/2, token.y - token.h/2, token.w, token.h, 12);
        ctx.fill();
        ctx.strokeStyle = isSelected ? "#a855f7" : (isLinked ? "#10b981" : "#374151");
        ctx.lineWidth = isSelected ? 3 : 1.5;
        ctx.stroke();

        ctx.fillStyle = isLinked ? "#64748b" : "#ffffff";
        ctx.font = "bold 15px 'Comic Sans MS'";
        ctx.textAlign = "center";
        ctx.fillText(token.label, token.x, token.y + 5);
    });
}

function drawGameOverState() {
    ctx.fillStyle = "#0b0e14";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#fbbf24";
    ctx.font = "bold 48px 'Comic Sans MS'";
    ctx.textAlign = "center";
    ctx.fillText("SCHEMATICS UNLOCKED COMPLETELY!", canvas.width / 2, 200);

    ctx.fillStyle = "#34d399";
    ctx.font = "bold 24px 'Comic Sans MS'";
    ctx.fillText("All shape profiles verified successfully under standard law metrics.", canvas.width / 2, 280);

    ctx.fillStyle = "#6366f1";
    ctx.beginPath();
    ctx.roundRect(canvas.width / 2 - 120, 400, 240, 60, 20);
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 21px 'Comic Sans MS'";
    ctx.fillText("RESET SCHEMATICS", canvas.width / 2, 436);
}

// --- INTERACTIVE LINK EVALUATION PROCESS ---

function evaluateSelections() {
    if (selectedShape && selectedProperty) {
        if (selectedShape.matchId === selectedProperty.id) {
            // Lock connection mapping coordinate lines securely
            connections.push({
                shapeId: selectedShape.id,
                tokenId: selectedProperty.id,
                sx: selectedShape.x + 140, sy: selectedShape.y,
                px: selectedProperty.x - selectedProperty.w/2, py: selectedProperty.y
            });
            audioCorrect.currentTime = 0;
            audioCorrect.play().catch(() => {});
            feedbackMessage = `🌟 Correct Link: ${selectedShape.name} locked!`;
            feedbackColor = "#34d399";
            gameScore += 25;
        } else {
            audioWrong.currentTime = 0;
            audioWrong.play().catch(() => {});
            feedbackMessage = "💥 Mismatch configuration! Laws do not match profile.";
            feedbackColor = "#f43f5e";
        }
        feedbackTimer = Date.now();
        selectedShape = null;
        selectedProperty = null;

        // Win Verification Boundary Check
        if (connections.length === shapeNodes.length) {
            setTimeout(() => {
                currentState = STATES.GAMEOVER;
                audioWin.currentTime = 0;
                audioWin.play().catch(() => {});
            }, 1200);
        }
    }
}

function handlePointerClick(coords) {
    if (currentState === STATES.INSTRUCTIONS) {
        if (coords.x > canvas.width/2 - 130 && coords.x < canvas.width/2 + 130 && coords.y > 420 && coords.y < 480) {
            resetMatchLayout();
            currentState = STATES.PLAYING;
        }
    } 
    else if (currentState === STATES.PLAYING) {
        // Evaluate left board clicks
        shapeNodes.forEach(node => {
            if (!connections.some(c => c.shapeId === node.id)) {
                if (coords.x >= node.x - 140 && coords.x <= node.x + 140 &&
                    coords.y >= node.y - 42 && coords.y <= node.y + 42) {
                    selectedShape = node;
                }
            }
        });

        // Evaluate right board tokens clicks
        propertyTokens.forEach(token => {
            if (!connections.some(c => c.tokenId === token.id)) {
                if (coords.x >= token.x - token.w/2 && coords.x <= token.x + token.w/2 &&
                    coords.y >= token.y - token.h/2 && coords.y <= token.y + token.h/2) {
                    selectedProperty = token;
                }
            }
        });

        evaluateSelections();
    } 
    else if (currentState === STATES.GAMEOVER) {
        if (coords.x > canvas.width/2 - 120 && coords.x < canvas.width/2 + 120 && coords.y > 400 && coords.y < 460) {
            resetMatchLayout();
            currentState = STATES.PLAYING;
        }
    }
}

function extractScaleCoords(e) {
    const bound = canvas.getBoundingClientRect();
    const multX = canvas.width / bound.width;
    const multY = canvas.height / bound.height;
    let ptrX = e.clientX;
    let ptrY = e.clientY;
    if (e.touches && e.touches.length > 0) {
        ptrX = e.touches[0].clientX;
        ptrY = e.touches[0].clientY;
    }
    return {
        x: (ptrX - bound.left) * multX,
        y: (ptrY - bound.top) * multY
    };
}

// --- HARDWARE SYSTEM BINDINGS ---
canvas.addEventListener('mousedown', (e) => handlePointerClick(extractScaleCoords(e)));
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handlePointerClick(extractScaleCoords(e));
}, { passive: false });

// Main Runtime Thread Loop
function runningRuntimePipelineLoop() {
    switch (currentState) {
        case STATES.BRANDING:
            drawBranding();
            if (Date.now() - stateStartTime > 4000) {
                currentState = STATES.INSTRUCTIONS;
            }
            break;
        case STATES.INSTRUCTIONS:
            drawInstructions();
            break;
        case STATES.PLAYING:
            drawPlayingState();
            break;
        case STATES.GAMEOVER:
            drawGameOverState();
            break;
    }
    requestAnimationFrame(runningRuntimePipelineLoop);
}

runningRuntimePipelineLoop();
</script>

</body>
</html>
