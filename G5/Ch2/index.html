<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Operations Treasure Hunt</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(#8fd3ff,#dff8ff);overflow:hidden;text-align:center}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px}

/* White background for the first 5 seconds splash screen */
#loader{background:#ffffff}
.splash-title{font-size:36px;font-weight:bold;color:#0066ff;margin-top:10px;letter-spacing:1px}

/* Instructions and End screens match original layout styles */
#instructions, #end{background:linear-gradient(#eaf9ff,#fff)}
.logo{width:160px;margin-bottom:20px}
button{border:0;border-radius:14px;background:#0066ff;color:white;font-size:20px;font-weight:bold;padding:13px 28px;cursor:pointer;box-shadow:0 6px #004aad;transition:.1s}
button:active{transform:translateY(4px);box-shadow:0 2px #004aad}

#hud{display:flex;justify-content:space-around;padding:12px;font-size:20px;font-weight:bold;flex-wrap:wrap}
#questionBox{width:92%;max-width:900px;margin:8px auto;background:white;border:4px solid #004aad;border-radius:18px;padding:16px;font-size:24px;font-weight:bold}
#gameArea{position:relative;width:1000px;max-width:96vw;height:480px;margin:10px auto;border-radius:20px;overflow:hidden;border:5px solid #333;background:linear-gradient(#74c365 0 70%,#d8c28d 70% 100%)}
.chest{position:absolute;width:180px;height:170px;cursor:pointer;transition:.25s}
.chest:hover{transform:scale(1.05)}
.chestTop{width:180px;height:70px;background:#7b3f00;border:5px solid #3b1d00;border-radius:18px 18px 8px 8px;position:absolute;top:0}
.chestBody{width:180px;height:110px;background:#a85a10;border:5px solid #3b1d00;border-radius:0 0 18px 18px;position:absolute;top:60px}
.lock{width:28px;height:40px;background:gold;border:4px solid #5c4200;position:absolute;left:76px;top:75px;border-radius:6px}
.answerText{position:absolute;width:100%;bottom:-38px;font-size:24px;font-weight:bold;color:#111}
.open .chestTop{transform:rotate(-28deg);transform-origin:left bottom}
.coinBurst{position:absolute;font-size:38px;animation:burst 1s ease-out forwards}
@keyframes burst{0%{transform:translateY(0) scale(.5);opacity:1}100%{transform:translateY(-120px) scale(1.5);opacity:0}}
.shake{animation:shake .4s}
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-10px)}80%{transform:translateX(10px)}100%{transform:translateX(0)}}
#msg{font-size:30px;font-weight:bold;min-height:40px;margin-top:10px}
</style>
</head>

<body>

<div id="loader" class="screen">
  <img src="assets/logo.png" class="logo" alt="Treasure Hunt Logo" onerror="this.style.display='none'; document.getElementById('fallback-text').style.display='block';">
  <div id="fallback-text" class="splash-title" style="display:none;">TREASURE HUNT</div>
</div>

<div id="instructions" class="screen" style="display:none">
  <h1 style="font-size:32px; color:#004aad; margin-bottom:30px;">Basic Operations Hunt</h1>
  <button onclick="startGame()">Start Adventure</button>
</div>

<div id="end" class="screen" style="display:none">
  <h1 id="endTitle" style="font-size:36px; color:#004aad; margin-bottom:10px;"></h1>
  <h2 style="font-size:24px; margin-bottom:30px;">Final Score: <span id="finalScore"></span></h2>
  <button onclick="location.reload()">Play Again</button>
</div>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Chances: <span id="chances">2</span></div>
  <div>Question: <span id="qno">1</span>/10</div>
</div>

<div id="questionBox">Find the correct treasure chest!</div>
<div id="gameArea"><div id="chests"></div></div>
<div id="msg"></div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>
