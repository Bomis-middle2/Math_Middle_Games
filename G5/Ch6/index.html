<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decimal Balloon Popper</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0c0f1d;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial', sans-serif;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050714;
        }
        canvas {
            box-shadow: 0 0 35px rgba(0,0,0,0.9);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
            display: block;
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1024" height="576"></canvas>
</div>

<audio id="snd-correct" src="assets/correct.mp3"></audio>
<audio id="snd-wrong" src="assets/wrong.mp3"></audio>
<audio id="snd-win" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- SYSTEM STATES ---
const STATES = {
    BRANDING: 0,
    INSTRUCTIONS: 1,
    PLAYING: 2,
    FEEDBACK: 3,
    GAMEOVER: 4
};
let currentState = STATES.BRANDING;
let stateStartTime = Date.now();

// --- ASSETS ---
const logoImg = new Image();
logoImg.src = 'assets/logo.png';

const audioCorrect = document.getElementById('snd-correct');
const audioWrong = document.getElementById('snd-wrong');
const audioWin = document.getElementById('snd-win');

// --- GRADE 5 CURRICULUM DATA ---
const dataset = [
    { id: 1, problem: "Pop the place value of 5 in 12.35", target: "Hundredths", options: ["Tenths", "Hundredths", "Ones", "Thousandths"], hint: "First spot right is tenths, second spot is..." },
    { id: 2, problem: "Find the simplest fraction form of 0.75", target: "3/4", options: ["75/10", "3/4", "1/2", "5/7"], hint: "Think of 75 cents out of 100 cents (3 quarters)." },
    { id: 3, problem: "Identify the decimal format for 3/10", target: "0.3", options: ["3.0", "0.03", "0.3", "3.10"], hint: "Three tenths means a 3 right after the decimal point." },
    { id: 4, problem: "Pop the correct expanded form of 4.26", target: "4 + 0.2 + 0.06", options: ["4 + 2 + 6", "4 + 0.2 + 0.06", "40 + 2 + 0.6", "4+0.02+0.6"], hint: "Break down the ones, tenths, and hundredths values." },
    { id: 5, problem: "Find the equivalent decimal to 0.4", target: "0.400", options: ["0.04", "4.0", "0.400", "0.004"], hint: "Adding trailing zeros on the far right does not alter value." },
    { id: 6, problem: "Which pair shows a set of Like Decimals?", target: "1.25 & 4.82", options: ["0.5 & 0.55", "1.25 & 4.82", "3.1 & 12.009", "7 & 0.7"], hint: "Like decimals have the same number of digits after the decimal point." },
    { id: 7, problem: "Which symbol makes this true: 4.09 [ ? ] 4.1", target: "<", options: [">", "<", "=", "+"], hint: "Compare 4.09 with 4.10. Which one is larger?" },
    { id: 8, problem: "Solve the summation challenge: 2.5 + 1.45", target: "3.95", options: ["1.70", "3.95", "3.50", "2.95"], hint: "Line up the decimals vertically: 2.50 + 1.45" },
    { id: 9, problem: "Solve this subtraction problem: 5.0 - 1.2", target: "3.8", options: ["4.8", "4.2", "3.8", "3.0"], hint: "Borrow from the ones place just like regular subtraction." },
    { id: 10, problem: "Multiply these factors: 0.3 x 4", target: "1.2", options: ["12.0", "0.12", "1.2", "0.7"], hint: "Calculate 3 x 4, then slide the decimal point back one space." },
    { id: 11, problem: "Divide up this measurement: 4.8m cut into 2 equal parts", target: "2.4m", options: ["2.4m", "2.2m", "4.2m", "1.6m"], hint: "Cut 48 in half, then place the decimal back in the middle." },
    { id: 12, problem: "Sam spent $4.50 on juice and $2.25 on snacks. Total?", target: "$6.75", options: ["$6.50", "$6.75", "$7.00", "$4.75"], hint: "Add the dollars together, then add the cent parts cleanly." }
];

let gameQuestions = [];
let currentQIndex = 0;
let score = 0;
let attempts = 0;
let feedbackType = "";
let feedbackTimer = 0;
let hintActive = false;

// --- GAME BALOONS ARRANGEMENT ---
let balloons = [];
const balloonColors = ["#ef4444", "#3b82f6", "#10b981", "#a855f7"];

function initGame() {
    gameQuestions = [...dataset].sort(() => Math.random() - 0.5).slice(0, 10);
    score = 0;
    currentQIndex = 0;
    loadQuestion();
}

function loadQuestion() {
    attempts = 0;
    hintActive = false;
    balloons = [];
    
    if (currentQIndex >= gameQuestions.length) {
        currentState = STATES.GAMEOVER;
        audioWin.currentTime = 0;
        audioWin.play().catch(() => {});
        return;
    }

    const q = gameQuestions[currentQIndex];
    const spacing = 1024 / (q.options.length + 1);

    q.options.forEach((opt, idx) => {
        balloons.push({
            text: opt.toString(),
            x: spacing * (idx + 1),
            y: 600, // Starts off-screen cleanly at the bottom
            targetY: 340 + (Math.sin(idx) * 30), // Float gently at different comfortable levels
            r: 55, 
            color: balloonColors[idx % balloonColors.length],
            isCorrect: opt.toString() === q.target.toString()
        });
    });
}

// --- ENGINE DRAW OPERATIONS ---

function drawBranding() {
    // Completely clear out frame using theme dark color to fix white flashing
    ctx.fillStyle = "#0c0f1d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    if (logoImg.complete && logoImg.naturalWidth !== 0) {
        ctx.drawImage(logoImg, canvas.width / 2 - logoImg.width / 2, canvas.height / 2 - logoImg.height / 2);
    } else {
        ctx.fillStyle = "#38bdf8";
        ctx.font = "bold 45px 'Comic Sans MS'";
        ctx.textAlign = "center";
        ctx.fillText("INNOVINE", canvas.width / 2, canvas.height / 2);
    }
}

function drawInstructions() {
    ctx.fillStyle = "#0c0f1d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#38bdf8";
    ctx.font = "bold 42px 'Comic Sans MS'";
    ctx.textAlign = "center";
    ctx.fillText("🎈 DECIMAL BALLOON POPPER 🎈", canvas.width / 2, 130);

    ctx.fillStyle = "#ffffff";
    ctx.font = "22px 'Comic Sans MS'";
    ctx.fillText("Read the decimal challenge box on the top of the screen.", canvas.width / 2, 230);
    ctx.fillText("Click or Tap on the correct rising balloon to pop it!", canvas.width / 2, 285);
    ctx.fillText("Incorrect pops will lower your score points matrix.", canvas.width / 2, 340);

    let pulse = Math.sin(Date.now() / 150) * 4;
    ctx.fillStyle = "#10b981";
    ctx.beginPath();
    ctx.roundRect(canvas.width / 2 - 130, 420 + pulse, 260, 60, 25);
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 22px 'Comic Sans MS'";
    ctx.fillText("START GAME", canvas.width / 2, 456 + pulse);
}

function drawHUD() {
    ctx.fillStyle = "rgba(5, 7, 20, 0.85)";
    ctx.fillRect(0, 0, canvas.width, 75);
    
    ctx.fillStyle = "#fbbf24";
    ctx.font = "bold 20px 'Comic Sans MS'";
    ctx.textAlign = "left";
    ctx.fillText(`Question: ${currentQIndex + 1} / 10`, 30, 44);

    ctx.textAlign = "right";
    ctx.fillStyle = "#34d399";
    ctx.fillText(`Score: ${score}`, canvas.width - 30, 44);
}

function drawPlayingState() {
    ctx.fillStyle = "#111827";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Decorative soft floating background air circles
    ctx.fillStyle = "rgba(255, 255, 255, 0.03)";
    for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc((i * 250 + 100) % canvas.width, (400 - (Date.now() / 40 + i * 80) % 500), 40 + i * 10, 0, Math.PI * 2);
        ctx.fill();
    }

    const q = gameQuestions[currentQIndex];

    // Challenge Statement Board
    ctx.fillStyle = "#1f2937";
    ctx.beginPath();
    ctx.roundRect(80, 100, 864, 70, 16);
    ctx.fill();
    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 22px 'Comic Sans MS'";
    ctx.textAlign = "center";
    ctx.fillText(q.problem, canvas.width / 2, 142);

    if (hintActive) {
        ctx.fillStyle = "#f43f5e";
        ctx.font = "bold 18px 'Comic Sans MS'";
        ctx.fillText(`💡 Hint: ${q.hint}`, canvas.width / 2, 200);
    }

    // Process rising balloons
    balloons.forEach(b => {
        if (b.y > b.targetY) {
            b.y -= 4.5; // Smooth rising speed transition up onto screen layout
        }

        // Draw balloon string
        ctx.strokeStyle = "#9ca3af";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + b.r);
        ctx.lineTo(b.x, b.y + b.r + 40);
        ctx.stroke();

        // Draw main circle balloon element
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw inner textual information tag cleanly
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 18px 'Comic Sans MS'";
        ctx.fillText(b.text, b.x, b.y + 6);
    });

    drawHUD();
}

function drawFeedbackState() {
    drawPlayingState();

    ctx.fillStyle = "rgba(12, 15, 29, 0.85)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = "center";
    if (feedbackType === "correct") {
        ctx.fillStyle = "#34d399";
        ctx.font = "bold 46px 'Comic Sans MS'";
        ctx.fillText("🎈 POPPED PERFECTLY! 🎈", canvas.width / 2, canvas.height / 2 - 10);
        ctx.fillStyle = "#e5e7eb";
        ctx.font = "20px 'Comic Sans MS'";
        ctx.fillText("Excellent calculation speed! Preparing next set...", canvas.width / 2, canvas.height / 2 + 40);
    } else {
        ctx.fillStyle = "#f43f5e";
        ctx.font = "bold 46px 'Comic Sans MS'";
        ctx.fillText("💥 WRONG BALLOON! 💥", canvas.width / 2, canvas.height / 2 - 10);
        ctx.fillStyle = "#e5e7eb";
        ctx.font = "20px 'Comic Sans MS'";
        ctx.fillText("Incorrect mix! Let's reload this question safely...", canvas.width / 2, canvas.height / 2 + 40);
    }

    if (Date.now() - feedbackTimer > 1800) {
        if (feedbackType === "correct") {
            currentQIndex++;
            loadQuestion();
            currentState = STATES.PLAYING;
        } else {
            if (attempts >= 2) hintActive = true;
            // Push balloons down below to float back up elegantly
            balloons.forEach(b => b.y = 600);
            currentState = STATES.PLAYING;
        }
    }
}

function drawGameOverState() {
    ctx.fillStyle = "#0c0f1d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#fbbf24";
    ctx.font = "bold 50px 'Comic Sans MS'";
    ctx.textAlign = "center";
    ctx.fillText("EVALUATION COMPLETED!", canvas.width / 2, 180);

    ctx.fillStyle = "#ffffff";
    ctx.font = "26px 'Comic Sans MS'";
    ctx.fillText(`Your Final Score: ${score} / 100 Points`, canvas.width / 2, 270);

    let ranks = "Grade 5 Math Master Champion! 🏆";
    if (score < 70) ranks = "Keep practicing decimals to improve! 📚";
    ctx.fillStyle = "#38bdf8";
    ctx.font = "bold 22px 'Comic Sans MS'";
    ctx.fillText(ranks, canvas.width / 2, 330);

    ctx.fillStyle = "#6366f1";
    ctx.beginPath();
    ctx.roundRect(canvas.width / 2 - 120, 420, 240, 60, 20);
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 22px 'Comic Sans MS'";
    ctx.fillText("PLAY AGAIN", canvas.width / 2, 456);
}

// --- CONTROLLER HANDLERS ---

function handlePointerHit(clickCoords) {
    if (currentState === STATES.INSTRUCTIONS) {
        if (clickCoords.x > canvas.width/2 - 130 && clickCoords.x < canvas.width/2 + 130 && clickCoords.y > 420 && clickCoords.y < 480) {
            initGame();
            currentState = STATES.PLAYING;
        }
    } 
    else if (currentState === STATES.PLAYING) {
        balloons.forEach(b => {
            let dx = clickCoords.x - b.x;
            let dy = clickCoords.y - b.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            // Register target balloon hit click bounds
            if (distance < b.r) {
                if (b.isCorrect) {
                    audioCorrect.currentTime = 0;
                    audioCorrect.play().catch(() => {});
                    score += 10;
                    feedbackType = "correct";
                } else {
                    audioWrong.currentTime = 0;
                    audioWrong.play().catch(() => {});
                    attempts++;
                    feedbackType = "wrong";
                }
                feedbackTimer = Date.now();
                currentState = STATES.FEEDBACK;
            }
        });
    } 
    else if (currentState === STATES.GAMEOVER) {
        if (clickCoords.x > canvas.width/2 - 120 && clickCoords.x < canvas.width/2 + 120 && clickCoords.y > 420 && clickCoords.y < 480) {
            initGame();
            currentState = STATES.PLAYING;
        }
    }
}

function extractResolutionCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX = e.clientX;
    let clientY = e.clientY;
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    }
    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

// --- EVENT ENGINE REGISTRATIONS ---
canvas.addEventListener('mousedown', (e) => handlePointerHit(extractResolutionCoords(e)));
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handlePointerHit(extractResolutionCoords(e));
}, { passive: false });

// Main loop initialization wrapper
function masterLoop() {
    switch (currentState) {
        case STATES.BRANDING:
            drawBranding();
            if (Date.now() - stateStartTime > 5000) {
                currentState = STATES.INSTRUCTIONS;
            }
            break;
        case STATES.INSTRUCTIONS:
            drawInstructions();
            break;
        case STATES.PLAYING:
            drawPlayingState();
            break;
        case STATES.FEEDBACK:
            drawFeedbackState();
            break;
        case STATES.GAMEOVER:
            drawGameOverState();
            break;
    }
    requestAnimationFrame(masterLoop);
}

masterLoop();
</script>

</body>
</html>
