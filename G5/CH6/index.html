<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decimal Space Explorer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020208;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial', sans-serif;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background-color: #050515;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1024" height="576"></canvas>
</div>

<audio id="snd-correct" src="assets/correct.mp3"></audio>
<audio id="snd-wrong" src="assets/wrong.mp3"></audio>
<audio id="snd-win" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME SYSTEM STATES ---
const STATES = {
    BRANDING: 0,
    INSTRUCTIONS: 1,
    PLAYING: 2,
    FEEDBACK: 3,
    GAMEOVER: 4
};
let currentState = STATES.BRANDING;
let stateStartTime = Date.now();

// --- ASSETS ---
const logoImg = new Image();
logoImg.src = 'assets/logo.png';

const audioCorrect = document.getElementById('snd-correct');
const audioWrong = document.getElementById('snd-wrong');
const audioWin = document.getElementById('snd-win');

// --- DECIMALS LEARRICULUM DATA ---
const dataset = [
    { id: 1, problem: "Collect the place value of 5 in 12.35", target: "Hundredths", options: ["Tenths", "Hundredths", "Ones", "Thousandths"], hint: "First spot right is tenths, second spot is..." },
    { id: 2, problem: "Find the simplest fraction form of 0.75", target: "3/4", options: ["75/10", "3/4", "1/2", "5/7"], hint: "Think of 75 cents out of 100 cents (3 quarters)." },
    { id: 3, problem: "Intercept the decimal format for 3/10", target: "0.3", options: ["3.0", "0.03", "0.3", "3.10"], hint: "Three tenths means a 3 right after the decimal point." },
    { id: 4, problem: "Catch the correct expanded form of 4.26", target: "4 + 0.2 + 0.06", options: ["4 + 2 + 6", "4 + 0.2 + 0.06", "40 + 2 + 0.6", "4+0.02+0.6"], hint: "Break down the ones, tenths, and hundredths values." },
    { id: 5, problem: "Capture the equivalent decimal to 0.4", target: "0.400", options: ["0.04", "4.0", "0.400", "0.004"], hint: "Adding trailing zeros on the far right does not alter value." },
    { id: 6, problem: "Which pair shows a set of Like Decimals?", target: "1.25 & 4.82", options: ["0.5 & 0.55", "1.25 & 4.82", "3.1 & 12.009", "7 & 0.7"], hint: "Like decimals have the same number of digits after the decimal point." },
    { id: 7, problem: "Which symbol makes this true: 4.09 [ ? ] 4.1", target: "<", options: [">", "<", "=", "+"], hint: "Compare 4.09 with 4.10. Which one is larger?" },
    { id: 8, problem: "Solve the summation challenge: 2.5 + 1.45", target: "3.95", options: ["1.70", "3.95", "3.50", "2.95"], hint: "Line up the decimals vertically: 2.50 + 1.45" },
    { id: 9, problem: "Solve this subtraction problem: 5.0 - 1.2", target: "3.8", options: ["4.8", "4.2", "3.8", "3.0"], hint: "Borrow from the ones place just like regular subtraction." },
    { id: 10, problem: "Multiply these factors: 0.3 x 4", target: "1.2", options: ["12.0", "0.12", "1.2", "0.7"], hint: "Calculate 3 x 4, then slide the decimal point back one space." },
    { id: 11, problem: "Divide up this measurement: 4.8m cut into 2 equal parts", target: "2.4m", options: ["2.4m", "2.2m", "4.2m", "1.6m"], hint: "Cut 48 in half, then place the decimal back in the middle." },
    { id: 12, problem: "Sam spent $4.50 on juice and $2.25 on snacks. Total?", target: "$6.75", options: ["$6.50", "$6.75", "$7.00", "$4.75"], hint: "Add the dollars together, then add the cent parts cleanly." }
];

let gameQuestions = [];
let currentQIndex = 0;
let score = 0;
let attempts = 0;
let feedbackType = "";
let feedbackTimer = 0;
let hintActive = false;

// --- GAME OBJECTS & INTERACTION ---
let ship = { x: 512, y: 480, r: 25, targetX: 512 };
let asteroids = [];
let particles = [];
let stars = [];
let mouseInputX = 512;

// Populate background starfield array
for (let i = 0; i < 40; i++) {
    stars.push({ x: Math.random() * 1024, y: Math.random() * 576, speed: Math.random() * 1.5 + 0.5, size: Math.random() * 2 });
}

// --- INITIALIZE GAME SESSION ---
function initGame() {
    gameQuestions = [...dataset].sort(() => Math.random() - 0.5).slice(0, 10);
    score = 0;
    currentQIndex = 0;
    loadQuestion();
}

function loadQuestion() {
    attempts = 0;
    hintActive = false;
    asteroids = [];
    
    if (currentQIndex >= gameQuestions.length) {
        currentState = STATES.GAMEOVER;
        audioWin.currentTime = 0;
        audioWin.play().catch(() => {});
        return;
    }

    const q = gameQuestions[currentQIndex];
    
    const laneWidth = 1024 / q.options.length;
    q.options.forEach((opt, idx) => {
        asteroids.push({
            text: opt.toString(),
            x: (laneWidth * idx) + (laneWidth / 2),
            y: -60 - (Math.random() * 40),
            r: 45,
            speed: 1.5,
            isCorrect: opt.toString() === q.target.toString()
        });
    });
}

// --- PARTICLE EMITTER ENGINE ---
function spawnExplosion(x, y, color) {
    for (let i = 0; i < 40; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 12,
            vy: (Math.random() - 0.5) * 12,
            radius: Math.random() * 4 + 2,
            color: color,
            alpha: 1,
            life: Math.random() * 20 + 25
        });
    }
}

// --- LOOP RENDERING LOGIC ---
function drawBranding() {
    // FIX: Changed branding screen background color from white to space theme dark
    canvas.style.cursor = "default"; 
    ctx.fillStyle = "#020208";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (logoImg.complete && logoImg.naturalWidth !== 0) {
        ctx.drawImage(logoImg, canvas.width / 2 - logoImg.width / 2, canvas.height / 2 - logoImg.height / 2);
    } else {
        ctx.fillStyle = "#38bdf8";
        ctx.font = "bold 45px Arial";
        ctx.textAlign = "center";
        ctx.fillText("INNOVINE", canvas.width / 2, canvas.height / 2);
    }
}

function drawInstructions() {
    // FIX: Ensure cursor is visible on instructions screen
    canvas.style.cursor = "default";
    ctx.fillStyle = "#030312";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#38bdf8";
    ctx.font = "bold 40px 'Comic Sans MS'";
    ctx.textAlign = "center";
    ctx.fillText("🚀 DECIMAL ASTEROID NAVIGATOR 🚀", canvas.width / 2, 120);

    ctx.fillStyle = "#ffffff";
    ctx.font = "22px 'Comic Sans MS'";
    ctx.fillText("Pilot your Starship left or right to capture the correct math asteroid!", canvas.width / 2, 220);
    ctx.fillText("Avoid colliding with wrong values or your shields will take structural damage.", canvas.width / 2, 270);
    ctx.fillText("Fail twice on a question, and your ship's AI computer will transmit a hint!", canvas.width / 2, 320);

    let pulseButton = Math.sin(Date.now() / 150) * 5;
    ctx.fillStyle = "#f43f5e";
    ctx.beginPath();
    ctx.roundRect(canvas.width / 2 - 140, 400 + pulseButton, 280, 60, 20);
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 24px 'Comic Sans MS'";
    ctx.fillText("LAUNCH SECTOR", canvas.width / 2, 438 + pulseButton);
}

function drawHUD() {
    ctx.fillStyle = "rgba(10, 10, 35, 0.8)";
    ctx.fillRect(0, 0, canvas.width, 70);
    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 70); ctx.lineTo(canvas.width, 70);
    ctx.stroke();

    ctx.fillStyle = "#fbbf24";
    ctx.font = "bold 20px 'Comic Sans MS'";
    ctx.textAlign = "left";
    ctx.fillText(`Sector Progress: ${currentQIndex + 1} / 10`, 30, 42);

    ctx.textAlign = "right";
    ctx.fillStyle = "#34d399";
    ctx.fillText(`Shield Power Points: ${score}`, canvas.width - 30, 42);
}

function drawPlayingState() {
    // FIX: Hide cursor only during the actual shooter gameplay to make it immersive
    canvas.style.cursor = "none";

    stars.forEach(s => {
        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });

    drawHUD();
    const q = gameQuestions[currentQIndex];

    ctx.fillStyle = "#0f172a";
    ctx.beginPath();
    ctx.roundRect(120, 90, 784, 65, 12);
    ctx.fill();
    ctx.strokeStyle = "#a855f7";
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 22px 'Comic Sans MS'";
    ctx.textAlign = "center";
    ctx.fillText(q.problem, canvas.width / 2, 130);

    if (hintActive) {
        ctx.fillStyle = "#f43f5e";
        ctx.font = "bold 18px 'Comic Sans MS'";
        ctx.fillText(`⚠️ Ship Computer Hint: ${q.hint}`, canvas.width / 2, 190);
    }

    ship.x += (ship.targetX - ship.x) * 0.15;
    
    ctx.save();
    ctx.translate(ship.x, ship.y);
    let thrustGlow = Math.random() * 15 + 10;
    ctx.fillStyle = "#f97316";
    ctx.beginPath();
    ctx.moveTo(-10, 25); ctx.lineTo(0, 25 + thrustGlow); ctx.lineTo(10, 25);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#38bdf8";
    ctx.beginPath();
    ctx.moveTo(0, -30);
    ctx.lineTo(-22, 25);
    ctx.lineTo(0, 12);
    ctx.lineTo(22, 25);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.moveTo(0, -15); ctx.lineTo(-7, 5); ctx.lineTo(7, 5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    asteroids.forEach(a => {
        a.y += a.speed;
        
        if (a.y - a.r > canvas.height) {
            a.y = -60;
            a.x = Math.random() * (canvas.width - 100) + 50;
        }

        ctx.fillStyle = "#475569";
        ctx.beginPath();
        ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#94a3b8";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 18px 'Comic Sans MS'";
        ctx.textAlign = "center";
        ctx.fillText(a.text, a.x, a.y + 6);

        let dx = a.x - ship.x;
        let dy = a.y - ship.y;
        let gapDistance = Math.sqrt(dx * dx + dy * dy);

        if (gapDistance < a.r + ship.r - 5) {
            if (a.isCorrect) {
                spawnExplosion(a.x, a.y, "#10b981");
                audioCorrect.currentTime = 0;
                audioCorrect.play().catch(() => {});
                score += 10;
                feedbackType = "correct";
            } else {
                spawnExplosion(a.x, a.y, "#ef4444");
                audioWrong.currentTime = 0;
                audioWrong.play().catch(() => {});
                attempts++;
                feedbackType = "wrong";
            }
            feedbackTimer = Date.now();
            currentState = STATES.FEEDBACK;
        }
    });
}

function drawFeedbackState() {
    // FIX: Bring back cursor for the pop-up screens
    canvas.style.cursor = "default";
    drawPlayingState();

    ctx.fillStyle = "rgba(2, 2, 10, 0.8)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.alpha -= 1 / p.life;
        if (p.alpha <= 0) { particles.splice(i, 1); continue; }
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1.0;

    ctx.textAlign = "center";
    if (feedbackType === "correct") {
        ctx.fillStyle = "#34d399";
        ctx.font = "bold 48px 'Comic Sans MS'";
        ctx.fillText("🌟 SECTOR CLEARED! 🌟", canvas.width / 2, canvas.height / 2 - 10);
        ctx.fillStyle = "#ffffff";
        ctx.font = "20px 'Comic Sans MS'";
        ctx.fillText("Warp Speed Activated to Next Target System...", canvas.width / 2, canvas.height / 2 + 35);
    } else {
        ctx.fillStyle = "#f43f5e";
        ctx.font = "bold 48px 'Comic Sans MS'";
        ctx.fillText("💥 HULL COLLISION CRITICAL 💥", canvas.width / 2, canvas.height / 2 - 10);
        ctx.fillStyle = "#ffffff";
        ctx.font = "20px 'Comic Sans MS'";
        ctx.fillText("Re-engaging shields... Deflectors resetting!", canvas.width / 2, canvas.height / 2 + 35);
    }

    if (Date.now() - feedbackTimer > 2000) {
        if (feedbackType === "correct") {
            currentQIndex++;
            loadQuestion();
            currentState = STATES.PLAYING;
        } else {
            if (attempts >= 2) hintActive = true;
            asteroids.forEach(a => a.y = -60 - (Math.random() * 40));
            currentState = STATES.PLAYING;
        }
    }
}

function drawGameOverState() {
    // FIX: Make cursor visible on game over screen
    canvas.style.cursor = "default";
    ctx.fillStyle = "#030312";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#fbbf24";
    ctx.font = "bold 50px 'Comic Sans MS'";
    ctx.textAlign = "center";
    ctx.fillText("GALAXY JOURNEY COMPLETE!", canvas.width / 2, 180);

    ctx.fillStyle = "#ffffff";
    ctx.font = "26px 'Comic Sans MS'";
    ctx.fillText(`Total Collected Shield Energy: ${score} Points`, canvas.width / 2, 270);

    let badge = "Rank achieved: Admiral of Decimals! 🌌🏆";
    if(score < 70) badge = "Rank achieved: Space Pilot Trainee! 🚀";
    ctx.fillStyle = "#38bdf8";
    ctx.fillText(badge, canvas.width / 2, 330);

    ctx.fillStyle = "#6366f1";
    ctx.beginPath();
    ctx.roundRect(canvas.width / 2 - 120, 420, 240, 60, 20);
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 24px 'Comic Sans MS'";
    ctx.fillText("REPLAY MISSION", canvas.width / 2, 458);
}

// --- MAIN RUNTIME LOOPS ---
function updateAndRender() {
    switch (currentState) {
        case STATES.BRANDING:
            drawBranding();
            if (Date.now() - stateStartTime > 5000) {
                currentState = STATES.INSTRUCTIONS;
            }
            break;
        case STATES.INSTRUCTIONS:
            drawInstructions();
            break;
        case STATES.PLAYING:
            drawPlayingState();
            break;
        case STATES.FEEDBACK:
            drawFeedbackState();
            break;
        case STATES.GAMEOVER:
            drawGameOverState();
            break;
    }
    requestAnimationFrame(updateAndRender);
}

// --- DEVICE INPUT RESOLUTION SYSTEM ---
function calculateScaleCoords(e) {
    const boundRect = canvas.getBoundingClientRect();
    const multX = canvas.width / boundRect.width;
    const multY = canvas.height / boundRect.height;
    
    let pointerX = e.clientX;
    let pointerY = e.clientY;
    if (e.touches && e.touches.length > 0) {
        pointerX = e.touches[0].clientX;
        pointerY = e.touches[0].clientY;
    }
    return {
        x: (pointerX - boundRect.left) * multX,
        y: (pointerY - boundRect.top) * multY
    };
}

function processPointerMovement(coords) {
    mouseInputX = coords.x;
    if (currentState === STATES.PLAYING) {
        if (mouseInputX < 30) mouseInputX = 30;
        if (mouseInputX > 994) mouseInputX = 994;
        ship.targetX = mouseInputX;
    }
}

function processPointerClicks(coords) {
    if (currentState === STATES.INSTRUCTIONS) {
        if (coords.x > canvas.width/2 - 140 && coords.x < canvas.width/2 + 140 && coords.y > 400 && coords.y < 460) {
            initGame();
            currentState = STATES.PLAYING;
        }
    } 
    else if (currentState === STATES.GAMEOVER) {
        if (coords.x > canvas.width/2 - 120 && coords.x < canvas.width/2 + 120 && coords.y > 420 && coords.y < 480) {
            initGame();
            currentState = STATES.PLAYING;
        }
    }
}

// --- COMPATIBILITY LISTENER REGISTRATION ---
canvas.addEventListener('mousemove', (e) => processPointerMovement(calculateScaleCoords(e)));
canvas.addEventListener('mousedown', (e) => processPointerClicks(calculateScaleCoords(e)));

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    processPointerMovement(calculateScaleCoords(e));
}, { passive: false });
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    processPointerClicks(calculateScaleCoords(e));
}, { passive: false });

// Start the game engine loop
updateAndRender();
</script>

</body>
</html>
