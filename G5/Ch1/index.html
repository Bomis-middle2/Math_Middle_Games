<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Operations Treasure Hunt</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(#8fd3ff,#dff8ff);overflow:hidden;text-align:center}
.screen{position:fixed;inset:0;background:linear-gradient(#eaf9ff,#fff);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px}
.logo{width:160px;margin-bottom:20px}
button{border:0;border-radius:14px;background:#0066ff;color:white;font-size:20px;font-weight:bold;padding:13px 28px;cursor:pointer}
#hud{display:flex;justify-content:space-around;padding:12px;font-size:20px;font-weight:bold;flex-wrap:wrap}
#questionBox{width:92%;max-width:900px;margin:8px auto;background:white;border:4px solid #004aad;border-radius:18px;padding:16px;font-size:24px;font-weight:bold}
#gameArea{position:relative;width:1000px;max-width:96vw;height:480px;margin:10px auto;border-radius:20px;overflow:hidden;border:5px solid #333;background:linear-gradient(#74c365 0 70%,#d8c28d 70% 100%)}
.chest{position:absolute;width:180px;height:170px;cursor:pointer;transition:.25s}
.chest:hover{transform:scale(1.05)}
.chestTop{width:180px;height:70px;background:#7b3f00;border:5px solid #3b1d00;border-radius:18px 18px 8px 8px;position:absolute;top:0}
.chestBody{width:180px;height:110px;background:#a85a10;border:5px solid #3b1d00;border-radius:0 0 18px 18px;position:absolute;top:60px}
.lock{width:28px;height:40px;background:gold;border:4px solid #5c4200;position:absolute;left:76px;top:75px;border-radius:6px}
.answerText{position:absolute;width:100%;bottom:-38px;font-size:24px;font-weight:bold;color:#111}
.open .chestTop{transform:rotate(-28deg);transform-origin:left bottom}
.coinBurst{position:absolute;font-size:38px;animation:burst 1s ease-out forwards}
@keyframes burst{0%{transform:translateY(0) scale(.5);opacity:1}100%{transform:translateY(-120px) scale(1.5);opacity:0}}
.shake{animation:shake .4s}
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-10px)}80%{transform:translateX(10px)}100%{transform:translateX(0)}}
#msg{font-size:30px;font-weight:bold;min-height:40px;margin-top:10px}
.instructions{font-size:22px;line-height:1.6;max-width:720px}
</style>
</head>

<body>

<div id="loader" class="screen">
  <img src="assets/logo.png" class="logo">
</div>

<div id="instructions" class="screen" style="display:none">
  <img src="assets/logo.png" class="logo">
  <button onclick="startGame()">Start Adventure</button>
</div>

<div id="end" class="screen" style="display:none">
  <img src="assets/logo.png" class="logo">
  <!-- Hidden text references used by JavaScript to prevent script breaking -->
  <span id="endTitle" style="display:none"></span>
  <span id="finalScore" style="display:none"></span>
  <button onclick="location.reload()">Play Again</button>
</div>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Chances: <span id="chances">2</span></div>
  <div>Question: <span id="qno">1</span>/10</div>
</div>

<div id="questionBox">Find the correct treasure chest!</div>
<div id="gameArea"><div id="chests"></div></div>
<div id="msg"></div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const questions=[
{q:"45,678 + 23,456 = ?",options:["69,134","68,134","69,034"],ans:"69,134"},
{q:"86,542 - 24,318 = ?",options:["62,224","61,224","62,124"],ans:"62,224"},
{q:"2,345 × 6 = ?",options:["14,070","13,070","14,700"],ans:"14,070"},
{q:"Quotient of 78 ÷ 10",options:["7","8","78"],ans:"7"},
{q:"Remainder of 78 ÷ 10",options:["7","8","0"],ans:"8"},
{q:"Quotient of 409 ÷ 100",options:["4","40","9"],ans:"4"},
{q:"Remainder of 409 ÷ 100",options:["9","0","409"],ans:"9"},
{q:"Quotient of 8049 ÷ 1000",options:["8","80","49"],ans:"8"},
{q:"If sum exceeds 9, we:",options:["carry over","borrow","divide"],ans:"carry over"},
{q:"If top digit is smaller, we:",options:["borrow","carry over","multiply"],ans:"borrow"}
];

let current=0,score=0,chances=2,locked=false;

window.onload=()=>{
 setTimeout(()=>{
  document.getElementById("loader").style.display="none";
  document.getElementById("instructions").style.display="flex";
 },900);
};

function startGame(){
 document.getElementById("instructions").style.display="none";
 loadQuestion();
}

function loadQuestion(){
 locked=false;
 chances=2;
 document.getElementById("chances").textContent=chances;

 if(current>=questions.length){winGame();return;}

 document.getElementById("qno").textContent=current+1;
 document.getElementById("questionBox").textContent="Q"+(current+1)+". "+questions[current].q;
 document.getElementById("msg").textContent="";
 createChests();
}

function createChests(){
 const wrap=document.getElementById("chests");
 wrap.innerHTML="";
 const item=questions[current];
 const shuffled=[...item.options].sort(()=>Math.random()-0.5);
 const positions=[120,410,700];

 shuffled.forEach((opt,i)=>{
  const chest=document.createElement("div");
  chest.className="chest";
  chest.style.left=positions[i]+"px";
  chest.style.top="180px";
  chest.dataset.answer=opt;
  chest.innerHTML=`
    <div class="chestTop"></div>
    <div class="chestBody"></div>
    <div class="lock"></div>
    <div class="answerText">${opt}</div>
  `;
  chest.onclick=()=>selectChest(chest,opt);
  wrap.appendChild(chest);
 });
}

function selectChest(chest,selected){
 if(locked)return;

 if(selected===questions[current].ans){
  locked=true;
  correctChest(chest);
 }else{
  wrongChest(chest);
 }
}

function correctChest(chest){
 document.getElementById("correctSound").play();
 score++;
 document.getElementById("score").textContent=score;
 document.getElementById("msg").style.color="green";
 document.getElementById("msg").textContent="Correct Treasure Found!";
 chest.classList.add("open");
 showCoins(chest);
 current++;
 setTimeout(loadQuestion,1500);
}

function wrongChest(chest){
 document.getElementById("wrongSound").play();
 chest.classList.add("shake");
 chances--;
 document.getElementById("chances").textContent=chances;
 document.getElementById("msg").style.color="red";

 if(chances>0){
  document.getElementById("msg").textContent="Wrong Treasure! Try Again.";
  setTimeout(()=>chest.classList.remove("shake"),700);
 }else{
  locked=true;
  const correctAnswer=questions[current].ans;
  document.getElementById("msg").textContent="Wrong! Correct Answer: "+correctAnswer;

  document.querySelectorAll(".chest").forEach(c=>{
   if(c.dataset.answer===correctAnswer){
    c.classList.add("open");
    showCoins(c);
   }
  });

  current++;
  setTimeout(loadQuestion,2200);
 }
}

function showCoins(chest){
 for(let i=0;i<12;i++){
  const coin=document.createElement("div");
  coin.className="coinBurst";
  coin.innerHTML="🪙";
  coin.style.left=(chest.offsetLeft+60+Math.random()*60)+"px";
  coin.style.top=(chest.offsetTop+40)+"px";
  document.getElementById("gameArea").appendChild(coin);
  setTimeout(()=>coin.remove(),1000);
 }
}

function winGame(){
 document.getElementById("clapSound").play();
 document.getElementById("endTitle").textContent="You Win!";
 document.getElementById("finalScore").textContent=score+" / "+questions.length;
 document.getElementById("end").style.display="flex";
}
</script>

</body>
</html>
