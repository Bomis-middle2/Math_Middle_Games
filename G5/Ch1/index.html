<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Treasure Hunt</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-user-select: none;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f0f2d; /* Subtle midnight sapphire */
    color: white;
    overflow-x: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* 1. 5-Second Splash Loader Viewport Overlays */
.screen {
    position: fixed;
    inset: 0;
    background: #0f0f2d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    text-align: center;
}
#loader {
    background: #ffffff;
    color: #111111;
}
.logo {
    width: 220px;
    max-width: 60vw;
    margin-bottom: 24px;
}
.loading-box {
    width: 240px;
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 15px;
}
.loading-fill {
    width: 0%;
    height: 100%;
    background: #ff007f;
    transition: width 0.1s linear;
}

/* 2. Simplified Instructions Component UI Card */
.menu-card {
    background: rgba(255, 255, 255, 0.06);
    border: 2px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 35px 25px;
    border-radius: 24px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.instructions p {
    font-size: 1.1rem;
    line-height: 1.5;
    margin-bottom: 14px;
    color: #cbd5e1;
    text-align: left;
}
button {
    border: 0;
    border-radius: 30px;
    background: linear-gradient(135deg, #ff007f, #7f00ff);
    color: white;
    font-size: 1.15rem;
    font-weight: bold;
    padding: 14px 40px;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 20px rgba(255, 0, 127, 0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 15px;
}
button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5);
}
button:active {
    transform: scale(0.98);
}

/* 3. Fully Cross-Device Adaptive Layout Components */
#hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 20px;
    font-size: 1.15rem;
    font-weight: bold;
    color: #00ffff;
    text-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
}
#questionBox {
    width: 90%;
    max-width: 900px;
    margin: 5px auto 15px auto;
    background: linear-gradient(145deg, rgba(255, 0, 127, 0.15), rgba(127, 0, 255, 0.08));
    border: 2px solid #ff007f;
    border-radius: 18px;
    padding: 18px;
    font-size: 1.4rem;
    font-weight: bold;
    box-shadow: inset 0 0 15px rgba(255, 0, 127, 0.1);
}
#gameArea {
    position: relative;
    width: 90%;
    max-width: 900px;
    flex: 1;
    min-height: 320px;
    max-height: 460px;
    margin: 0 auto;
    border-radius: 24px;
    border: 3px solid rgba(255, 255, 255, 0.2);
    background: linear-gradient(#1e1e4f 0%, #13133a 100%);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
}
#chests {
    display: flex;
    justify-content: space-around;
    align-items: center;
    width: 100%;
    padding: 0 20px;
    gap: 15px;
    flex-wrap: nowrap;
}

/* Creative Chest Components Scaling across viewports */
.chest {
    position: relative;
    width: 100%;
    max-width: 190px;
    aspect-ratio: 1 / 1;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.chest:hover {
    transform: scale(1.05);
}
.chestTop {
    width: 100%;
    height: 40%;
    background: #7b3f00;
    border: 3px solid #3b1d00;
    border-radius: 14px 14px 4px 4px;
    position: absolute;
    top: 0;
    transition: transform 0.3s ease;
}
.chestBody {
    width: 100%;
    height: 65%;
    background: #a85a10;
    border: 3px solid #3b1d00;
    border-radius: 0 0 14px 14px;
    position: absolute;
    bottom: 0;
}
.lock {
    width: 16%;
    height: 25%;
    background: gold;
    border: 2.5px solid #5c4200;
    position: absolute;
    left: 42%;
    top: 32%;
    border-radius: 4px;
    z-index: 2;
}
.answerText {
    position: absolute;
    width: 100%;
    bottom: -35px;
    font-size: 1.25rem;
    font-weight: 800;
    color: #ffffff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}
.open .chestTop {
    transform: rotate(-30deg) translateY(-10px);
    transform-origin: left bottom;
}

/* 5. 2-Chance System Border/Color Assists Templates */
.cell-reveal-correct .chestBody {
    background: #10b981 !important;
    border-color: #047857 !important;
}
.cell-reveal-correct .chestTop {
    background: #059669 !important;
    border-color: #047857 !important;
}
.coinBurst {
    position: absolute;
    font-size: 2rem;
    pointer-events: none;
    z-index: 10;
    animation: burst 0.8s ease-out forwards;
}
@keyframes burst {
    0% { transform: translateY(0) scale(0.3); opacity: 1; }
    100% { transform: translateY(-100px) scale(1.4); opacity: 0; }
}
.shake {
    animation: shake 0.4s ease-in-out;
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
