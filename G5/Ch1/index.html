<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Treasure Hunt</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-user-select: none;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f0f2d; /* Subtle midnight sapphire */
    color: white;
    overflow-x: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* 1. 5-Second Splash Loader Viewport Overlays */
.screen {
    position: fixed;
    inset: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
    text-align: center;
}
.logo {
    width: 220px;
    max-width: 60vw;
    margin-bottom: 24px;
}
.loading-box {
    width: 240px;
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 15px;
}
.loading-fill {
    width: 0%;
    height: 100%;
    background: #ff007f;
}

/* 2. Simplified Instructions Component UI Card */
#instruction-screen {
    background: #0f0f2d;
    z-index: 500;
}
.menu-card {
    background: rgba(255, 255, 255, 0.06);
    border: 2px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 35px 25px;
    border-radius: 24px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.menu-card h2 {
    color: #ff007f;
    margin-bottom: 20px;
    font-size: 1.8rem;
}
.instructions p {
    font-size: 1.1rem;
    line-height: 1.5;
    margin-bottom: 14px;
    color: #cbd5e1;
    text-align: left;
}
button {
    border: 0;
    border-radius: 30px;
    background: linear-gradient(135deg, #ff007f, #7f00ff);
    color: white;
    font-size: 1.15rem;
    font-weight: bold;
    padding: 14px 40px;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 20px rgba(255, 0, 127, 0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 15px;
}
button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5);
}
button:active {
    transform: scale(0.98);
}

/* 3. Fully Cross-Device Adaptive Layout Components */
.hidden { display: none !important; }

#game-container {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 10px;
}

#hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 20px;
    font-size: 1.15rem;
    font-weight: bold;
    color: #00ffff;
    text-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
}
#questionBox {
    width: 90%;
    max-width: 900px;
    margin: 5px auto 15px auto;
    background: linear-gradient(145deg, rgba(255, 0, 127, 0.15), rgba(127, 0, 255, 0.08));
    border: 2px solid #ff007f;
    border-radius: 18px;
    padding: 18px;
    font-size: 1.3rem;
    font-weight: bold;
    text-align: center;
    box-shadow: inset 0 0 15px rgba(255, 0, 127, 0.1);
    line-height: 1.5;
}
#gameArea {
    position: relative;
    width: 90%;
    max-width: 900px;
    flex: 1;
    min-height: 320px;
    max-height: 460px;
    margin: 0 auto;
    border-radius: 24px;
    border: 3px solid rgba(255, 255, 255, 0.2);
    background: linear-gradient(#1e1e4f 0%, #13133a 100%);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
}
#chests {
    display: flex;
    justify-content: space-around;
    align-items: center;
    width: 100%;
    padding: 0 20px;
    gap: 15px;
    flex-wrap: nowrap;
}

/* Chest Layout Components Scaling */
.chest-wrapper {
    width: 23%;
    max-width: 160px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.chest {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.chest:hover:not(.disabled) {
    transform: scale(1.05);
}
.chestTop {
    width: 100%;
    height: 40%;
    background: #7b3f00;
    border: 3px solid #3b1d00;
    border-radius: 14px 14px 4px 4px;
    position: absolute;
    top: 0;
    z-index: 3;
    transition: transform 0.3s ease;
}
.chestBody {
    width: 100%;
    height: 65%;
    background: #a85a10;
    border: 3px solid #3b1d00;
    border-radius: 0 0 14px 14px;
    position: absolute;
    bottom: 0;
    z-index: 1;
    transition: background 0.3s, border-color 0.3s;
}
.lock {
    width: 16%;
    height: 25%;
    background: gold;
    border: 2.5px solid #5c4200;
    position: absolute;
    left: 42%;
    top: 32%;
    border-radius: 4px;
    z-index: 4;
    transition: opacity 0.2s;
}
.answerText {
    margin-top: 15px;
    font-size: 1.1rem;
    font-weight: 800;
    color: #ffffff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    text-align: center;
    width: 100%;
}

/* Open states */
.open .chestTop {
    transform: rotate(-30deg) translateY(-10px);
    transform-origin: left bottom;
}
.open .lock {
    opacity: 0;
}

/* Feedback/Status Indicators */
.cell-reveal-correct .chestBody {
    background: #10b981 !important;
    border-color: #047857 !important;
}
.cell-reveal-correct .chestTop {
    background: #059669 !important;
    border-color: #047857 !important;
}
.cell-reveal-wrong .chestBody {
    background: #ef4444 !important;
    border-color: #991b1b !important;
}
.cell-reveal-wrong .chestTop {
    background: #dc2626 !important;
    border-color: #991b1b !important;
}
.disabled {
    pointer-events: none;
    opacity: 0.7;
}

#feedback-box {
    width: 90%;
    max-width: 900px;
    margin: 15px auto 0 auto;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.08);
    border-left: 5px solid #ff007f;
    color: #cbd5e1;
    line-height: 1.5;
    font-size: 1.05rem;
}

.coinBurst {
    position: absolute;
    font-size: 2rem;
    pointer-events: none;
    z-index: 10;
    animation: burst 0.8s ease-out forwards;
}
@keyframes burst {
    0% { transform: translateY(0) scale(0.3); opacity: 1; }
    100% { transform: translateY(-100px) scale(1.4); opacity: 0; }
}
.shake {
    animation: shake 0.4s ease-in-out;
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
}

.action-row {
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 10px;
}

/* Result panel elements */
#result-screen {
    background: #0f0f2d;
    z-index: 600;
}
.creative-pop {
    font-size: 4.5rem;
    animation: popScale 1.5s infinite alternate ease-in-out;
    margin-bottom: 15px;
}
@keyframes popScale {
    0% { transform: scale(1); }
    100% { transform: scale(1.12); }
}

@media(max-width: 600px) {
    #questionBox { font-size: 1.05rem; padding: 12px; width: 95%; }
    #gameArea { width: 95%; min-height: 260px; }
    #chests { padding: 0 5px; gap: 8px; }
    .answerText { font-size: 0.85rem; margin-top: 8px; }
    button { padding: 12px 30px; font-size: 1rem; }
    .creative-pop { font-size: 3.5rem; }
    #feedback-box { font-size: 0.95rem; width: 95%; }
}
</style>
</head>
<body>

<div id="loader" class="screen">
    <img src="assets/logo.png" alt="Logo" class="logo">
    <div class="loading-box">
        <div id="loading-fill" class="loading-fill"></div>
    </div>
</div>

<div id="instruction-screen" class="screen hidden">
    <div class="menu-card">
        <h2>Instructions</h2>
        <div class="instructions">
            <p>• Read each question carefully.</p>
            <p>• You will get 2 chances to select the correct answer.</p>
            <p>• If both answers are wrong, the right answer will be displayed.</p>
        </div>
        <button onclick="startGame()">Start Game</button>
    </div>
</div>

<div id="game-container" class="hidden">
    <div id="hud">
        <span>Challenge: <span id="q-num">1</span>/10</span>
        <span>Stars: ⭐ <span id="score">0</span></span>
    </div>

    <div id="questionBox"></div>

    <div id="gameArea">
        <div id="chests">
            <div class="chest-wrapper" id="wrap-0">
                <div class="chest" id="chest-0" onclick="handleSelection(0)">
                    <div class="chestTop"></div>
                    <div class="lock"></div>
                    <div class="chestBody"></div>
                </div>
                <div class="answerText" id="text-0"></div>
            </div>

            <div class="chest-wrapper" id="wrap-1">
                <div class="chest" id="chest-1" onclick="handleSelection(1)">
                    <div class="chestTop"></div>
                    <div class="lock"></div>
                    <div class="chestBody"></div>
                </div>
                <div class="answerText" id="text-1"></div>
            </div>

            <div class="chest-wrapper" id="wrap-2">
                <div class="chest" id="chest-2" onclick="handleSelection(2)">
                    <div class="chestTop"></div>
                    <div class="lock"></div>
                    <div class="chestBody"></div>
                </div>
                <div class="answerText" id="text-2"></div>
            </div>

            <div class="chest-wrapper" id="wrap-3">
                <div class="chest" id="chest-3" onclick="handleSelection(3)">
                    <div class="chestTop"></div>
                    <div class="lock"></div>
                    <div class="chestBody"></div>
                </div>
                <div class="answerText" id="text-3"></div>
            </div>
        </div>
    </div>

    <div id="feedback-box" class="hidden"></div>

    <div class="action-row">
        <button id="next-btn" class="hidden" onclick="loadNextQuestion()">Next Challenge ➡️</button>
    </div>
</div>

<div id="result-screen" class="screen hidden">
    <div class="menu-card" style="text-align: center;">
        <div class="creative-pop">🌟🏆🌟</div>
        <h2 style="color: #ff007f; margin-bottom: 15px;">Congratulations on Completion!</h2>
        <p id="result-msg" style="font-size: 1.15rem; color: #cbd5e1; margin-bottom: 25px; line-height: 1.6;"></p>
        <button onclick="location.reload()">Restart Lab</button>
    </div>
</div>

<script>
const audio = {
    correct: new Audio('assets/correct.mp3'),
    wrong: new Audio('assets/wrong.mp3'),
    claps: new Audio('assets/freesound_community-claps-44774.mp3')
};

// Pure question dataset restored from case 1 without any change
const questions = [
    {
        q: "A gardener wants to plant 24 saplings in equal rows. Which of these is NOT a possible arrangement for the garden layout?",
        options: ["A) 4 rows of 6", "B) 3 rows of 8", "C) 5 rows of 5", "D) 2 rows of 12"],
        ans: 2,
        explain: "5 is not a factor of 24. A configuration of 5 rows of 5 would require 25 saplings (5 * 5 = 25), leaving the arrangement incomplete."
    },
    {
        q: "A teacher wants to distribute 135 pencils equally among 5 students. Without using long division, how can she be sure it is perfectly possible?",
        options: [
            "A) The last digit is 5.",
            "B) The sum of the digits is 9.",
            "C) The number is even.",
            "D) The number ends in 0."
        ],
        ans: 0,
        explain: "According to the mathematical rules of divisibility, any whole number that ends with either 0 or 5 is exactly divisible by 5."
    },
    {
        q: "Which of the following numbers of chocolates cannot be shared equally among a group larger than one because it is a Prime Number?",
        options: ["A) 15", "B) 17", "C) 21", "D) 25"],
        ans: 1,
        explain: "17 is a prime number. It possesses exactly two distinct factors: 1 and itself (17), meaning it cannot be broken down into equal sub-groups."
    },
    {
        q: "Two decorative ribbons are 12 cm and 18 cm long. What is the longest equal piece length they can both be perfectly cut into?",
        options: ["A) 2 cm", "B) 3 cm", "C) 6 cm", "D) 9 cm"],
        ans: 2,
        explain: "To find the longest equal section, calculate the Highest Common Factor (HCF) of 12 and 18, which is 6 cm."
    },
    {
        q: "Two automated alarm bells toll at intervals of 4 and 6 minutes respectively. If they toll together right now, after how many minutes will they toll together again?",
        options: ["A) 10 minutes", "B) 2 minutes", "C) 12 minutes", "D) 24 minutes"],
        ans: 2,
        explain: "The time interval before they synchronize again is equal to the Least Common Multiple (LCM) of 4 and 6, which computes to 12 minutes."
    },
    {
        q: "Which of these numbers does NOT logically belong in the group because it is missing from the multiples of 8?",
        options: ["A) 16", "B) 24", "C) 34", "D) 40"],
        ans: 2,
        explain: "16 (8 * 2), 24 (8 * 3), and 40 (8 * 5) are all multiples of 8. 34 is not divisible by 8."
    },
    {
        q: "In a structural factor tree of the number 12, if one sub-branch splits into a value of 3, what must the companion branch at that exact level be?",
        options: ["A) 9", "B) 4", "C) 2", "D) 6"],
        ans: 1,
        explain: "Branches at the same node of a factor tree represent factors whose product equals the parent value. Since 3 * 4 = 12, the missing branch value must be 4."
    },
    {
        q: "Two classmates discover that their class roll numbers are 'Co-prime.' This mathematical definition ensures that their only shared common factor is:",
        options: ["A) 0", "B) 2", "C) 1", "D) Their mathematical product"],
        ans: 2,
        explain: "Co-prime numbers are pairs of integers that do not share any common numerical factors with each other except for the number 1."
    },
    {
        q: "In a standard overlapping Venn diagram tracking the factors of 10 (1, 2, 5, 10) and 15 (1, 3, 5, 15), which common factor should be placed directly inside the center intersection?",
        options: ["A) 2", "B) 3", "C) 5", "D) 10"],
        ans: 2,
        explain: "The intersection zone in a Venn diagram holds shared values. 5 is a common factor found in both sets."
    },
    {
        q: "The HCF of two numbers is 4 and their LCM is 24. If one of these numbers is known to be 8, what value must the other number hold?",
        options: ["A) 12", "B) 6", "C) 16", "D) 20"],
        ans: 0,
        explain: "Use the relationship property formula: HCF * LCM = Product of the two numbers. Here, 4 * 24 = 96. Dividing by the known number gives the missing one: 96 ÷ 8 = 12."
    }
];

let currentIdx = 0;
let score = 0;
let attempts = 0;
let interactionLocked = false;

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

// 1) Initializing Logo screen loading tracking framework exactly 5 seconds
window.addEventListener('DOMContentLoaded', () => {
    shuffleArray(questions);
    const fill = document.getElementById('loading-fill');
    let progress = 0;
    
    const interval = setInterval(() => {
        progress += 2;
        fill.style.width = progress + '%';
        if (progress >= 100) {
            clearInterval(interval);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('instruction-screen').classList.remove('hidden');
        }
    }, 95);
});

function startGame() {
    document.getElementById('instruction-screen').classList.add('hidden');
    document.getElementById('game-container').classList.remove('hidden');
    loadQuestion();
}

function loadQuestion() {
    interactionLocked = false;
    attempts = 0;
    document.getElementById('next-btn').classList.add('hidden');
    document.getElementById('feedback-box').classList.add('hidden');
    document.getElementById('q-num').innerText = currentIdx + 1;
    
    const data = questions[currentIdx];
    document.getElementById('questionBox').innerText = data.q;

    for (let i = 0; i < 4; i++) {
        const chest = document.getElementById(`chest-${i}`);
        const wrapper = document.getElementById(`wrap-${i}`);
        const text = document.getElementById(`text-${i}`);
        
        chest.className = "chest";
        wrapper.className = "chest-wrapper";
        text.innerText = data.options[i];
    }
}

// 5) Two interactive selection chances setup with automatic answer generation tracking
function handleSelection(selectedIdx) {
    if (interactionLocked) return;
    
    const data = questions[currentIdx];
    const fb = document.getElementById('feedback-box');
    const targetChest = document.getElementById(`chest-${selectedIdx}`);
    const targetWrapper = document.getElementById(`wrap-${selectedIdx}`);

    if (selectedIdx === data.ans) {
        interactionLocked = true;
        targetChest.classList.add('open', 'cell-reveal-correct');
        triggerCoinEffect(targetWrapper);
        
        try { audio.correct.play(); } catch(e){}
        if (attempts === 0) score++;
        document.getElementById('score').innerText = score;
        
        fb.innerHTML = `<b>🌟 Correct!</b><br>${data.explain}`;
        fb.classList.remove('hidden');
        
        disableAllChests();
        document.getElementById('next-btn').classList.remove('hidden');
    } else {
        attempts++;
        try { audio.wrong.play(); } catch(e){}
        
        targetWrapper.classList.add('shake');
        setTimeout(() => targetWrapper.classList.remove('shake'), 400);

        if (attempts < 2) {
            targetChest.classList.add('disabled', 'cell-reveal-wrong');
            fb.innerHTML = `<b>Not quite right!</b> Check the properties carefully. You have 1 attempt remaining.`;
            fb.classList.remove('hidden');
        } else {
            interactionLocked = true;
            targetChest.classList.add('disabled', 'cell-reveal-wrong');
            disableAllChests();
            
            // Open and reveal correct node path
            document.getElementById(`chest-${data.ans}`).classList.add('open', 'cell-reveal-correct');
            fb.innerHTML = `<b>Out of attempts!</b> The correct choice was: <i>${data.options[data.ans]}</i>.<br>${data.explain}`;
            fb.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }
    }
}

function disableAllChests() {
    for (let i = 0; i < 4; i++) {
        document.getElementById(`chest-${i}`).classList.add('disabled');
    }
}

function triggerCoinEffect(parent) {
    const burst = document.createElement('div');
    burst.className = 'coinBurst';
    burst.innerText = '🪙✨';
    parent.appendChild(burst);
    setTimeout(() => burst.remove(), 800);
}

function loadNextQuestion() {
    currentIdx++;
    if (currentIdx < questions.length) {
        loadQuestion();
    } else {
        showEvaluationPanel();
    }
}

function showEvaluationPanel() {
    document.getElementById('game-container').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    try { audio.claps.play(); } catch(e){}
    
    let message = `Fantastic effort! You have successfully resolved all our factors and multiples challenges and completed the module!`;
    if (score === questions.length) {
        message = `Sensational work! You managed to solve every single number theory puzzle with absolute precision. Incredible job!`;
    }
    
    document.getElementById('result-msg').innerText = message;
}
</script>

</body>
</html>
