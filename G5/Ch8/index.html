<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Master Quest</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #1e140a;
            color: #3e2723;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        #game-window {
            width: 100%;
            max-width: 460px;
            height: 740px;
            background: #fbf4db;
            border: 6px solid #8b5a2b;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- STAGE 1: 5-SECOND SPLASH SCREEN --- */
        #innovine-splash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .splash-logo {
            max-width: 200px;
            height: auto;
        }

        /* --- STAGE 2: SIMPLE INSTRUCTIONS SCREEN --- */
        #instruction-screen {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            background: #fdf8e9;
        }
        .scroll-box {
            background: #fffdf6;
            border: 2px dashed #a17042;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            width: 100%;
        }
        .scroll-box ol {
            text-align: left;
            margin-left: 20px;
        }
        .scroll-box li {
            margin-bottom: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #5d4037;
        }

        /* --- STAGE 3: MAIN GAMEPLAY HUB --- */
        #gameplay-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .top-navbar {
            background: #5d4037;
            color: #fdd835;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            border-bottom: 4px solid #4e342e;
            font-size: 0.9rem;
        }
        .score-lbl {
            background: #795548;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .quest-container {
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            text-align: center;
            background: #f5ecc8;
            border-bottom: 2px solid #dfd4a7;
            min-height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- MAP LAYOUT GRID --- */
        .map-viewport {
            flex-grow: 1;
            background: #e8dbb4;
            position: relative;
            border-bottom: 3px solid #8b5a2b;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            padding: 6px;
        }

        .map-node {
            background: #f3eacf;
            border: 2px solid #cfc299;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 800;
            text-align: center;
            padding: 4px;
            box-shadow: inset 0 0 6px rgba(0,0,0,0.05);
        }
        .map-node span {
            font-size: 1.6rem;
            margin-bottom: 2px;
        }

        .compass-overlay {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #5d4037;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .scale-footer-bar {
            background: #3e2723;
            color: #fff;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 4px;
            letter-spacing: 0.5px;
        }

        /* --- CONTROLS AND INTERFACES --- */
        .interaction-panel {
            padding: 12px;
            background: #fbf4db;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hint-alert-box {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        .chance-heart-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .heart {
            font-size: 1.1rem;
            color: #e53935;
        }
        .heart.lost {
            color: #b0bec5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-choice {
            background: #ffffff;
            border: 2px solid #bda47e;
            border-radius: 8px;
            padding: 12px 6px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #4e342e;
            cursor: pointer;
            box-shadow: 0 3px 0 #bda47e;
            transition: all 0.1s ease;
        }
        .btn-choice:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .action-submit-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px #d35400;
            width: 100%;
        }
        .action-submit-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-window">
        
        <div id="innovine-splash">
            <img src="assets/logo.png" class="splash-logo" alt="Innovine Logo" onerror="this.src='https://placehold.co/180x60/ffffff/1a120b?text=INNOVINE';">
        </div>

        <div id="instruction-screen" class="hidden">
            <h2 style="color: #8b5a2b; font-size: 1.4rem;">🗺️ Map Master Quest</h2>
            <div class="scroll-box">
                <ol>
                    <li>Look closely at the map grid layouts.</li>
                    <li>Read the scale bar limits to measure distances.</li>
                    <li>You have **2 chances max** per question. Missing the second attempt automatically displays the right answer!</li>
                </ol>
            </div>
            <button class="action-submit-btn" onclick="startAdventure()">Enter Game</button>
        </div>

        <div id="gameplay-screen" class="hidden">
            <div class="top-navbar">
                <div id="lvl-lbl">Quest: 1 / 10</div>
                <div id="xp-lbl" class="score-lbl">0 XP</div>
            </div>

            <div id="quest-txt-box" class="quest-container">Loading coordinates...</div>

            <div class="map-viewport" id="map-grid-view"></div>

            <div class="scale-footer-bar" id="scale-indicator-bar">Map Blueprint</div>

            <div class="interaction-panel">
                <div class="chance-heart-row" id="hearts-box">
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                </div>
                
                <div class="hint-alert-box" id="hint-bubble"></div>
                
                <div class="options-grid" id="choices-box"></div>
            </div>
        </div>

    </div>

    <script>
        // Sound Handles
        const soundCorrect = new Audio('assets/correct.mp3');
        const soundWrong = new Audio('assets/wrong.mp3');

        function playSoundTrack(audioObj) {
            try {
                audioObj.currentTime = 0;
                audioObj.play();
            } catch(e) { console.log("Audio pipeline configuration complete."); }
        }

        let currentActiveQuestions = [];
        let levelIdx = 0;
        let totalXp = 0;
        let attemptCount = 0;

        // Shared static layout to retain item positions flawlessly
        const standardLayout = [
            { label: "School", icon: "🏫" }, { label: "Fire Station", icon: "🚒" }, { label: "Park", icon: "🌳" },
            { label: "Post Office", icon: "📮" }, { label: "House", icon: "🏡" }, { label: "Empty Space", icon: "🌾" },
            { label: "Pond", icon: "💧" }, { label: "Mall", icon: "🛍️" }, { label: "Library", icon: "📚" }
        ];

        // 15-Question Bank Matrix
        const rawQuestionBank = [
            {
                question: "Look at the map. What building is directly NORTH of the Post Office?",
                scaleText: "Orientation Blueprint Map",
                choices: ["School", "Mall", "Park", "Pond"],
                correctAnswer: "School",
                hint: "💡 HINT: Find the Post Office 📮 in the center row. Look directly above it (Up is North!)."
            },
            {
                question: "Step out of the Park 🌳, walk West (left) along the road, and take the first turn heading South (down). What building do you reach?",
                scaleText: "Navigational Route Map",
                choices: ["Library", "School", "Fire Station", "Pond"],
                correctAnswer: "Library",
                hint: "💡 HINT: Moving left from the Park leads to the central street. Turning South (downwards) points straight to the Library 📚."
            },
            {
                question: "The map distance between the School and the House is 3 cm. If the scale is 1 cm = 4 km, what is the actual distance?",
                scaleText: "Map Ratio Scale: 1 cm = 4 km",
                choices: ["7 km", "12 km", "16 km", "24 km"],
                correctAnswer: "12 km",
                hint: "💡 HINT: Multiply the map measurement by the scale factor: 3 cm × 4 km."
            },
            {
                question: "The distance from the Fire Station to the Library is 5 cm on paper. If 1 cm = 10 km, how long is the real journey?",
                scaleText: "Map Ratio Scale: 1 cm = 10 km",
                choices: ["15 km", "40 km", "50 km", "500 km"],
                correctAnswer: "50 km",
                hint: "💡 HINT: Take the 5 cm length and multiply it by 10."
            },
            {
                question: "The real distance from the Pond to the Mall is 45 km. If our map scale is 1 cm = 9 km, how many cm is this distance drawn on paper?",
                scaleText: "Reverse Scale Logic: 1 cm = 9 km",
                choices: ["4 cm", "5 cm", "9 cm", "36 cm"],
                correctAnswer: "5 cm",
                hint: "💡 HINT: To find map centimeters from real kilometers, divide: 45 ÷ 9."
            },
            {
                question: "Which directional zone is the School located in relative to the central House?",
                scaleText: "Intermediate Compass Directions",
                choices: ["North-West", "North-East", "South-West", "South-East"],
                correctAnswer: "North-West",
                hint: "💡 HINT: Look from the central House 🏡 up and to the left to find the School 🏫. That is North-West!"
            },
            {
                question: "If 1 cm on our map represents 25 meters, what real-world distance does a 4 cm line show?",
                scaleText: "Scale Matrix: 1 cm = 25 m",
                choices: ["50 m", "75 m", "100 m", "125 m"],
                correctAnswer: "100 m",
                hint: "💡 HINT: Calculate 4 cm multiplied by 25 meters per centimeter."
            },
            {
                question: "What building occupies the coordinates directly SOUTH of the Fire Station?",
                scaleText: "Compass Reading Challenge",
                choices: ["House", "Mall", "School", "Library"],
                correctAnswer: "House",
                hint: "💡 HINT: Find the top-middle Fire Station 🚒 and move down (South) exactly one square."
            },
            {
                question: "If you walk East (right) from the School, what is the first building or place you pass?",
                scaleText: "Orientation and Pathways",
                choices: ["Fire Station", "Park", "Post Office", "Mall"],
                correctAnswer: "Fire Station",
                hint: "💡 HINT: Start at the top-left School 🏫 and move right (East) along the top lane."
            },
            {
                question: "A route from the House to the Mall is measured as 2 cm on paper. If the scale is 1 cm = 15 km, what is the real distance?",
                scaleText: "Scale Calculation: 1 cm = 15 km",
                choices: ["17 km", "30 km", "45 km", "60 km"],
                correctAnswer: "30 km",
                hint: "💡 HINT: Double the scale unit value: 2 cm × 15 km."
            },
            {
                question: "The real highway distance between two cities is 80 km. If the blueprint scale is 1 cm = 20 km, how long should the line be on paper?",
                scaleText: "Scale Division Practice",
                choices: ["2 cm", "4 cm", "6 cm", "8 cm"],
                correctAnswer: "4 cm",
                hint: "💡 HINT: Divide the total real distance by the scale factor: 80 ÷ 20."
            },
            {
                question: "What feature sits at the South-West corner of our map?",
                scaleText: "Grid Coordinates & Corners",
                choices: ["Pond", "Library", "School", "Park"],
                correctAnswer: "Pond",
                hint: "💡 HINT: South-West is the bottom-left corner of the grid map."
            },
            {
                question: "What feature sits at the South-East corner of our map?",
                scaleText: "Grid Coordinates & Corners",
                choices: ["Library", "Pond", "Park", "Mall"],
                correctAnswer: "Library",
                hint: "💡 HINT: South-East is the bottom-right corner of the grid map."
            },
            {
                question: "If the scale bar reads 1 cm = 50 meters, how many real meters does a 3 cm line show?",
                scaleText: "Scale Expansion: 1 cm = 50 m",
                choices: ["100 m", "150 m", "200 m", "250 m"],
                correctAnswer: "150 m",
                hint: "💡 HINT: Triple the value: 3 cm multiplied by 50 meters."
            },
            {
                question: "You are at the Fire Station 🚒 and need to go to the Mall 🛍️. Which direction do you look?",
                scaleText: "Cardinal Positioning Check",
                choices: ["North", "South", "East", "West"],
                correctAnswer: "South",
                hint: "💡 HINT: The Fire Station is at the top row, and the Mall is directly underneath it in the bottom row."
            }
        ];

        // 5-Second Brand Timeout Screen
        setTimeout(() => {
            const splash = document.getElementById("innovine-splash");
            if(splash) {
                splash.style.opacity = "0";
                setTimeout(() => {
                    splash.remove();
                    document.getElementById("instruction-screen").classList.remove("hidden");
                }, 600);
            }
        }, 5000);

        // Fisher-Yates Array Shuffler
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startAdventure() {
            // Select 10 random questions out of the full bank pool
            let fullShuffledPool = shuffleArray([...rawQuestionBank]);
            currentActiveQuestions = fullShuffledPool.slice(0, 10);
            
            // Randomize individual question options positioning layout
            currentActiveQuestions.forEach(q => {
                q.choices = shuffleArray([...q.choices]);
            });

            levelIdx = 0;
            totalXp = 0;

            document.getElementById("instruction-screen").classList.add("hidden");
            document.getElementById("gameplay-screen").classList.remove("hidden");
            loadQuestData();
        }

        function loadQuestData() {
            if (levelIdx >= currentActiveQuestions.length) {
                renderEndGameScreen();
                return;
            }

            attemptCount = 0;
            document.getElementById("hint-bubble").style.display = "none";
            updateHeartsUI();

            let data = currentActiveQuestions[levelIdx];
            document.getElementById("lvl-lbl").innerText = `Quest: ${levelIdx + 1} / 10`;
            document.getElementById("xp-lbl").innerText = `${totalXp} XP`;
            document.getElementById("quest-txt-box").innerText = data.question;
            document.getElementById("scale-indicator-bar").innerText = `📏 ${data.scaleText}`;

            // Draw current Grid Map View
            const viewGrid = document.getElementById("map-grid-view");
            viewGrid.innerHTML = "";
            standardLayout.forEach(item => {
                let div = document.createElement("div");
                div.className = "map-node";
                div.innerHTML = `<span>${item.icon}</span> ${item.label}`;
                viewGrid.appendChild(div);
            });

            // Set Compass Rose Overlay
            let compass = document.createElement("div");
            compass.className = "compass-overlay";
            compass.innerHTML = "N ⬆";
            viewGrid.appendChild(compass);

            // Populate Answer Choices
            const choicesBox = document.getElementById("choices-box");
            choicesBox.innerHTML = "";
            data.choices.forEach(ans => {
                let btn = document.createElement("button");
                btn.className = "btn-choice";
                btn.innerText = ans;
                btn.onclick = () => processAnswerSelection(ans, btn);
                choicesBox.appendChild(btn);
            });
        }

        function updateHeartsUI() {
            const hearts = document.getElementById("hearts-box").children;
            if(attemptCount === 0) {
                hearts[0].classList.remove("lost");
                hearts[1].classList.remove("lost");
            } else if (attemptCount === 1) {
                hearts[1].classList.add("lost");
            } else {
                hearts[0].classList.add("lost");
                hearts[1].classList.add("lost");
            }
        }

        function processAnswerSelection(selected, btnElement) {
            let data = currentActiveQuestions[levelIdx];

            if (selected === data.correctAnswer) {
                playSoundTrack(soundCorrect);
                btnElement.style.background = "#c3e6cb";
                btnElement.style.borderColor = "#28a745";
                
                totalXp += (attemptCount === 0) ? 100 : 50;
                document.getElementById("xp-lbl").innerText = `${totalXp} XP`;

                disableChoiceButtons();
                setTimeout(() => {
                    levelIdx++;
                    loadQuestData();
                }, 1400);
            } else {
                attemptCount++;
                playSoundTrack(soundWrong);
                btnElement.style.background = "#f5c6cb";
                btnElement.style.borderColor = "#dc3545";
                btnElement.disabled = true;
                updateHeartsUI();

                if (attemptCount === 1) {
                    let hintBox = document.getElementById("hint-bubble");
                    hintBox.innerText = data.hint;
                    hintBox.style.display = "block";
                } else {
                    // Out of chances on second attempt: Reveal the correct answer right away
                    let hintBox = document.getElementById("hint-bubble");
                    hintBox.innerHTML = `<span style="color:#dc3545">❌ Incorrect.</span> The right answer is: <strong>${data.correctAnswer}</strong>`;
                    hintBox.style.display = "block";
                    
                    disableChoiceButtons();
                    
                    // Auto advance forward cleanly after 2.5 seconds
                    setTimeout(() => {
                        levelIdx++;
                        loadQuestData();
                    }, 2500);
                }
            }
        }

        function disableChoiceButtons() {
            const btns = document.getElementById("choices-box").children;
            for(let b of btns) {
                b.disabled = true;
            }
        }

        function renderEndGameScreen() {
            document.getElementById("lvl-lbl").innerText = "FINISHED";
            document.getElementById("quest-txt-box").innerHTML = "🎉 Complete 10-Question Run Achieved!";
            
            let finalRank = totalXp >= 800 ? "Grand Master Cartographer 👑" : "Elite Explorer Master 🧭";

            document.getElementById("map-grid-view").style.display = "none";
            document.getElementById("scale-indicator-bar").style.display = "none";
            document.getElementById("hearts-box").style.display = "none";
            document.getElementById("hint-bubble").style.display = "none";
            document.getElementById("choices-box").style.display = "none";

            const mainWindow = document.getElementById("gameplay-screen");
            let summaryDiv = document.createElement("div");
            summaryDiv.style.cssText = "padding: 30px 16px; text-align: center; display: flex; flex-direction: column; gap: 15px; justify-content: center; align-items: center; flex-grow: 1;";
            summaryDiv.innerHTML = `
                <div style="font-size: 4rem;">🏆</div>
                <h3 style="color:#8b5a2b; font-size:1.3rem;">Total Final Score: ${totalXp} / 1000 XP</h3>
                <p style="font-size:0.95rem; font-weight:bold; background:#e6ccb2; padding:8px 14px; border-radius:8px;">
                    Rank Earned: <br><span style="color:#3e2723; font-size:1.1rem;">${finalRank}</span>
                </p>
                <button class="action-submit-btn" style="margin-top: 10px;" onclick="location.reload()">Play Again</button>
            `;
            mainWindow.appendChild(summaryDiv);
        }
    </script>
</body>
</html>
