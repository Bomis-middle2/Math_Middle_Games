<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 5 Math: Map Treasure Hunt</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1e120b;
            background-image: radial-gradient(#2d1b10 20%, transparent 20%), radial-gradient(#2d1b10 20%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #game-container {
            background: #fcf5e3;
            border: 8px solid #8b5a2b;
            border-image: linear-gradient(to bottom right, #a0522d, #8b5a2b, #cd853f) 10;
            border-radius: 4px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }

        #game-header {
            background: #5c3a21;
            color: #f7e7c4;
            padding: 12px;
            text-align: center;
            border-bottom: 4px solid #8b5a2b;
        }

        #game-header h1 {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            background: #e6ccb2;
            font-size: 0.9rem;
            font-weight: bold;
            border-bottom: 2px solid #b79477;
        }

        #screen-area {
            padding: 15px;
            min-height: 380px;
        }

        .map-box {
            background: #f1e3c3;
            border: 2px dashed #8b5a2b;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
            position: relative;
        }

        /* Vector Map Displays */
        .grid-map {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 10px auto;
            max-width: 280px;
        }

        .grid-cell {
            background: #e6dfc3;
            border: 1px solid #c9be9b;
            border-radius: 4px;
            padding: 8px 4px;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .compass-rose {
            width: 100px;
            height: 100px;
            margin: 10px auto;
            position: relative;
            background: #dfd3b3;
            border-radius: 50%;
            border: 2px solid #8b5a2b;
        }

        .compass-pointer {
            width: 4px;
            height: 40px;
            background: #d9534f;
            position: absolute;
            left: 48px;
            top: 10px;
            transform-origin: bottom center;
            transition: transform 0.5s ease;
        }

        .compass-label {
            position: absolute;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .lbl-n { top: 2px; left: 45px; }
        .lbl-e { right: 4px; top: 42px; }
        .lbl-s { bottom: 2px; left: 46px; }
        .lbl-w { left: 4px; top: 42px; }

        .quest-text {
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 15px;
            color: #4a2f1b;
            font-weight: 600;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .opt-btn {
            background: #fff;
            border: 2px solid #b79477;
            border-radius: 6px;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #5c3a21;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .opt-btn:hover {
            background: #fbf8f0;
            border-color: #8b5a2b;
        }

        .opt-btn:active {
            transform: scale(0.98);
        }

        .btn-prefix {
            background: #e6ccb2;
            width: 24px;
            height: 24px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin-right: 10px;
            font-size: 0.8rem;
        }

        #feedback-panel {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .feedback-correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback-wrong {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .action-btn {
            background: #bd7a42;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 4px #8b5a2b;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px #8b5a2b;
        }

        .victory-screen {
            text-align: center;
            padding: 20px 10px;
        }

        .badge {
            font-size: 4rem;
            margin: 15px 0;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .scale-bar-ui {
            background: #332215;
            color: #f7e7c4;
            padding: 4px 8px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 8px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="game-header">
            <h1 id="title-label">🗺️ The Map Master Quest</h1>
        </div>
        
        <div class="status-bar">
            <span id="level-indicator">Level: 1/5</span>
            <span id="score-indicator">Score: 0 XP</span>
        </div>

        <div id="screen-area">
            </div>

        <div id="feedback-panel"></div>
    </div>

    <script>
        // Game states
        let currentLevel = 0;
        let score = 0;
        let choiceLocked = false;

        // Level dataset mapped directly to definitions and test questions in the uploaded document
        const levels = [
            {
                title: "Level 1: Little Town Symbols",
                questText: "Look at the town map below. Based on standard map keys and orientation rules, what landmark is located directly North of the Post Office?",
                mapType: "grid",
                gridCells: [
                    { label: "🏥 Hospital", style: "" },
                    { label: "📚 Library", style: "" },
                    { label: "🌳 Town Park", style: "" },
                    { label: "💧 Little Lake", style: "" },
                    { label: "🏡 Neighborhood", style: "background:#d0e1fd;" },
                    { label: "🛍️ Market", style: "" },
                    { label: "🪵 Tree Stump", style: "" },
                    { label: "📮 Post Office", style: "background:#ffcca3;" },
                    { label: "🚂 Railroad Track", style: "" }
                ],
                scale: "Orientation Map",
                choices: [
                    "The Neighborhood",
                    "The Railroad Track",
                    "The Town Park",
                    "The Little Lake"
                ],
                correctAnswer: 0,
                explanations: "Correct! North is up on a map layout. The Neighborhood is directly above the Post Office!"
            },
            {
                title: "Level 2: The Compass Rose Turn",
                questText: "Raj is facing North towards the Market. If he turns 135 degrees clockwise to face the item in the South-East (SE) position, what will he be looking at?",
                mapType: "compass",
                rotation: 0, // Facing North
                scale: "Intercardinal Compass",
                choices: [
                    "🎒 School (South)",
                    "🏋️ Gym (East)",
                    "🌻 Flower Garden (South-East)",
                    "🚍 Bus Stop (North-West)"
                ],
                correctAnswer: 2,
                explanations: "Correct! South-East (SE) is the intermediate direction pointing halfway between South and East!"
            },
            {
                title: "Level 3: Linear Scale Math",
                questText: "Your adventurer tracking tool indicates that the distance between Kathipara Junction and the Ancient Ruins measures exactly 4 cm on the paper. If the map scale is 1 cm = 2 km, what is the actual travel distance on the ground?",
                mapType: "text-only",
                icon: "⛰️",
                scale: "Scale: 1 cm = 2 km",
                choices: [
                    "2 kilometers",
                    "6 kilometers",
                    "8 kilometers",
                    "12 kilometers"
                ],
                correctAnswer: 2,
                explanations: "Correct! 4 cm × 2 km/cm = 8 kilometers in real life!"
            },
            {
                title: "Level 4: Long Distance Scaling",
                questText: "To cross the dangerous Crocodile River, the explorer spans a distance on the blueprint chart that measures 3 cm long. If the map uses a proportion scale of 1 cm = 10 km, calculate the actual length of the river crossing.",
                mapType: "text-only",
                icon: "🐊",
                scale: "Scale: 1 cm = 10 km",
                choices: [
                    "13 kilometers",
                    "20 kilometers",
                    "30 kilometers",
                    "300 kilometers"
                ],
                correctAnswer: 2,
                explanations: "Correct! Multiply the blueprint length by the scale unit: 3 cm × 10 km = 30 km!"
            },
            {
                title: "Level 5: Escape the Treasure Vault",
                questText: "Final Room! The hidden exit door is exactly 3 grid blocks East of your position. If the scale bar states that 1 grid block = 25 miles, how many real-world miles must you travel to escape?",
                mapType: "grid",
                gridCells: [
                    { label: "🤠 You", style: "background:#ffe066;" },
                    { label: "🧱 Block", style: "" },
                    { label: "🧱 Block", style: "" },
                    { label: "🚪 Exit Door", style: "background:#a3ffa3;" },
                    { label: "🐍 Trap", style: "" },
                    { label: "🐍 Trap", style: "" },
                    { label: "🧱 Block", style: "" },
                    { label: "🧱 Block", style: "" },
                    { label: "🧱 Block", style: "" }
                ],
                scale: "1 Grid Block = 25 miles",
                choices: [
                    "50 miles",
                    "75 miles",
                    "100 miles",
                    "125 miles"
                ],
                correctAnswer: 1,
                explanations: "Fantastic! 3 grid blocks × 25 miles per block = 75 real miles. You unlocked the vault!"
            }
        ];

        function initGame() {
            currentLevel = 0;
            score = 0;
            loadLevel();
        }

        function loadLevel() {
            choiceLocked = false;
            const feedback = document.getElementById("feedback-panel");
            feedback.style.display = "none";
            
            if (currentLevel >= levels.length) {
                showVictory();
                return;
            }

            const lvl = levels[currentLevel];
            
            // Update Headers
            document.getElementById("level-indicator").innerText = `Level: ${currentLevel + 1}/${levels.length}`;
            document.getElementById("score-indicator").innerText = `Score: ${score} XP`;
            
            const screenArea = document.getElementById("screen-area");
            screenArea.innerHTML = "";

            // 1. Build Visual Map element based on type
            const mapBox = document.createElement("div");
            mapBox.className = "map-box";
            
            if (lvl.mapType === "grid") {
                const grid = document.createElement("div");
                grid.className = "grid-map";
                lvl.gridCells.forEach(c => {
                    const cell = document.createElement("div");
                    cell.className = "grid-cell";
                    cell.style = c.style;
                    cell.innerText = c.label;
                    grid.appendChild(cell);
                });
                mapBox.appendChild(grid);
            } else if (lvl.mapType === "compass") {
                mapBox.innerHTML = `
                    <div class="compass-rose">
                        <div class="compass-pointer" id="pointer-needle"></div>
                        <div class="compass-label lbl-n">N (Market)</div>
                        <div class="compass-label lbl-e">E (Gym)</div>
                        <div class="compass-label lbl-s">S (School)</div>
                        <div class="compass-label lbl-w">W (Bus Stop)</div>
                    </div>
                    <div style="font-size:0.8rem; font-weight:bold; color:#7a4f31;"> 중간방향 (NE: 체육관/유원지 | SE: 정원)</div>
                `;
            } else {
                mapBox.innerHTML = `<div style="font-size:3.5rem; margin:10px 0;">${lvl.icon}</div>`;
            }

            // Append Scale Bar
            const scaleBar = document.createElement("div");
            scaleBar.className = "scale-bar-ui";
            scaleBar.innerText = `📏 ${lvl.scale}`;
            mapBox.appendChild(scaleBar);
            screenArea.appendChild(mapBox);

            // 2. Question Text
            const qText = document.createElement("div");
            qText.className = "quest-text";
            qText.innerText = lvl.questText;
            screenArea.appendChild(qText);

            // 3. Choice list Tray
            const optionsTray = document.createElement("div");
            optionsTray.className = "options-list";
            
            lvl.choices.forEach((choice, index) => {
                const btn = document.createElement("button");
                btn.className = "opt-btn";
                btn.innerHTML = `<span class="btn-prefix">${String.fromCharCode(65 + index)}</span> ${choice}`;
                btn.onclick = () => selectAnswer(index, btn);
                optionsTray.appendChild(btn);
            });
            
            screenArea.appendChild(optionsTray);
            
            // Adjust needle spin animation on level 2
            if(lvl.mapType === "compass") {
                setTimeout(() => {
                    const needle = document.getElementById("pointer-needle");
                    if(needle) needle.style.transform = "rotate(135deg)";
                }, 400);
            }
        }

        function selectAnswer(selectedIndex, clickedBtn) {
            if (choiceLocked) return;
            choiceLocked = true;

            const lvl = levels[currentLevel];
            const feedback = document.getElementById("feedback-panel");
            feedback.style.display = "block";

            if (selectedIndex === lvl.correctAnswer) {
                score += 100;
                document.getElementById("score-indicator").innerText = `Score: ${score} XP`;
                feedback.className = "feedback-panel feedback-correct";
                feedback.innerText = lvl.explanations;
                clickedBtn.style.background = "#c3e6cb";
                clickedBtn.style.borderColor = "#28a745";
            } else {
                feedback.className = "feedback-panel feedback-wrong";
                feedback.innerText = "Incorrect tracking! Let's correct your coordinates. Click next to try again.";
                clickedBtn.style.background = "#f5c6cb";
                clickedBtn.style.borderColor = "#dc3545";
            }

            // Add navigation Action Button
            const nextBtn = document.createElement("button");
            nextBtn.className = "action-btn";
            nextBtn.innerText = currentLevel === levels.length - 1 ? "Check Final Ranking" : "Advance to next Area ➔";
            nextBtn.onclick = () => {
                currentLevel++;
                loadLevel();
            };
            document.getElementById("screen-area").appendChild(nextBtn);
        }

        function showVictory() {
            document.getElementById("level-indicator").innerText = "QUEST ACCOMPLISHED";
            const screenArea = document.getElementById("screen-area");
            screenArea.innerHTML = "";

            let titleRank = "Junior Navigator 🧭";
            if (score >= 400) titleRank = "Grand Cartographer Master 👑";
            else if (score >= 300) titleRank = "Expert Map Explorer 🤠";

            screenArea.innerHTML = `
                <div class="victory-screen">
                    <h2>👑 Vault Looted Successfully! 👑</h2>
                    <div class="badge">🏆</div>
                    <p style="font-weight:bold; font-size:1.1rem; margin-bottom:10px;">Total Loot Earned: <span style="color:#bd7a42">${score} XP</span></p>
                    <p style="margin-bottom:15px; color:#555;">Your map interpretation, coordinate scaling, and directional skills are textbook perfect!</p>
                    <div style="background:#e6ccb2; padding:10px; font-weight:bold; border-radius:5px; margin-bottom:20px;">
                        Earned Rank: ${titleRank}
                    </div>
                    <button class="action-btn" onclick="initGame()">Replay Treasure Hunt</button>
                </div>
            `;
        }

        // Run on startup
        window.onload = initGame;
    </script>
</body>
</html>
