<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Town Cartographer Quest</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #1a252c;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        #game-window {
            width: 100%;
            max-width: 480px;
            height: 760px;
            background: #fdfefe;
            border: 6px solid #34495e;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- SPLASH SCREEN --- */
        #innovine-splash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .splash-logo {
            max-width: 200px;
            height: auto;
        }

        /* --- INSTRUCTIONS SCREEN --- */
        #instruction-screen {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            background: #f4f6f7;
        }
        .scroll-box {
            background: white;
            border: 3px dashed #bdc3c7;
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            width: 100%;
        }
        .scroll-box ol {
            text-align: left;
            margin-left: 20px;
        }
        .scroll-box li {
            margin-bottom: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #34495e;
        }

        /* --- GAMEPLAY SCREEN --- */
        #gameplay-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .top-navbar {
            background: #34495e;
            color: #f1c40f;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .score-lbl {
            background: #2c3e50;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* --- CRITERIA CHECKLIST PANEL --- */
        .quest-container {
            padding: 12px;
            background: #eef2f3;
            border-bottom: 3px solid #d5dbdb;
            min-height: 110px;
        }
        .quest-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .blueprint-rules {
            font-size: 0.88rem;
            font-weight: bold;
            line-height: 1.35;
            color: #2c3e50;
            text-align: left;
            padding-left: 5px;
        }
        .blueprint-rules div {
            margin-bottom: 3px;
            display: flex;
            align-items: flex-start;
        }

        /* --- GRID MAP VIEWPORT --- */
        .map-viewport-wrapper {
            position: relative;
            flex-grow: 1;
            background: #ecf0f1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
