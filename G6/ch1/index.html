<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Number Kingdom Adventure</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,sans-serif;overflow:hidden;background:linear-gradient(180deg,#1f1147,#4c1d95,#7c3aed);color:#fff}
#bg{position:fixed;inset:0;overflow:hidden}
.star,.num{position:absolute;opacity:.7;animation:rise linear infinite}
@keyframes rise{from{transform:translateY(110vh)}to{transform:translateY(-120px)}}
.castle{position:fixed;bottom:0;width:100%;height:160px;background:#140a26;clip-path:polygon(0 100%,0 45%,8% 45%,12% 20%,16% 45%,28% 45%,34% 10%,40% 45%,55% 45%,60% 18%,66% 45%,80% 45%,86% 12%,92% 45%,100% 45%,100% 100%)}
.screen{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px}
.active{display:flex}
.scroll{background:#f5e6b8;color:#3b2a12;width:min(950px,95vw);padding:24px;border-radius:22px;box-shadow:0 0 35px rgba(255,215,0,.6)}
.top{display:flex;justify-content:space-between;width:min(950px,95vw);margin-bottom:10px;font-weight:bold}
.targets{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.target{background:#8b5a2b;border:3px solid gold;border-radius:14px;padding:18px;text-align:center;cursor:pointer;transition:.25s}
.target:hover{transform:scale(1.05);box-shadow:0 0 20px gold}
.drag{display:inline-block;background:#8b5a2b;color:#fff;padding:10px;border-radius:8px;margin:5px;cursor:grab}
.drop{min-height:70px;background:#fff3cf;border:3px dashed #8b5a2b;color:#3b2a12;padding:12px;border-radius:12px;margin-top:10px}
button{padding:12px 22px;border:none;border-radius:10px;background:gold;font-weight:bold;cursor:pointer}
#msg{font-weight:bold}
#confetti{position:fixed;inset:0;pointer-events:none;display:none}
.p{position:absolute;font-size:24px;animation:fall 1s linear forwards}
@keyframes fall{from{transform:translateY(-50px)}to{transform:translateY(100vh)}}
</style>
</head>
<body>
<div id="bg"></div><div class="castle"></div><div id="confetti"></div>

<div id="splash" class="screen active">
<img src="assets/innovine-logo.png" width="220">
<h2>🏰 Number Kingdom Adventure</h2>
</div>

<div id="intro" class="screen">
<h1>Recover the Golden Number Crown!</h1>
<p>Answer 10 challenges using Dart Boards and Drag & Drop.</p>
<button onclick="startGame()">Start Adventure</button>
</div>

<div id="game" class="screen">
<div class="top">
<div>💰 Score: <span id="score">0</span></div>
<div>⏱️ <span id="timer">45</span></div>
<div>🎯 <span id="qn">1</span>/10</div>
</div>
<div class="scroll">
<h2 id="question"></h2>
<div id="content"></div>
<p id="msg"></p>
</div>
</div>

<div id="result" class="screen">
<h1>🏆 Number Champion</h1>
<h2 id="final"></h2>
<p>You recovered the Golden Number Crown!</p>
<button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
for(let i=0;i<50;i++){let s=document.createElement('div');s.className='star';s.innerHTML='⭐';s.style.left=Math.random()*100+'%';s.style.animationDuration=(8+Math.random()*10)+'s';bg.appendChild(s);}
for(let i=0;i<25;i++){let n=document.createElement('div');n.className='num';n.innerHTML=Math.floor(Math.random()*10);n.style.left=Math.random()*100+'%';n.style.animationDuration=(10+Math.random()*10)+'s';bg.appendChild(n);}

const qs=[
{t:'dart',q:'Place value of 7 in 5,78,321?',o:['700','7,000','70,000','7,00,000'],a:'70,000'},
{t:'dart',q:'Which number is greatest?',o:['4,56,789','4,65,789','4,56,879','4,56,798'],a:'4,65,789'},
{t:'dart',q:'Expanded form of 4,03,205?',o:['4,00,000 + 3,000 + 200 + 5','4,00,000 + 30,000 + 200 + 5','40,000 + 3,000 + 200 + 5','4,00,000 + 3,000 + 20 + 5'],a:'4,00,000 + 3,000 + 200 + 5'},
{t:'dart',q:'Successor of 99,999?',o:['1,00,000','99,998','1,00,001','10,000'],a:'1,00,000'},
{t:'dart',q:'Nearest to 60,000?',o:['59,890','60,950','61,500','58,999'],a:'59,890'},
{t:'drag',q:'Arrange ascending',items:['89,432','98,432','84,932','94,832'],ans:'84,932|89,432|94,832|98,432'},
{t:'drag',q:'Arrange descending',items:['7,45,892','7,54,892','7,48,592','7,45,982'],ans:'7,54,892|7,48,592|7,45,982|7,45,892'},
{t:'drag',q:'Build expanded form of 3,45,678',items:['3,00,000','40,000','5,000','600','70','8'],ans:'3,00,000|40,000|5,000|600|70|8'},
{t:'drag',q:'Build number name of 4,50,321',items:['Four lakh','fifty thousand','three hundred twenty-one'],ans:'Four lakh|fifty thousand|three hundred twenty-one'},
{t:'drag',q:'Arrange digits of 5,78,321',items:['5','7','8','3','2','1'],ans:'5|7|8|3|2|1'}
];

let i=0,score=0,retry=0,time=45,intv,dragged=[];
setTimeout(()=>{splash.classList.remove('active');intro.classList.add('active');},5000);

function startGame(){intro.classList.remove('active');game.classList.add('active');loadQ();}
function loadQ(){
 if(i>=qs.length)return endGame();
 retry=0;dragged=[];msg.textContent='';qn.textContent=i+1;
 question.textContent=qs[i].q;content.innerHTML='';startTimer();
 if(qs[i].t==='dart'){
   content.innerHTML='<div class="targets"></div>';
   let tg=document.querySelector('.targets');
   qs[i].o.forEach(x=>{let d=document.createElement('div');d.className='target';d.innerHTML='🎯 '+x;d.onclick=()=>check(x);tg.appendChild(d);});
 } else {
   qs[i].items.forEach((x,n)=>content.innerHTML+=`<div class="drag" draggable="true" ondragstart="drag(event)">${x}</div>`);
   content.innerHTML+='<div class="drop" ondrop="drop(event)" ondragover="event.preventDefault()">🏠 Drop Here</div><br><button onclick="checkDrag()">Submit</button>';
 }
}
function startTimer(){clearInterval(intv);time=45;timer.textContent=time;intv=setInterval(()=>{timer.textContent=--time;if(time<=0)nextQ();},1000);}
function check(v){v===qs[i].a?correctAns():wrongAns();}
function drag(ev){ev.dataTransfer.setData("text",ev.target.innerText);}
function drop(ev){ev.preventDefault();let d=ev.dataTransfer.getData("text");dragged.push(d);ev.target.innerHTML=dragged.join(" ➜ ");}
function checkDrag(){dragged.join("|")===qs[i].ans?correctAns():wrongAns();}
function burst(){confetti.style.display='block';confetti.innerHTML='';for(let k=0;k<20;k++){let p=document.createElement('div');p.className='p';p.innerHTML='⭐';p.style.left=Math.random()*100+'%';confetti.appendChild(p);}setTimeout(()=>confetti.style.display='none',1000);}
function correctAns(){clearInterval(intv);try{correct.play()}catch(e){} burst();score+=retry?5:10;document.getElementById('score').textContent=score;msg.textContent='⭐ Excellent!';setTimeout(nextQ,1000);}
function wrongAns(){try{wrong.play()}catch(e){} retry++; if(retry===1){msg.textContent='❌ Try Again';} else {msg.textContent='Answer revealed. Moving on.'; setTimeout(nextQ,1200);}}
function nextQ(){i++;loadQ();}
function endGame(){game.classList.remove('active');result.classList.add('active');try{clap.play()}catch(e){} final.textContent='Score: '+score+'/100';}
</script>
</body>
</html>
