<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Innovine Mathematics - Grade 6 Geometry</title>
    <style>
        :root {
            --primary: #4e54c8;
            --secondary: #8f94fb;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f1c40f;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: var(--dark);
            position: relative;
        }

        /* Floating Background Elements */
        .bg-animations {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .floating-shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Container & Card Base */
        .game-container {
            width: 90%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 30px;
            z-index: 10;
            position: relative;
            text-align: center;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .screen {
            display: none;
            width: 100%;
            animation: fadeIn 0.5s ease forwards;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Screen 1: Splash Screen */
        #splash-screen {
            background: #ffffff;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #splash-screen img {
            max-width: 280px;
            width: 70%;
            height: auto;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        /* Screen 2: Intro Screen */
        .intro-title {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .intro-subtitle {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* UI Controls & Buttons */
        .btn {
            background: linear-gradient(135deg, #4e54c8 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(78, 84, 200, 0.4);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(78, 84, 200, 0.6);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Top HUD / Progress Elements */
        .hud-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 700;
            color: var(--dark);
            font-size: 0.95rem;
        }

        .hud-item {
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 14px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--success), #27ae60);
            border-radius: 6px;
            transition: width 0.4s ease;
        }

        /* Question Box Styling */
        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 25px;
            text-align: left;
            width: 100%;
            line-height: 1.4;
        }

        /* Options Grid */
        .options-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-card {
            background: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 16px;
            text-align: left;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .option-card:hover {
            border-color: var(--secondary);
            background: #fdfdfd;
            transform: translateY(-1px);
        }

        .option-card.correct {
            border-color: var(--success) !important;
            background-color: #e8f8f0 !important;
            color: #1e7e34;
        }

        .option-card.wrong {
            border-color: var(--error) !important;
            background-color: #fceade !important;
            color: #bd2130;
        }

        /* Feedback Screen Elements */
        .feedback-box {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            border-radius: 14px;
            display: none;
            text-align: left;
            animation: fadeIn 0.3s ease;
        }

        .feedback-title {
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .feedback-explanation {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #444;
        }

        .feedback-box.success-bg {
            background-color: #e8f8f0;
            border-left: 5px solid var(--success);
            color: #1e7e34;
        }

        .feedback-box.error-bg {
            background-color: #fdf0ed;
            border-left: 5px solid var(--error);
            color: #bd2130;
        }

        .action-container {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Results Elements */
        .results-score {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary);
            margin: 20px 0;
        }

        .results-msg {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* FX Animations */
        .shake {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .glow-green {
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.6);
        }

        /* Confetti Elements */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #f00;
            border-radius: 50%;
            animation: confetti-fall 2.5s ease-out infinite;
            pointer-events: none;
            z-index: 99;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-50px) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        /* Responsiveness */
        @media(max-width: 480px) {
            .game-container {
                padding: 20px 15px;
                width: 95%;
                min-height: 450px;
            }
            .intro-title { font-size: 1.6rem; }
            .question-text { font-size: 1.15rem; }
            .option-card { font-size: 0.95rem; padding: 12px; }
            .hud-container { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <!-- Background Elements -->
    <div class="bg-animations" id="bg-shapes"></div>

    <!-- Screen 1: Splash Screen -->
    <div id="splash-screen">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <!-- Main Game Wrapper Container -->
    <div class="game-container" id="game-box">

        <!-- Screen 2: Intro Screen -->
        <div id="intro-screen" class="screen">
            <h1 class="intro-title">Basics of Geometry</h1>
            <h3 class="intro-subtitle">Grade 6</h3>
            <button class="btn" onclick="startGame()">Start Adventure</button>
        </div>

        <!-- Screen 3: Question / Interactive Play Stage -->
        <div id="play-screen" class="screen">
            <div class="hud-container">
                <div class="hud-item" id="hud-question">Question: 1/10</div>
                <div class="hud-item" id="hud-timer">Time: 45s</div>
                <div class="hud-item" id="hud-score">Score: 0</div>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>

            <div class="question-text" id="question-label"></div>
            
            <div class="options-grid" id="options-box"></div>

            <div class="feedback-box" id="feedback-panel">
                <div class="feedback-title" id="feedback-title"></div>
                <div class="feedback-explanation" id="feedback-desc"></div>
            </div>

            <div class="action-container">
                <button class="btn" id="next-btn" onclick="nextQuestion()" style="display: none; padding: 10px 25px; font-size: 0.95rem;">Next</button>
            </div>
        </div>

        <!-- Screen 4: Results Screen -->
        <div id="results-screen" class="screen">
            <h1 class="intro-title">Adventure Completed!</h1>
            <div class="results-score" id="final-score-text">0/10</div>
            <div class="results-msg" id="final-message-text">Keep practicing!</div>
            <button class="btn" onclick="restartGame()">Play Again</button>
        </div>

    </div>

    <script>
        // Game Questions Config
        const questionsConfig = [
            {
                q: "How many points are enough to fix a line?",
                options: ["1", "2", "3", "4"],
                correct: 1, // index 1 means '2'
                exp: "Exactly two distinct points in a plane determine a unique straight line."
            },
            {
                q: "How many lines can pass through two given points?",
                options: ["One", "Two", "Three", "Countless"],
                correct: 0,
                exp: "Only one single straight line can perfectly connect two given distinct points."
            },
            {
                q: "Two intersecting lines meet at:",
                options: ["A segment", "A point", "A ray", "A curve"],
                correct: 1,
                exp: "When two distinct straight lines cross each other, they meet at exactly one single point."
            },
            {
                q: "A line segment has:",
                options: ["One endpoint", "Two endpoints", "No endpoints", "Three endpoints"],
                correct: 1,
                exp: "A line segment is a fixed portion of a line with clear starting and stopping points, giving it precisely two endpoints."
            },
            {
                q: "Three or more points lying on the same line are called:",
                options: ["Parallel points", "Collinear points", "Intersecting points", "Acute points"],
                correct: 1,
                exp: "Points that fall directly along the exact same straight line are defined as collinear points."
            },
            {
                q: "The longest chord of a circle is the:",
                options: ["Radius", "Diameter", "Arc", "Sector"],
                correct: 1,
                exp: "The diameter passes through the very center of a circle, making it the absolute longest possible straight chord."
            },
            {
                q: "A triangle has:",
                options: ["2 sides", "3 sides", "4 sides", "5 sides"],
                correct: 1,
                exp: "By definition, a triangle is a three-sided polygon formed by joining three non-collinear points."
            },
            {
                q: "How many vertices are there in a quadrilateral?",
                options: ["2", "3", "4", "5"],
                correct: 2,
                exp: "A quadrilateral is a polygon with four straight edges, which naturally connect to form four corner vertices."
            },
            {
                q: "An angle of 90° is called a:",
                options: ["Acute angle", "Obtuse angle", "Right angle", "Reflex angle"],
                correct: 2,
                exp: "An angle measuring exactly 90 degrees creates a perfect perpendicular square corner called a right angle."
            },
            {
                q: "A flat surface that extends indefinitely in all directions is called:",
                options: ["Point", "Ray", "Plane", "Line segment"],
                correct: 2,
                exp: "A plane is an infinitely extending, smooth, two-dimensional flat surface without thickness or outer boundaries."
            }
        ];

        // Core App State
        let currentIdx = 0;
        let score = 0;
        let livesLeft = 2;
        let timerInterval = null;
        let timeLeft = 45;
        let optionSelected = false;

        // Audio Triggers (mapped relative to Math_Middle_Games/G6/ch5/assets/)
        const sndCorrect = new Audio('assets/correct.mp3');
        const sndWrong = new Audio('assets/wrong.mp3');
        const sndClaps = new Audio('assets/freesound_community-claps-44774.mp3');

        const successPhrases = ["Excellent!", "Fantastic!", "Brilliant!", "Great Job!", "Outstanding!"];

        // Initialization Logic
        window.addEventListener('DOMContentLoaded', () => {
            generateBgDecoration();
            // Handle active Splash screen countdown of exactly 5 seconds
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                showScreen('intro-screen');
            }, 5000);
        });

        function generateBgDecoration() {
            const space = document.getElementById('bg-shapes');
            for(let i=0; i<15; i++) {
                let div = document.createElement('div');
                div.className = 'floating-shape';
                let scale = Math.random() * 40 + 20;
                div.style.width = `${scale}px`;
                div.style.height = `${scale}px`;
                div.style.left = `${Math.random() * 100}%`;
                div.style.animationDelay = `${Math.random() * 15}s`;
                div.style.animationDuration = `${Math.random() * 12 + 10}s`;
                space.appendChild(div);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            currentIdx = 0;
            score = 0;
            showScreen('play-screen');
            loadQuestion();
        }

        function loadQuestion() {
            optionSelected = false;
            livesLeft = 2;
            timeLeft = 45;
            
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('feedback-panel').style.display = 'none';
            document.getElementById('game-box').classList.remove('shake', 'glow-green');

            // Render text trackers
            document.getElementById('hud-question').innerText = `Question: ${currentIdx + 1}/${questionsConfig.length}`;
            document.getElementById('hud-score').innerText = `Score: ${score}`;
            document.getElementById('hud-timer').innerText = `Time: ${timeLeft}s`;
            
            // Progress tracker fill
            let percent = ((currentIdx) / questionsConfig.length) * 100;
            document.getElementById('progress-fill').style.width = `${percent}%`;

            const currentQ = questionsConfig[currentIdx];
            document.getElementById('question-label').innerText = currentQ.q;

            const grid = document.getElementById('options-box');
            grid.innerHTML = '';

            currentQ.options.forEach((opt, idx) => {
                let card = document.createElement('div');
                card.className = 'option-card';
                card.innerText = opt;
                card.setAttribute('data-idx', idx);
                card.onclick = () => selectOption(card, idx);
                grid.appendChild(card);
            });

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('hud-timer').innerText = `Time: ${timeLeft}s`;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeOut();
                }
            }, 1000);
        }

        function selectOption(cardElement, index) {
            if(optionSelected) return;

            const currentQ = questionsConfig[currentIdx];

            if(index === currentQ.correct) {
                // Correct path
                optionSelected = true;
                clearInterval(timerInterval);
                cardElement.classList.add('correct');
                document.getElementById('game-box').classList.add('glow-green');
                
                sndCorrect.play();
                setTimeout(() => { sndClaps.play(); }, 250);

                triggerConfetti();
                showFeedback(true, successPhrases[Math.floor(Math.random() * successPhrases.length)], currentQ.exp);
                score++;
                document.getElementById('hud-score').innerText = `Score: ${score}`;
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                // Incorrect path
                livesLeft--;
                cardElement.classList.add('wrong');
                document.getElementById('game-box').classList.add('shake');
                sndWrong.play();
                
                setTimeout(() => {
                    document.getElementById('game-box').classList.remove('shake');
                }, 400);

                if(livesLeft > 0) {
                    // One retry allowed
                    cardElement.style.pointerEvents = 'none';
                    showFeedback(false, "Try Again!", "That wasn't quite right. Review the geometry properties and select another choice.");
                } else {
                    // Out of retries
                    optionSelected = true;
                    clearInterval(timerInterval);
                    revealCorrectAnswer();
                    showFeedback(false, "Incorrect", currentQ.exp);
                    document.getElementById('next-btn').style.display = 'inline-block';
                }
            }
        }

        function handleTimeOut() {
            optionSelected = true;
            revealCorrectAnswer();
            showFeedback(false, "Time's Up!", questionsConfig[currentIdx].exp);
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function revealCorrectAnswer() {
            const correctIdx = questionsConfig[currentIdx].correct;
            const cards = document.querySelectorAll('.option-card');
            cards.forEach(c => {
                if(parseInt(c.getAttribute('data-idx')) === correctIdx) {
                    c.classList.add('correct');
                }
            });
        }

        function showFeedback(isSuccess, heading, explanation) {
            const panel = document.getElementById('feedback-panel');
            const title = document.getElementById('feedback-title');
            const desc = document.getElementById('feedback-desc');

            panel.className = 'feedback-box ' + (isSuccess ? 'success-bg' : 'error-bg');
            title.innerText = heading;
            desc.innerText = explanation;
            panel.style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < questionsConfig.length) {
                loadQuestion();
            } else {
                finishGame();
            }
        }

        function finishGame() {
            clearInterval(timerInterval);
            document.getElementById('progress-fill').style.width = `100%`;
            showScreen('results-screen');
            
            document.getElementById('final-score-text').innerText = `${score} / ${questionsConfig.length}`;
            
            const passingRatio = score / questionsConfig.length;
            if(passingRatio >= 0.8) {
                document.getElementById('final-message-text').innerText = "Outstanding Geometric Mastery! ⭐";
                sndClaps.play();
                triggerConfetti();
            } else if(passingRatio >= 0.5) {
                document.getElementById('final-message-text').innerText = "Great effort! Review and try again to master it.";
            } else {
                document.getElementById('final-message-text').innerText = "Keep practicing! You will conquer geometry soon.";
            }
        }

        function restartGame() {
            startGame();
        }

        function triggerConfetti() {
            for(let i=0; i<30; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = `${Math.random() * 100}%`;
                conf.style.backgroundColor = `hsl(${Math.random() * 360}deg, 80%, 60%)`;
                conf.style.animationDelay = `${Math.random() * 0.4}s`;
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 2500);
            }
        }
    </script>
</body>
</html>
