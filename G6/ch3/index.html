
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grade 6 Fractions Challenge</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#cfe9ff,#f8f4ff);overflow:hidden}
.screen{display:none;min-height:100vh;justify-content:center;align-items:center;flex-direction:column}
.active{display:flex}
.card{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);padding:20px;border-radius:20px;max-width:850px;width:92%;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.logo{width:220px}
.btn{padding:12px 18px;border:none;border-radius:12px;background:#4f7cff;color:white;cursor:pointer;margin:6px}
.option{display:block;width:100%;margin:8px 0}
.top{display:flex;justify-content:space-between;margin-bottom:10px;font-weight:bold}
.progress{height:12px;background:#ddd;border-radius:10px;overflow:hidden}
.bar{height:100%;width:0;background:#4caf50}
.star{position:absolute;color:gold;animation:fall 2s linear forwards}
@keyframes fall{to{transform:translateY(300px) rotate(360deg);opacity:0}}
</style>
</head>
<body>

<audio src="assets/correct.mp3" id="correct"></audio>
<audio src="assets/wrong.mp3" id="wrong"></audio>
<audio src="assets/freesound_community-claps-44774.mp3" id="clap"></audio>

<div id="splash" class="screen active">
<img src="assets/innovine-logo.png" class="logo">
</div>

<div id="intro" class="screen">
<div class="card" style="text-align:center">
<h1>Fractions</h1>
<h3>Grade 6 Mathematics</h3>
<button class="btn" onclick="startGame()">Start Adventure</button>
</div>
</div>

<div id="game" class="screen">
<div class="card">
<div class="top">
<div>Score: <span id="score">0</span></div>
<div>Question: <span id="count">1/10</span></div>
<div>Time: <span id="timer">45</span>s</div>
</div>
<div class="progress"><div class="bar" id="bar"></div></div>
<h2 id="question"></h2>
<div id="answers"></div>
<div id="feedback"></div>
</div>
</div>

<div id="result" class="screen">
<div class="card" style="text-align:center">
<h1>Fractions Complete!</h1>
<h2 id="final"></h2>
<h3 id="msg"></h3>
<button class="btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>
const qs=[
{t:'tf',q:'A pizza is cut into 8 equal slices. If 4 slices are eaten, the fraction eaten is 4/8.',a:true,e:'4 out of 8 slices were eaten.'},
{t:'tf',q:'The fraction 3/5 is equivalent to 6/15.',a:false,e:'3/5 = 9/15, not 6/15.'},
{t:'tf',q:'In the fraction 7/9, the numerator is 7 and denominator is 9.',a:true,e:'Correct.'},
{t:'tf',q:'A fraction with numerator greater than denominator is called a proper fraction.',a:false,e:'It is an improper fraction.'},
{t:'tf',q:'The fractions 1/2 and 2/4 represent the same quantity.',a:true,e:'They are equivalent fractions.'},
{t:'mcq',q:'3/4 matches which name?',o:['Proper Fraction','Whole','Improper Fraction'],a:0,e:'3/4 is a proper fraction.'},
{t:'mcq',q:'Equivalent fraction of 1/2?',o:['2/4','3/5','5/8'],a:0,e:'1/2 = 2/4.'},
{t:'mcq',q:'1/4 means?',o:['One part out of four equal parts','One part out of five','Four parts out of one'],a:0,e:'Definition of 1/4.'},
{t:'mcq',q:'1 1/2 equals?',o:['3/2','2/3','5/2'],a:0,e:'Convert mixed to improper fraction.'},
{t:'mcq',q:'3 out of 8 chocolates eaten is?',o:['3/8','8/3','5/8'],a:0,e:'Fraction = part/whole.'}
];

let i=0,s=0,retry=0,time=45,clock;

setTimeout(()=>{
splash.classList.remove('active');
intro.classList.add('active');
},5000);

function startGame(){
intro.classList.remove('active');
game.classList.add('active');
showQ();
}

function startTimer(){
clearInterval(clock);
time=45;
timer.textContent=time;
clock=setInterval(()=>{
time--;
timer.textContent=time;
if(time<=0){
clearInterval(clock);
feedback.innerHTML='<b>Time Up!</b><br>'+qs[i].e;
setTimeout(nextQ,2500);
}
},1000);
}

function showQ(){
if(i>=qs.length){endGame();return;}
retry=0;
count.textContent=(i+1)+'/'+qs.length;
bar.style.width=((i)/qs.length*100)+'%';
question.textContent=qs[i].q;
answers.innerHTML='';
feedback.innerHTML='';
startTimer();

if(qs[i].t==='tf'){
['True','False'].forEach(v=>{
let b=document.createElement('button');
b.className='btn option';
b.textContent=v;
b.onclick=()=>check(v==='True');
answers.appendChild(b);
});
}else{
qs[i].o.forEach((x,n)=>{
let b=document.createElement('button');
b.className='btn option';
b.textContent=x;
b.onclick=()=>check(n);
answers.appendChild(b);
});
}
}

function confetti(){
for(let k=0;k<20;k++){
let s=document.createElement('div');
s.className='star';
s.innerHTML='★';
s.style.left=Math.random()*window.innerWidth+'px';
s.style.top='0px';
document.body.appendChild(s);
setTimeout(()=>s.remove(),2000);
}
}

function check(ans){
let ok=ans===qs[i].a;
if(ok){
correct.play();
setTimeout(()=>clap.play(),250);
confetti();
s+=10;
score.textContent=s;
feedback.innerHTML='<span style="color:green"><b>Excellent!</b></span><br>'+qs[i].e;
clearInterval(clock);
setTimeout(nextQ,1800);
}else{
wrong.play();
retry++;
if(retry===1){
feedback.innerHTML='<span style="color:red">✖ Try Again!</span>';
}else{
clearInterval(clock);
feedback.innerHTML='<span style="color:red"><b>Correct Answer Shown</b></span><br>'+qs[i].e;
setTimeout(nextQ,2500);
}
}
}

function nextQ(){i++;showQ();}

function endGame(){
clearInterval(clock);
game.classList.remove('active');
result.classList.add('active');
let pct=(s/(qs.length*10))*100;
final.textContent='Score: '+s+'/100 ('+pct+'%)';
msg.textContent=pct>=80?'Outstanding!':pct>=60?'Great Job!':'Keep Practicing!';
if(pct>=80) clap.play();
}
</script>
</body>
</html>
