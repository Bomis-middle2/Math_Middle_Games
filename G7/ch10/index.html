<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Algebra Delivery Truck - Grade 7</title>
<style>
*{box-sizing:border-box;font-family:'Segoe UI',Tahoma,Verdana,sans-serif;margin:0;padding:0;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;color:#1e293b;background:linear-gradient(180deg,#fff7ed 0%,#e0f2fe 55%,#dcfce7 100%);display:flex;justify-content:center;align-items:center}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.45;background:radial-gradient(circle at 12% 15%,rgba(251,191,36,.35),transparent 18%),radial-gradient(circle at 85% 12%,rgba(56,189,248,.28),transparent 18%),linear-gradient(90deg,rgba(14,165,233,.08) 1px,transparent 1px),linear-gradient(rgba(34,197,94,.08) 1px,transparent 1px);background-size:auto,auto,46px 46px,46px 46px}
#root{width:100%;max-width:900px;height:100%;max-height:760px;display:flex;flex-direction:column;padding:clamp(10px,2vw,16px);gap:clamp(8px,1.4vh,12px);opacity:0;transition:opacity .5s ease;position:relative}
#splash{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity .5s ease}#splash img{width:min(280px,70vw);height:auto}.loadbox{width:190px;height:7px;background:#e5e7eb;border-radius:10px;overflow:hidden;margin-top:18px}.loadfill{width:0%;height:100%;background:linear-gradient(90deg,#0ea5e9,#22c55e)}
#intro{position:absolute;inset:0;background:rgba(255,247,237,.97);z-index:5000;display:flex;justify-content:center;align-items:center;padding:20px;text-align:center;border-radius:18px}.pop{background:#fff;border:2px solid #fb923c;padding:clamp(18px,4vw,28px);border-radius:22px;box-shadow:0 12px 30px rgba(234,88,12,.18);max-width:520px}.pop h2{font-size:clamp(1.3rem,4vw,1.75rem);color:#ea580c;font-weight:900;margin-bottom:12px}.pop p{font-size:clamp(.9rem,2.5vw,1rem);color:#475569;line-height:1.55;margin-bottom:20px}
.top{display:flex;justify-content:space-between;gap:10px;color:#c2410c;font-weight:900;font-size:clamp(.88rem,2.4vw,1rem)}.grid{display:grid;grid-template-columns:.92fr 1.25fr;gap:12px;min-height:0;flex:1}.panel{background:rgba(255,255,255,.9);border:2px solid #38bdf8;border-radius:20px;padding:clamp(10px,2vw,14px);box-shadow:0 10px 24px rgba(14,165,233,.16)}.qpanel{display:flex;flex-direction:column;gap:10px}.logo{height:clamp(28px,5vw,38px);object-fit:contain;align-self:center}
.taskbox{background:#f0f9ff;border:2px solid #0ea5e9;border-radius:16px;padding:clamp(10px,2.2vw,14px);text-align:center}.tag{font-size:clamp(.67rem,1.8vw,.8rem);letter-spacing:1.8px;text-transform:uppercase;color:#ea580c;font-weight:900}.task{font-size:clamp(1rem,3vw,1.32rem);font-weight:900;color:#111827;line-height:1.35;margin-top:6px}.hint{font-size:clamp(.78rem,2.2vw,.92rem);font-weight:750;color:#475569;text-align:center;line-height:1.35}
.opts{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:auto}.opt{border:2px solid #fed7aa;background:#fff7ed;border-radius:16px;padding:clamp(10px,2vw,14px) 8px;min-height:54px;font-size:clamp(.9rem,2.4vw,1.05rem);font-weight:900;color:#1e293b;cursor:pointer;box-shadow:0 3px 10px rgba(249,115,22,.09);transition:.2s}.opt.selected{background:#ffedd5;border-color:#ea580c;transform:translateY(-1px)}.opt.correct{background:#dcfce7!important;border-color:#16a34a!important}.opt.wrong{background:#fee2e2!important;border-color:#dc2626!important}
.scene{position:relative;overflow:hidden;min-height:280px;padding:0;border-color:#fb923c;background:#fffdf8}canvas{display:block;width:100%;height:100%}.status{font-size:clamp(.82rem,2.3vw,.95rem);font-weight:850;text-align:center;color:#475569;min-height:22px;line-height:1.3}.btn{width:100%;border:0;border-radius:16px;padding:clamp(13px,2.6vw,16px);background:linear-gradient(135deg,#f97316,#0ea5e9);color:#fff;font-size:clamp(.92rem,2.7vw,1.06rem);font-weight:950;letter-spacing:.7px;text-transform:uppercase;cursor:pointer;box-shadow:0 8px 20px rgba(249,115,22,.24)}.btn:disabled{background:#cbd5e1;color:#64748b;box-shadow:none;cursor:not-allowed}.confetti{position:fixed;top:-10px;width:10px;height:10px;pointer-events:none;animation:fall 1.4s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
@media(max-width:720px){#root{max-width:480px}.grid{grid-template-columns:1fr;grid-template-rows:auto 1fr}.scene{min-height:260px}.opts{grid-template-columns:1fr 1fr}}@media(max-width:390px){#root{padding:8px;gap:8px}.scene{min-height:220px}.opts{gap:7px}.opt{min-height:48px}}@media(max-height:650px){#root{max-height:none;gap:7px}.logo{height:26px}.panel{padding:8px}.taskbox{padding:8px}.scene{min-height:190px}.opt{min-height:44px;padding:8px}.btn{padding:11px}}@media(orientation:landscape) and (max-height:520px){#root{max-width:900px}.grid{grid-template-columns:.9fr 1.3fr}.scene{min-height:0}.logo{display:none}.hint{font-size:.78rem}.opts{gap:6px}.opt{min-height:40px;padding:7px}.btn{padding:10px}}
</style>
</head>
<body>
<audio id="s-correct" src="assets/correct.mp3" preload="auto"></audio><audio id="s-wrong" src="assets/wrong.mp3" preload="auto"></audio><audio id="s-claps" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>
<div id="splash"><img src="assets/innovine-logo.png" alt="Innovine Logo"><div class="loadbox"><div id="fill" class="loadfill"></div></div></div>
<div id="root"><div id="intro"><div class="pop"><h2>🚚 Algebra Delivery Truck</h2><p>Read each Algebraic Expressions challenge. Pick the correct cargo box and send the delivery truck. Correct answers reach the warehouse safely!</p><button class="btn" onclick="closeIntro()">Start Delivery</button></div></div><div class="top"><span>Delivery: <span id="qnum">1</span>/10</span><span>Stars: ⭐ <span id="score">0</span></span></div><div class="grid"><div class="panel qpanel"><img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo"><div class="taskbox"><div class="tag" id="tag">Algebraic Expressions</div><div class="task" id="task">Loading...</div></div><div class="hint">Choose the correct cargo box.</div><div class="opts"><button class="opt" id="o0" onclick="pick(0)">A</button><button class="opt" id="o1" onclick="pick(1)">B</button><button class="opt" id="o2" onclick="pick(2)">C</button><button class="opt" id="o3" onclick="pick(3)">D</button></div></div><div class="panel scene"><canvas id="canvas"></canvas></div></div><div class="status" id="status">Select a cargo box and deliver.</div><button class="btn" id="go" onclick="launch()">Deliver Algebra Cargo</button></div>
<script>
let canvas,ctx,current,chosen=0,choices=[],qIndex=0,score=0,locked=false;let truck={progress:0,moving:false,crash:false,success:false,timer:0,rot:0,bounce:0,back:0};
const qs=[{tag:'Simplify Like Terms',q:'Simplify: 3x + 2x',ans:'5x',w:['6x','x²','3x'],exp:'3x and 2x are like terms. 3x + 2x = 5x.'},{tag:'Coefficient Check',q:'Find the coefficient of y in 8y.',ans:'8',w:['y','1','0'],exp:'The numerical factor multiplied with y is 8.'},{tag:'Identify Variable',q:'Which is a variable in 7a + 5?',ans:'a',w:['7','5','12'],exp:'A variable is a letter whose value can change.'},{tag:'Number of Terms',q:'How many terms are in 3x + 5y - 2?',ans:'3',w:['2','4','5'],exp:'The terms are 3x, 5y, and -2.'},{tag:'Simplify Like Terms',q:'Simplify: 4a + 3a',ans:'7a',w:['12a','a²','4a'],exp:'Add the coefficients: 4a + 3a = 7a.'},{tag:'Subtract Like Terms',q:'Simplify: 9m - 4m',ans:'5m',w:['13m','5','m²'],exp:'Subtract coefficients: 9m - 4m = 5m.'},{tag:'Constant Term',q:'In 6p + 9, what is the constant term?',ans:'9',w:['6','p','6p'],exp:'The constant term has no variable. Here it is 9.'},{tag:'Expression from Statement',q:'Write an expression: 5 more than x.',ans:'x + 5',w:['5x','x - 5','5 - x'],exp:'5 more than x means add 5 to x.'},{tag:'Expression from Statement',q:'Write an expression: 3 times a number n.',ans:'3n',w:['n + 3','n - 3','3/n'],exp:'3 times n means 3 × n = 3n.'},{tag:'Evaluate Expression',q:'Evaluate 2x + 3 when x = 4.',ans:'11',w:['8','10','14'],exp:'2(4) + 3 = 8 + 3 = 11.'}];
let p=0;let sp=setInterval(()=>{p+=2;document.getElementById('fill').style.width=p+'%';if(p>=100){clearInterval(sp);let s=document.getElementById('splash');s.style.opacity='0';setTimeout(()=>{s.remove();document.getElementById('root').style.opacity='1';init();},500)}},100);
function init(){canvas=document.getElementById('canvas');ctx=canvas.getContext('2d');resize();window.addEventListener('resize',resize);shuffle(qs);loadQ();loop()}function resize(){let r=canvas.getBoundingClientRect();canvas.width=Math.max(300,Math.floor(r.width));canvas.height=Math.max(200,Math.floor(r.height))}function closeIntro(){let m=document.getElementById('intro');if(m)m.remove()}function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function loadQ(){locked=false;current=qs[qIndex];document.getElementById('qnum').innerText=qIndex+1;document.getElementById('tag').innerText=current.tag;document.getElementById('task').innerText=current.q;document.getElementById('status').innerText='Select a cargo box and deliver.';document.getElementById('status').style.color='#475569';document.getElementById('go').disabled=false;choices=shuffle([{text:current.ans,correct:true},...current.w.map(x=>({text:x,correct:false}))]);for(let i=0;i<4;i++){let b=document.getElementById('o'+i);b.className='opt';b.innerText=String.fromCharCode(65+i)+'. '+choices[i].text}truck={progress:0,moving:false,crash:false,success:false,timer:0,rot:0,bounce:0,back:0};pick(0)}function pick(i){if(truck.moving||truck.crash||locked)return;chosen=i;for(let k=0;k<4;k++)document.getElementById('o'+k).classList.toggle('selected',k===i)}function launch(){if(truck.moving||truck.crash||locked)return;document.getElementById('go').disabled=true;truck.moving=true;document.getElementById('status').innerText='Truck is delivering the algebra cargo...';document.getElementById('status').style.color='#0284c7'}
function update(){if(truck.moving){truck.progress+=.018;truck.bounce+=.25;if(truck.progress>=.92){truck.progress=.92;truck.moving=false;check()}}if(truck.crash){truck.timer++;truck.rot+=.22;truck.back-=1.2;if(truck.timer>=55){truck.crash=false;truck.timer=0;truck.rot=0;truck.back=0;truck.progress=0;document.getElementById('go').disabled=false;document.getElementById('status').innerText='Try again. Check the expression carefully.';document.getElementById('status').style.color='#dc2626'}}}function check(){let st=document.getElementById('status');if(choices[chosen].correct){document.getElementById('s-correct').play().catch(()=>{});score++;document.getElementById('score').innerText=score;document.getElementById('o'+chosen).classList.add('correct');st.innerText='Correct delivery! '+current.exp;st.style.color='#16a34a';truck.success=true;locked=true;confetti();setTimeout(()=>{qIndex++;if(qIndex>=qs.length)finish();else loadQ()},1900)}else{document.getElementById('s-wrong').play().catch(()=>{});document.getElementById('o'+chosen).classList.add('wrong');st.innerText='Wrong cargo! The truck stopped before the warehouse.';st.style.color='#dc2626';truck.crash=true}}
function render(){ctx.clearRect(0,0,canvas.width,canvas.height);let w=canvas.width,h=canvas.height;let g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#e0f2fe');g.addColorStop(.55,'#fefce8');g.addColorStop(1,'#dcfce7');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);cloud(w*.18,h*.15,1);cloud(w*.72,h*.12,.85);ctx.fillStyle='#bbf7d0';ctx.beginPath();ctx.moveTo(0,h*.7);ctx.quadraticCurveTo(w*.3,h*.54,w*.55,h*.72);ctx.quadraticCurveTo(w*.78,h*.88,w,h*.68);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();let road=h*.78;ctx.fillStyle='#94a3b8';ctx.fillRect(0,road,w,h*.16);ctx.strokeStyle='#fef3c7';ctx.lineWidth=4;ctx.setLineDash([22,18]);ctx.beginPath();ctx.moveTo(0,road+h*.08);ctx.lineTo(w,road+h*.08);ctx.stroke();ctx.setLineDash([]);warehouse(w-120,road-100,105,100);sign(20,road-80,'START');board(w*.46,road-125,choices[chosen]?.text||'');let sx=55,ex=w-130;let tx=sx+(ex-sx)*truck.progress+truck.back;let ty=road-25+Math.sin(truck.bounce)*2;ctx.save();ctx.translate(tx,ty);ctx.rotate(truck.rot);drawTruck(choices[chosen]?.text||'');ctx.restore();if(truck.success)spark(w-95,road-95);if(truck.crash){ctx.fillStyle='rgba(220,38,38,.25)';ctx.beginPath();ctx.arc(tx,ty,34,0,Math.PI*2);ctx.fill()}}function cloud(x,y,s){ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(x,y,18*s,0,Math.PI*2);ctx.arc(x+18*s,y-8*s,22*s,0,Math.PI*2);ctx.arc(x+40*s,y,18*s,0,Math.PI*2);ctx.fill()}function warehouse(x,y,w,h){ctx.fillStyle='#fed7aa';ctx.fillRect(x,y+30,w,h-30);ctx.fillStyle='#fb923c';ctx.beginPath();ctx.moveTo(x-5,y+32);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w+5,y+32);ctx.closePath();ctx.fill();ctx.fillStyle='#7c2d12';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText('WAREHOUSE',x+w/2,y+50);ctx.fillStyle='#fdba74';ctx.fillRect(x+34,y+62,38,38);ctx.strokeStyle='#9a3412';ctx.lineWidth=2;ctx.strokeRect(x+34,y+62,38,38)}function drawTruck(label){ctx.fillStyle='#f97316';ctx.fillRect(-42,-24,58,30);ctx.fillStyle='#0ea5e9';ctx.fillRect(14,-19,25,25);ctx.fillStyle='#bae6fd';ctx.fillRect(20,-15,12,10);ctx.fillStyle='#fff7ed';ctx.fillRect(-36,-18,44,16);ctx.fillStyle='#111827';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';fit(label,-14,-10,40);ctx.fillStyle='#111827';ctx.beginPath();ctx.arc(-28,8,8,0,Math.PI*2);ctx.arc(24,8,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e5e7eb';ctx.beginPath();ctx.arc(-28,8,3,0,Math.PI*2);ctx.arc(24,8,3,0,Math.PI*2);ctx.fill()}function sign(x,y,t){ctx.fillStyle='#92400e';ctx.fillRect(x+27,y+28,7,48);ctx.fillStyle='#fef3c7';rr(x,y,62,34,8,1,0);ctx.strokeStyle='#f97316';ctx.lineWidth=2;rr(x,y,62,34,8,0,1);ctx.fillStyle='#9a3412';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText(t,x+31,y+22)}function board(x,y,t){ctx.fillStyle='rgba(255,255,255,.9)';rr(x-58,y,116,44,12,1,0);ctx.strokeStyle='#38bdf8';ctx.lineWidth=2;rr(x-58,y,116,44,12,0,1);ctx.fillStyle='#0369a1';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText('Selected Cargo',x,y+15);ctx.fillStyle='#111827';ctx.font='bold 16px sans-serif';fit(t,x,y+34,100)}function spark(x,y){for(let i=0;i<8;i++){let a=(Date.now()/250+i)*.8;ctx.fillStyle=['#f59e0b','#22c55e','#0ea5e9'][i%3];ctx.beginPath();ctx.arc(x+Math.cos(a)*35,y+Math.sin(a)*28,3,0,Math.PI*2);ctx.fill()}}function fit(text,x,y,max){let size=parseInt(ctx.font.match(/\d+/)[0]);while(ctx.measureText(text).width>max&&size>8){size--;ctx.font='bold '+size+'px sans-serif'}ctx.fillText(text,x,y)}function rr(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill)ctx.fill();if(stroke)ctx.stroke()}function loop(){update();render();requestAnimationFrame(loop)}function finish(){document.getElementById('s-claps').play().catch(()=>{});document.getElementById('root').innerHTML='<div class="pop" style="margin:auto;text-align:center"><h2>🏆 Algebra Deliveries Complete!</h2><p>You completed all 10 Algebraic Expressions deliveries.<br><b>Final Stars: '+score+'/10</b></p><button class="btn" onclick="location.reload()">Play Again</button></div>'}function confetti(){for(let i=0;i<18;i++){let p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=['#f97316','#0ea5e9','#22c55e','#f59e0b'][Math.floor(Math.random()*4)];document.body.appendChild(p);setTimeout(()=>p.remove(),1600)}}
</script>
</body>
</html>
