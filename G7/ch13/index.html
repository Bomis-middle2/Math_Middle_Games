<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Solid Shapes Express - Grade 7</title>
<style>
*{box-sizing:border-box;font-family:'Segoe UI',Tahoma,Verdana,sans-serif;margin:0;padding:0;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;color:#1e293b;background:linear-gradient(180deg,#dff6ff 0%,#fff7d6 52%,#dcfce7 100%);display:flex;justify-content:center;align-items:center}
button{-webkit-tap-highlight-color:transparent;outline:none}button:focus{outline:none}
#splash{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease}
#splash img{width:min(280px,72vw);height:auto;object-fit:contain}
#root{width:100%;height:100%;max-width:920px;max-height:760px;padding:clamp(10px,2vw,16px);display:flex;flex-direction:column;gap:10px;opacity:0;transition:opacity .5s ease;position:relative}
#intro{position:absolute;inset:0;background:rgba(240,249,255,.97);z-index:5;display:flex;align-items:center;justify-content:center;text-align:center;padding:18px;border-radius:18px}
.card{background:#fff;border:2px solid #38bdf8;border-radius:22px;padding:24px;max-width:560px;box-shadow:0 12px 28px rgba(14,165,233,.18)}
.card h1{color:#0369a1;font-size:clamp(1.35rem,4vw,1.85rem);margin-bottom:10px}.card p{color:#475569;line-height:1.55;font-weight:650}
.btn{width:100%;border:0;border-radius:16px;padding:clamp(12px,2.7vw,16px);background:linear-gradient(135deg,#0ea5e9,#f97316);color:#fff;font-size:clamp(.9rem,2.8vw,1.05rem);font-weight:950;text-transform:uppercase;letter-spacing:.6px;cursor:pointer;box-shadow:0 8px 18px rgba(14,165,233,.22)}
.btn:disabled{background:#cbd5e1;color:#64748b;box-shadow:none;cursor:not-allowed}
.top{display:flex;justify-content:space-between;gap:10px;font-weight:900;color:#0369a1;font-size:clamp(.86rem,2.5vw,1rem)}
.progress{height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden}.bar{height:100%;width:0%;background:linear-gradient(90deg,#0ea5e9,#22c55e,#f59e0b);transition:width .4s ease}
.game{display:grid;grid-template-columns:.93fr 1.25fr;gap:12px;min-height:0;flex:1}
.panel{background:rgba(255,255,255,.92);border:2px solid #bae6fd;border-radius:20px;padding:clamp(10px,2vw,14px);box-shadow:0 8px 22px rgba(14,165,233,.12)}
.left{display:flex;flex-direction:column;gap:10px}
.question{background:#fff7ed;border:2px solid #fb923c;border-radius:16px;text-align:center;padding:clamp(10px,2.4vw,14px)}.tag{font-size:clamp(.66rem,1.8vw,.78rem);letter-spacing:1.6px;color:#0284c7;text-transform:uppercase;font-weight:900}.qtext{font-size:clamp(1.05rem,3vw,1.32rem);font-weight:900;line-height:1.35;color:#111827;margin-top:0}
.options{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:auto}.opt{border:2px solid #cbd5e1;background:#fff;border-radius:15px;padding:12px 7px;min-height:52px;font-size:clamp(.84rem,2.3vw,1rem);font-weight:900;color:#1e293b;cursor:pointer;transition:.15s}
.opt.selected{background:#fef3c7!important;border-color:#f59e0b!important;color:#1e293b!important}.opt.correct{background:#dcfce7!important;border-color:#16a34a!important;color:#166534!important}.opt.wrong{background:#fee2e2!important;border-color:#dc2626!important;color:#991b1b!important}
.scene{padding:0;overflow:hidden;border-color:#fb923c;background:#fffdf8;min-height:280px}canvas{display:block;width:100%;height:100%}
.status{font-weight:900;text-align:center;min-height:24px;color:#475569;line-height:1.3;font-size:clamp(.82rem,2.4vw,.95rem)}
.confetti{position:fixed;top:-10px;width:10px;height:10px;pointer-events:none;animation:fall 1.4s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
@media(max-width:720px){#root{max-width:480px}.game{grid-template-columns:1fr;grid-template-rows:auto 1fr}.scene{min-height:260px}}
@media(max-width:390px){#root{padding:8px;gap:8px}.scene{min-height:220px}.opt{min-height:47px;padding:8px 5px}.options{gap:7px}}
@media(max-height:650px){#root{gap:7px;max-height:none}.panel{padding:8px}.question{padding:8px}.scene{min-height:190px}.opt{min-height:42px;padding:7px}.btn{padding:10px}}
@media(orientation:landscape) and (max-height:520px){#root{max-width:920px}.game{grid-template-columns:.9fr 1.3fr}.scene{min-height:0}.logo{display:none}.opt{min-height:38px;padding:6px}.btn{padding:9px}}
</style>
</head>
<body>
<audio id="s-correct" src="assets/correct.mp3" preload="auto"></audio>
<audio id="s-wrong" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="s-claps" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>
<div id="splash"><img src="assets/innovine-logo.png" alt="Innovine Logo"></div>
<div id="root">
  <div id="intro"><div class="card"><h1>🚂 Solid Shapes Express</h1><p>Answer 10 Visualising Solid Shapes questions. Correct answers move the train to the next geometry station. You get only two attempts; after that, the correct answer is revealed.</p><button class="btn" onclick="closeIntro()">Start Journey</button></div></div>
  <div class="top"><span>Station: <span id="qnum">1</span>/10</span><span>Stars: ⭐ <span id="score">0</span></span><span>Attempt: <span id="attempt">1</span>/2</span></div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="game">
    <div class="panel left"><div class="question"><div class="qtext" id="qtext">Loading...</div></div><div class="options"><button class="opt" id="o0" onclick="pick(0)">A</button><button class="opt" id="o1" onclick="pick(1)">B</button><button class="opt" id="o2" onclick="pick(2)">C</button><button class="opt" id="o3" onclick="pick(3)">D</button></div></div>
    <div class="panel scene"><canvas id="canvas"></canvas></div>
  </div>
  <div class="status" id="status">Select an answer and send the train.</div>
  <button class="btn" id="go" onclick="sendTrain()">Send Express Train</button>
</div>
<script>
let canvas,ctx,current,choices=[],selected=-1,qIndex=0,score=0,attempt=1,locked=false;
let train={progress:0,moving:false,reverse:false,success:false,timer:0,rot:0};
const questions=[
{tag:'Real-life Solid',q:'A dice is placed on a table. Which solid shape does it represent?',ans:'Cube',w:['Cone','Cylinder','Sphere'],exp:'A dice has 6 square faces, so it represents a cube.'},
{tag:'Identify Solid',q:'A water storage tank has two circular faces and one curved surface. It is a:',ans:'Cylinder',w:['Cone','Sphere','Prism'],exp:'A cylinder has two circular flat faces and one curved surface.'},
{tag:'Curved Surface',q:'Which solid has only one curved surface and no edges?',ans:'Sphere',w:['Cone','Cylinder','Cube'],exp:'A sphere has one curved surface and no edges or vertices.'},
{tag:'Application',q:'A tent with triangular ends is closest to which solid?',ans:'Triangular Prism',w:['Cuboid','Cone','Cylinder'],exp:'A triangular prism has two triangular ends and rectangular side faces.'},
{tag:'Vertices',q:'Which solid has exactly 8 vertices?',ans:'Cube',w:['Cylinder','Cone','Sphere'],exp:'A cube has 8 vertices.'},
{tag:'Shape Clues',q:'A solid has 5 faces, 9 edges and 6 vertices. Identify it.',ans:'Triangular Prism',w:['Cube','Cylinder','Cone'],exp:'A triangular prism has 5 faces, 9 edges and 6 vertices.'},
{tag:'Nets',q:'A cube is unfolded into a flat pattern. This pattern is called:',ans:'Net',w:['Face','Edge','Vertex'],exp:'A flat pattern that folds to make a solid is called a net.'},
{tag:'Views',q:'Which view of a cylinder appears as a circle?',ans:'Top View',w:['Front View','Side View','Rear View'],exp:'From the top, the circular face of a cylinder is visible.'},
{tag:'Rolling',q:'Which solid can roll smoothly in every direction?',ans:'Sphere',w:['Cube','Cuboid','Prism'],exp:'A sphere has no flat faces, so it rolls smoothly in every direction.'},
{tag:'Cone Property',q:'A cone has:',ans:'1 vertex',w:['2 vertices','6 vertices','No vertices'],exp:'A cone has exactly one vertex.'}
];
setTimeout(()=>{let s=document.getElementById('splash');s.style.opacity='0';setTimeout(()=>{s.remove();document.getElementById('root').style.opacity='1';init();},500)},5000);
function init(){canvas=document.getElementById('canvas');ctx=canvas.getContext('2d');resize();window.addEventListener('resize',resize);shuffle(questions);loadQ();loop();}
function resize(){let r=canvas.getBoundingClientRect();canvas.width=Math.max(300,Math.floor(r.width));canvas.height=Math.max(200,Math.floor(r.height))}
function closeIntro(){let m=document.getElementById('intro');if(m)m.remove();}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function loadQ(){locked=false;attempt=1;current=questions[qIndex];document.getElementById('qnum').innerText=qIndex+1;document.getElementById('score').innerText=score;document.getElementById('attempt').innerText=attempt;document.getElementById('bar').style.width=(qIndex/questions.length*100)+'%';document.getElementById('qtext').innerText=current.q;document.getElementById('status').innerText='Select an answer and send the train.';document.getElementById('status').style.color='#475569';document.getElementById('go').disabled=false;choices=shuffle([{text:current.ans,correct:true},...current.w.map(x=>({text:x,correct:false}))]);for(let i=0;i<4;i++){let b=document.getElementById('o'+i);b.className='opt';b.innerText=String.fromCharCode(65+i)+'. '+choices[i].text}train={progress:0,moving:false,reverse:false,success:false,timer:0,rot:0};selected=-1;for(let k=0;k<4;k++)document.getElementById('o'+k).classList.remove('selected');}
function pick(i){if(train.moving||train.reverse||locked)return;selected=i;for(let k=0;k<4;k++)document.getElementById('o'+k).classList.toggle('selected',k===i)}
function sendTrain(){if(selected===-1){document.getElementById('status').innerText='Please select an answer first.';document.getElementById('status').style.color='#dc2626';return;}if(train.moving||train.reverse||locked)return;document.getElementById('go').disabled=true;train.moving=true;document.getElementById('status').innerText='Express train is travelling to the geometry station...';document.getElementById('status').style.color='#0284c7'}
function update(){if(train.moving){train.progress+=.018;if(train.progress>=1){train.progress=1;train.moving=false;checkAnswer();}}if(train.reverse){train.timer++;train.rot=Math.sin(train.timer*.45)*.08;train.progress=Math.max(0,train.progress-.025);if(train.timer>45){train.reverse=false;train.timer=0;train.rot=0;if(attempt<=2){document.getElementById('go').disabled=false;document.getElementById('status').innerText='Try again. Attempt '+attempt+' of 2.';document.getElementById('status').style.color='#dc2626';}}}}
function checkAnswer(){let st=document.getElementById('status');if(choices[selected].correct){document.getElementById('s-correct').play().catch(()=>{});document.getElementById('s-claps').play().catch(()=>{});document.getElementById('o'+selected).classList.add('correct');score++;document.getElementById('score').innerText=score;st.innerText='Correct! '+current.exp;st.style.color='#16a34a';train.success=true;locked=true;confetti();setTimeout(nextQ,1900);}else{document.getElementById('s-wrong').play().catch(()=>{});document.getElementById('o'+selected).classList.add('wrong');if(attempt<2){attempt++;document.getElementById('attempt').innerText=attempt;st.innerText='Wrong answer. One more attempt left.';st.style.color='#dc2626';train.reverse=true;train.timer=0;}else{revealAnswer();}}}
function revealAnswer(){locked=true;document.getElementById('go').disabled=true;for(let i=0;i<4;i++){if(choices[i].correct)document.getElementById('o'+i).classList.add('correct')}document.getElementById('status').innerText='Attempts over. Correct answer: '+current.ans+'. '+current.exp;document.getElementById('status').style.color='#ea580c';setTimeout(nextQ,3200);}
function nextQ(){qIndex++;if(qIndex>=questions.length)finish();else loadQ();}
function render(){ctx.clearRect(0,0,canvas.width,canvas.height);let w=canvas.width,h=canvas.height;let bg=ctx.createLinearGradient(0,0,0,h);bg.addColorStop(0,'#e0f2fe');bg.addColorStop(.55,'#fff7ed');bg.addColorStop(1,'#bbf7d0');ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);cloud(w*.2,h*.14,1);cloud(w*.72,h*.18,.8);hill(w,h);let trackY=h*.72;drawTrack(40,trackY,w-70,trackY);drawStation(w-98,trackY-92);drawShape(w,h);let x=45+(w-165)*train.progress,y=trackY-14;drawTrain(x,y,train.rot);if(train.success)spark(w-80,trackY-75);}
function cloud(x,y,s){ctx.fillStyle='rgba(255,255,255,.92)';ctx.beginPath();ctx.arc(x,y,16*s,0,Math.PI*2);ctx.arc(x+19*s,y-8*s,23*s,0,Math.PI*2);ctx.arc(x+43*s,y,18*s,0,Math.PI*2);ctx.fill()}
function hill(w,h){ctx.fillStyle='#86efac';ctx.beginPath();ctx.moveTo(0,h*.74);ctx.quadraticCurveTo(w*.3,h*.6,w*.56,h*.76);ctx.quadraticCurveTo(w*.78,h*.88,w,h*.7);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill()}
function drawTrack(x1,y1,x2,y2){ctx.strokeStyle='#64748b';ctx.lineWidth=7;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.strokeStyle='#fef3c7';ctx.lineWidth=3;ctx.setLineDash([16,12]);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.setLineDash([])}
function drawStation(x,y){ctx.fillStyle='#fed7aa';ctx.fillRect(x,y+28,82,64);ctx.fillStyle='#f97316';ctx.beginPath();ctx.moveTo(x-8,y+30);ctx.lineTo(x+41,y);ctx.lineTo(x+90,y+30);ctx.closePath();ctx.fill();ctx.fillStyle='#7c2d12';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('STATION',x+41,y+50);ctx.fillStyle='#fdba74';ctx.fillRect(x+28,y+60,25,32)}
function drawTrain(x,y,r){
 ctx.save();
 ctx.translate(x,y);
 ctx.rotate(r);

 // Train engine body
 ctx.fillStyle='#0ea5e9';
 ctx.fillRect(-48,-22,54,28);
 ctx.fillStyle='#0284c7';
 ctx.fillRect(-43,-28,30,10);

 // Front cabin
 ctx.fillStyle='#f97316';
 ctx.fillRect(4,-34,30,40);
 ctx.fillStyle='#bae6fd';
 ctx.fillRect(11,-27,15,13);

 // Chimney and smoke
 ctx.fillStyle='#475569';
 ctx.fillRect(22,-48,10,16);
 ctx.fillStyle='rgba(148,163,184,.55)';
 ctx.beginPath();ctx.arc(29,-58,7,0,Math.PI*2);ctx.fill();
 ctx.beginPath();ctx.arc(39,-66,5,0,Math.PI*2);ctx.fill();

 // Engine nose
 ctx.fillStyle='#fb923c';
 ctx.beginPath();
 ctx.moveTo(34,-18);
 ctx.lineTo(48,-8);
 ctx.lineTo(34,2);
 ctx.closePath();
 ctx.fill();

 // Coach behind engine
 ctx.fillStyle='#22c55e';
 ctx.fillRect(-90,-20,36,25);
 ctx.fillStyle='#dcfce7';
 ctx.fillRect(-84,-15,10,9);
 ctx.fillRect(-68,-15,10,9);

 // Connector
 ctx.strokeStyle='#475569';
 ctx.lineWidth=3;
 ctx.beginPath();
 ctx.moveTo(-54,-8);
 ctx.lineTo(-48,-8);
 ctx.stroke();

 // Windows
 ctx.fillStyle='#fff';
 ctx.fillRect(-39,-16,11,10);
 ctx.fillRect(-23,-16,11,10);

 // Wheels
 ctx.fillStyle='#111827';
 [-80,-61,-34,-12,18,36].forEach(wx=>{
   ctx.beginPath();
   ctx.arc(wx,8,7,0,Math.PI*2);
   ctx.fill();
 });
 ctx.fillStyle='#e5e7eb';
 [-80,-61,-34,-12,18,36].forEach(wx=>{
   ctx.beginPath();
   ctx.arc(wx,8,3,0,Math.PI*2);
   ctx.fill();
 });

 // Cowcatcher lines
 ctx.strokeStyle='#7c2d12';
 ctx.lineWidth=2;
 ctx.beginPath();
 ctx.moveTo(42,2);ctx.lineTo(54,10);
 ctx.moveTo(36,2);ctx.lineTo(48,10);
 ctx.stroke();

 ctx.restore();
}
function drawShape(w,h){let x=w*.52,y=h*.34;ctx.strokeStyle='rgba(14,165,233,.35)';ctx.lineWidth=3;ctx.strokeRect(x-35,y-25,50,50);ctx.strokeRect(x-18,y-42,50,50);ctx.beginPath();ctx.moveTo(x-35,y-25);ctx.lineTo(x-18,y-42);ctx.moveTo(x+15,y-25);ctx.lineTo(x+32,y-42);ctx.moveTo(x-35,y+25);ctx.lineTo(x-18,y+8);ctx.moveTo(x+15,y+25);ctx.lineTo(x+32,y+8);ctx.stroke()}
function spark(x,y){for(let i=0;i<10;i++){let a=(Date.now()/240+i)*.7;ctx.fillStyle=['#facc15','#0ea5e9','#22c55e'][i%3];ctx.beginPath();ctx.arc(x+Math.cos(a)*35,y+Math.sin(a)*28,3,0,Math.PI*2);ctx.fill()}}
function loop(){update();render();requestAnimationFrame(loop)}
function finish(){document.getElementById('s-claps').play().catch(()=>{});document.getElementById('root').innerHTML='<div class="card" style="margin:auto;text-align:center"><h1>🏁 Journey Complete!</h1><p>You completed all 10 Visualising Solid Shapes stations.</p><p style="margin-top:10px;font-weight:900;color:#16a34a">Final Stars: '+score+'/10</p><button class="btn" onclick="location.reload()">Play Again</button></div>'}
function confetti(){for(let i=0;i<18;i++){let p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=['#0ea5e9','#f97316','#22c55e','#facc15'][Math.floor(Math.random()*4)];document.body.appendChild(p);setTimeout(()=>p.remove(),1600)}}
</script>
</body>
</html>
