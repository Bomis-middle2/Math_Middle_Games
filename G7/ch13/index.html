<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shape Matrix: Dimensional Escape</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #f0f4f8;
            color: #1e293b;
            overflow: hidden;
        }
        
        #viewport-root {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px;
            position: relative;
        }

        .matrix-panel {
            background: #ffffff;
            border: 3px solid #475569;
            border-radius: 20px;
            padding: 35px 20px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }
        .btn-action {
            background: #475569;
            color: #ffffff;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(71, 85, 105, 0.3);
            margin-top: 20px;
            text-transform: uppercase;
        }

        .game-layout {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1rem;
            color: #475569;
            padding: 5px 0;
        }

        .mission-panel {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .mission-tag {
            font-size: 0.75rem;
            color: #e11d48;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            margin-bottom: 3px;
        }
        .mission-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1e293b;
            line-height: 1.4;
        }

        /* Matrix Projection Canvas */
        .matrix-frame {
            width: 100%;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            position: relative;
            flex-grow: 1;
            overflow: hidden;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
