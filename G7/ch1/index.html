<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grade 7 Integers Racing Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0f172a;color:#f8fafc;overflow-x:hidden;height:100vh;display:flex;flex-direction:column}
.screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:24px;text-align:center}.logo{width:220px;max-width:60vw;margin-bottom:24px}.loading-box{width:240px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:15px}.loading-fill{width:0%;height:100%;background:#38bdf8}
#instruction-screen{background:#0f172a;z-index:500}.menu-card{background:rgba(30,41,59,.7);border:2px solid rgba(255,255,255,.1);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:38px 30px;border-radius:24px;max-width:540px;width:100%;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}.menu-card h2{color:#38bdf8;margin-bottom:22px;font-size:2rem}.instructions p{font-size:1.08rem;line-height:1.6;margin-bottom:14px;color:#cbd5e1;text-align:left}
button{border:0;border-radius:16px;background:linear-gradient(135deg,#38bdf8,#2563eb);color:white;font-size:1.12rem;font-weight:bold;padding:14px 34px;cursor:pointer;box-shadow:0 10px 25px -5px rgba(56,189,248,.3);transition:transform .2s,box-shadow .2s}button:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 15px 30px -5px rgba(56,189,248,.4)}button:disabled{opacity:.6;cursor:not-allowed}.hidden{display:none!important}
#game-container{display:flex;flex-direction:column;width:100%;height:100%;max-width:1000px;margin:0 auto;padding:16px}#hud{display:flex;justify-content:space-between;align-items:center;width:100%;padding:12px 16px;font-size:1.15rem;font-weight:700;color:#38bdf8}#progress{width:100%;height:8px;background:#334155;border-radius:9999px;overflow:hidden;margin-bottom:4px}#bar{height:100%;width:0%;background:linear-gradient(90deg,#38bdf8,#2563eb);border-radius:9999px;transition:width .6s cubic-bezier(.25,1,.5,1)}
#track{width:100%;height:130px;margin:15px 0;background:#1e293b;border:4px solid #334155;border-radius:20px;position:relative;overflow:hidden;box-shadow:inset 0 4px 20px rgba(0,0,0,.6)}#line{position:absolute;top:50%;transform:translateY(-50%);width:100%;height:6px;background:repeating-linear-gradient(to right,#fff 0,#fff 30px,transparent 30px,transparent 60px);opacity:.4}#finish{position:absolute;right:20px;width:16px;height:100%;background:repeating-linear-gradient(to bottom,#fff 0,#fff 10px,#000 10px,#000 20px);border-left:2px solid #64748b;border-right:2px solid #64748b}
#car{width:70px;height:36px;background:linear-gradient(90deg,#ef4444,#b91c1c);position:absolute;top:calc(50% - 18px);left:15px;border-radius:8px;box-shadow:0 0 15px rgba(239,68,68,.5);transition:left .6s cubic-bezier(.25,1,.5,1)}#car:before,#car:after{content:"";position:absolute;width:14px;height:8px;background:#0f172a;border-radius:2px}#car:before{top:-4px;left:10px;box-shadow:0 0 0 2px #334155}#car:after{bottom:-4px;left:10px;box-shadow:0 0 0 2px #334155}.cockpit{position:absolute;right:12px;top:6px;width:24px;height:24px;background:#38bdf8;border-radius:4px;opacity:.8}
#questionBox{background:#1e293b;border:2px solid #334155;border-radius:20px;padding:24px;margin:10px 0;text-align:center;box-shadow:0 4px 6px -1px rgba(0,0,0,.1)}#q{font-size:1.35rem;font-weight:650;line-height:1.5;color:#f1f5f9;margin-bottom:24px}#options{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.option-btn{background:#334155;color:#f1f5f9;border:2px solid transparent;border-radius:14px;padding:16px;font-size:1.15rem;font-weight:650;cursor:pointer;transition:background .2s,border-color .2s,transform .1s}.option-btn:hover:not(:disabled){background:#475569}.reveal-correct{background:#10b981!important;border-color:#34d399!important;color:#fff!important}.reveal-wrong{background:#ef4444!important;border-color:#f87171!important;color:#fff!important}
#feedback-box{margin-top:20px;padding:16px;border-radius:12px;background:rgba(30,41,59,.5);border-left:4px solid #38bdf8;color:#cbd5e1;font-size:1.05rem;line-height:1.5;text-align:left}.shake{animation:trackShake .4s ease-in-out}@keyframes trackShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.action-row{height:70px;display:flex;justify-content:center;align-items:center;margin-top:15px}
#result-screen{background:#0f172a;z-index:600}.creative-pop{font-size:4.5rem;animation:bouncePop 1.5s infinite alternate cubic-bezier(.45,0,.55,1);margin-bottom:20px}@keyframes bouncePop{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-10px) scale(1.08)}}
.confetti{position:fixed;top:-10px;width:10px;height:10px;pointer-events:none;animation:fall 1.4s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
@media(max-width:640px){#hud{font-size:.95rem;padding:10px 4px}#options{grid-template-columns:1fr;gap:12px}#track{height:100px}#car{width:56px;height:30px;top:calc(50% - 15px)}.cockpit{width:18px;height:18px;top:6px;right:8px}#q{font-size:1.15rem}.menu-card{padding:30px 20px}.instructions p{font-size:1rem}}
</style>
</head>
<body>
<div id="loader" class="screen"><img src="assets/innovine-logo.png" alt="Innovine Logo" class="logo"><div class="loading-box"><div id="loading-fill" class="loading-fill"></div></div></div>
<div id="instruction-screen" class="screen hidden"><div class="menu-card"><h2>Integer Race Instructions</h2><div class="instructions"><p>• Choose the correct answer for each Integer challenge.</p><p>• The car moves ahead after every question.</p><p>• Correct answer on the first try adds speed. You get 2 chances per question.</p></div><button onclick="startGame()">Start Integer Race</button></div></div>
<div id="game-container" class="hidden"><div id="hud"><span>Track Progress: <span id="q-num">1</span>/10</span><span>Velocity Milestone: <span id="score-display">0</span> KM/H</span></div><div id="progress"><div id="bar"></div></div><div id="track"><div id="line"></div><div id="finish"></div><div id="car"><div class="cockpit"></div></div></div><div id="questionBox"><h3 id="q"></h3><div id="options"></div><div id="feedback-box" class="hidden"></div></div><div class="action-row"><button id="next-btn" class="hidden" onclick="loadNextQuestion()">Next Sprint ➡️</button></div></div>
<div id="result-screen" class="screen hidden"><div class="menu-card" style="text-align:center"><div class="creative-pop">🏁🏆🌟</div><h2 style="color:#38bdf8;margin-bottom:16px">Finish Line Crossed!</h2><p id="result-msg" style="font-size:1.15rem;color:#cbd5e1;margin-bottom:30px;line-height:1.6"></p><button onclick="location.reload()">Restart Race</button></div></div>
<script>
const audio={correct:new Audio('assets/correct.mp3'),wrong:new Audio('assets/wrong.mp3'),claps:new Audio('assets/freesound_community-claps-44774.mp3')};
const allQuestions=[
{q:"A submarine is 35 m below sea level. Which integer represents its position?",options:[35,-35,0,-5],ans:"-35",exp:"Below sea level is represented by a negative integer."},
{q:"What is (-8) + 13?",options:[-21,-5,5,21],ans:"5",exp:"Moving 13 steps right from -8 gives 5."},
{q:"What is (-15) - (-6)?",options:[-21,-9,9,21],ans:"-9",exp:"Subtracting -6 means adding 6: -15 + 6 = -9."},
{q:"Which integer is the greatest?",options:[-12,-5,0,-1],ans:"0",exp:"Zero is greater than all negative integers."},
{q:"Arrange from least to greatest: -3, 4, -7, 0",options:["-7, -3, 0, 4","4, 0, -3, -7","-3, -7, 0, 4","0, -3, 4, -7"],ans:"-7, -3, 0, 4",exp:"On the number line, values increase from left to right."},
{q:"What is (-6) × 7?",options:[42,-42,13,-13],ans:"-42",exp:"A negative multiplied by a positive gives a negative."},
{q:"What is (-48) ÷ (-6)?",options:[-8,8,-42,42],ans:"8",exp:"A negative divided by a negative gives a positive."},
{q:"The temperature was -4°C and rose by 9°C. What is the new temperature?",options:[-13,-5,5,13],ans:"5",exp:"-4 + 9 = 5°C."},
{q:"Which statement is true?",options:["-9 > -3","-2 > -8","-5 > 1","0 < -1"],ans:"-2 > -8",exp:"Among negative numbers, the one closer to zero is greater."},
{q:"A team loses 3 points in each of 5 rounds. What integer shows the total change?",options:[15,-15,8,-8],ans:"-15",exp:"5 losses of 3 points each means 5 × (-3) = -15."}
];
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
let questions=shuffle([...allQuestions]);let qIndex=0;let correctAns=null;let milestoneScore=0;let attempts=0;let locked=false;
window.addEventListener('DOMContentLoaded',()=>{const fill=document.getElementById('loading-fill');let progress=0;const interval=setInterval(()=>{progress+=1;fill.style.width=Math.min(progress,100)+'%';if(progress>=100){clearInterval(interval);document.getElementById('loader').classList.add('hidden');document.getElementById('instruction-screen').classList.remove('hidden')}},50)});
function startGame(){document.getElementById('instruction-screen').classList.add('hidden');document.getElementById('game-container').classList.remove('hidden');loadQ()}
function loadQ(){locked=false;attempts=0;document.getElementById('next-btn').classList.add('hidden');document.getElementById('feedback-box').classList.add('hidden');document.getElementById('q-num').innerText=qIndex+1;let qObj=questions[qIndex];document.getElementById('q').innerHTML=qObj.q;correctAns=qObj.ans;let box=document.getElementById('options');box.innerHTML='';let opts=shuffle([...qObj.options]);opts.forEach((opt,idx)=>{const btn=document.createElement('button');btn.className='option-btn';btn.id='opt-btn-'+idx;btn.innerText=opt;btn.onclick=()=>check(String(opt),idx);box.appendChild(btn)})}
function check(selected,idx){if(locked)return;const fb=document.getElementById('feedback-box');const selectedBtn=document.getElementById('opt-btn-'+idx);let qObj=questions[qIndex];if(selected===String(correctAns)){locked=true;selectedBtn.classList.add('reveal-correct');try{audio.correct.play()}catch(e){}if(attempts===0){milestoneScore+=10;document.getElementById('score-display').innerText=milestoneScore}fb.innerHTML='<b>🚗 Correct!</b> '+qObj.exp;fb.classList.remove('hidden');moveCarAndProgress();disableAllOptions();confetti();document.getElementById('next-btn').classList.remove('hidden')}else{attempts++;try{audio.wrong.play()}catch(e){}document.getElementById('track').classList.add('shake');setTimeout(()=>document.getElementById('track').classList.remove('shake'),400);if(attempts<2){selectedBtn.classList.add('reveal-wrong');selectedBtn.disabled=true;fb.innerHTML='<b>Try again!</b> One chance left.';fb.classList.remove('hidden')}else{locked=true;selectedBtn.classList.add('reveal-wrong');disableAllOptions();document.querySelectorAll('.option-btn').forEach(btn=>{if(btn.innerText===String(correctAns))btn.classList.add('reveal-correct')});fb.innerHTML='<b>Out of attempts!</b> Correct answer: <b>'+correctAns+'</b>. '+qObj.exp;fb.classList.remove('hidden');moveCarAndProgress();document.getElementById('next-btn').classList.remove('hidden')}}}
function disableAllOptions(){document.querySelectorAll('.option-btn').forEach(btn=>btn.disabled=true)}
function moveCarAndProgress(){let completed=qIndex+1;let targetPercent=Math.min((completed/10)*85,85);document.getElementById('car').style.left='calc('+targetPercent+'% + 15px)';document.getElementById('bar').style.width=(completed/10)*100+'%'}
function loadNextQuestion(){qIndex++;if(qIndex>=questions.length){showWinScreen();return}loadQ()}
function showWinScreen(){document.getElementById('game-container').classList.add('hidden');document.getElementById('result-screen').classList.remove('hidden');try{audio.claps.play()}catch(e){}let msg='Great driving! You completed all 10 integer challenges.';if(milestoneScore>=90)msg='Excellent Podium Finish! You mastered integer operations and comparisons.';document.getElementById('result-msg').innerText=msg}
function confetti(){for(let i=0;i<18;i++){let p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=['#38bdf8','#10b981','#f59e0b','#ef4444'][Math.floor(Math.random()*4)];p.style.animationDelay=Math.random()*0.25+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),1600)}}
</script>
</body>
</html>
