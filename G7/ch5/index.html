<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Angle Express: Lines & Angles Game</title>
<style>
*{box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;margin:0;padding:0;user-select:none;-webkit-user-select:none}
body,html{width:100%;height:100%;overflow:hidden;color:#1e293b;background:linear-gradient(180deg,#fef3c7 0%,#fde68a 35%,#dbeafe 100%);display:flex;justify-content:center;align-items:center}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.35;background:radial-gradient(circle at 15% 20%,rgba(59,130,246,.28),transparent 22%),radial-gradient(circle at 80% 10%,rgba(245,158,11,.26),transparent 20%),linear-gradient(135deg,rgba(30,64,175,.08) 1px,transparent 1px),linear-gradient(45deg,rgba(217,119,6,.08) 1px,transparent 1px);background-size:auto,auto,42px 42px,42px 42px}
#viewport-root{width:100%;max-width:460px;height:100%;max-height:760px;display:flex;flex-direction:column;padding:16px;gap:12px;opacity:0;transition:opacity .5s ease;position:relative}
#hard-splash{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;justify-content:center;align-items:center;transition:opacity .5s ease}.splash-img{max-width:260px;height:95px;object-fit:contain}
#instruction-modal{position:absolute;inset:0;background:rgba(255,251,235,.96);z-index:5000;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;text-align:center;border-radius:16px}.ins-box{background:#fff7ed;border:2px solid #f59e0b;padding:24px;border-radius:18px;box-shadow:0 12px 30px rgba(146,64,14,.22)}.ins-title{font-size:1.45rem;color:#1d4ed8;font-weight:900;margin-bottom:12px}.ins-text{font-size:.95rem;color:#475569;line-height:1.55;margin-bottom:20px}
.header-card{background:rgba(255,255,255,.86);border:2px solid #60a5fa;border-radius:18px;padding:14px;box-shadow:0 10px 24px rgba(37,99,235,.16);text-align:center}.hud-logo{height:38px;object-fit:contain;margin-bottom:8px}.ticker{background:#eff6ff;border:2px solid #2563eb;border-radius:12px;padding:12px}.ticker-title{font-size:.75rem;color:#d97706;text-transform:uppercase;letter-spacing:2px;font-weight:900}.ticker-problem{font-size:1.05rem;font-weight:750;color:#1e293b;margin-top:6px;line-height:1.4}
.score-row{display:flex;justify-content:space-between;color:#1d4ed8;font-weight:900;font-size:.95rem}.simulation-frame{flex-grow:1;background:rgba(255,255,255,.72);border:2px solid #f59e0b;border-radius:18px;position:relative;overflow:hidden;min-height:250px;box-shadow:inset 0 0 20px rgba(251,191,36,.14)}canvas{display:block;width:100%;height:100%}.console-grid{display:flex;flex-direction:column;gap:8px}.option-row-btn{width:100%;background:#ffffff;border:2px solid #bfdbfe;color:#1e293b;border-radius:14px;padding:13px 12px;font-size:.95rem;font-weight:750;cursor:pointer;text-align:left;transition:.2s}.option-row-btn:active,.option-row-btn.selected{background:#dbeafe;border-color:#2563eb;box-shadow:0 0 12px rgba(37,99,235,.25)}.option-row-btn.correct{background:#dcfce7!important;border-color:#16a34a!important}.option-row-btn.wrong{background:#fee2e2!important;border-color:#dc2626!important}
.action-btn{width:100%;background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;border:none;border-radius:14px;padding:15px;font-size:1rem;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:1px;box-shadow:0 6px 16px rgba(37,99,235,.28)}.action-btn:disabled{background:#cbd5e1;color:#64748b;cursor:not-allowed;box-shadow:none}.status-banner{text-align:center;font-weight:800;font-size:.9rem;min-height:22px;color:#475569}.confetti{position:fixed;top:-10px;width:10px;height:10px;pointer-events:none;animation:fall 1.4s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<audio id="s-correct" src="assets/correct.mp3" preload="auto"></audio>
<audio id="s-wrong" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="s-claps" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>
<div id="hard-splash"><img src="assets/innovine-logo.png" class="splash-img" alt="Innovine Logo"></div>
<div id="viewport-root">
  <div id="instruction-modal"><div class="ins-box"><h2 class="ins-title">Angle Express Rules</h2><p class="ins-text">Read each Lines & Angles challenge. Select the correct answer, then launch the Geometry Express. Correct choices help the train reach the station safely!</p><button class="action-btn" onclick="dismissInstructions()">Start Mission</button></div></div>
  <div class="score-row"><span>Challenge: <span id="q-num">1</span>/10</span><span>Stars: ⭐ <span id="score">0</span></span></div>
  <div class="header-card"><img src="assets/innovine-logo.png" class="hud-logo" alt="Innovine Logo"><div class="ticker"><div class="ticker-title">Lines & Angles Verification</div><div class="ticker-problem" id="lbl-task">Loading...</div></div></div>
  <div class="simulation-frame"><canvas id="game-canvas"></canvas></div>
  <div class="status-banner" id="status">Choose an answer and launch.</div>
  <div class="console-grid"><button class="option-row-btn" id="opt-0" onclick="selectOption(0)">A.) Loading...</button><button class="option-row-btn" id="opt-1" onclick="selectOption(1)">B.) Loading...</button><button class="option-row-btn" id="opt-2" onclick="selectOption(2)">C.) Loading...</button><button class="option-row-btn" id="opt-3" onclick="selectOption(3)">D.) Loading...</button></div>
  <button class="action-btn" id="btn-launch" onclick="launchTrain()">Launch Geometry Express</button>
</div>
<script>
let canvas,ctx,loopId,currentQ,chosen=0,answers=[],qIndex=0,score=0,locked=false;
let train={progress:0,driving:false,crash:false,rot:0,ox:0,oy:0,timer:0};
const questions=[
{q:'Two angles form a linear pair. One angle is 65°. What is the other angle?',ans:'115°',w:['65°','125°','90°'],exp:'Angles in a linear pair add up to 180°.'},
{q:'If two vertically opposite angles are formed and one angle is 78°, what is the opposite angle?',ans:'78°',w:['102°','12°','180°'],exp:'Vertically opposite angles are equal.'},
{q:'An angle measuring 90° is called a/an:',ans:'Right angle',w:['Acute angle','Obtuse angle','Straight angle'],exp:'A right angle measures exactly 90°.'},
{q:'Which pair of angles are complementary?',ans:'40° and 50°',w:['60° and 40°','90° and 90°','120° and 60°'],exp:'Complementary angles add up to 90°.'},
{q:'Which pair of angles are supplementary?',ans:'110° and 70°',w:['80° and 80°','45° and 45°','100° and 60°'],exp:'Supplementary angles add up to 180°.'},
{q:'If an angle is 35°, its complement is:',ans:'55°',w:['145°','35°','65°'],exp:'Complement = 90° - 35° = 55°.'},
{q:'If an angle is 120°, its supplement is:',ans:'60°',w:['30°','120°','240°'],exp:'Supplement = 180° - 120° = 60°.'},
{q:'When two lines intersect, how many pairs of vertically opposite angles are formed?',ans:'2 pairs',w:['1 pair','3 pairs','4 pairs'],exp:'Two intersecting lines form two pairs of vertically opposite angles.'},
{q:'An angle greater than 90° but less than 180° is called:',ans:'Obtuse angle',w:['Acute angle','Right angle','Reflex angle'],exp:'Obtuse angles are between 90° and 180°.'},
{q:'If a transversal cuts two parallel lines, corresponding angles are:',ans:'Equal',w:['Always 90°','Supplementary only','Unequal'],exp:'Corresponding angles are equal when lines are parallel.'}
];
setTimeout(()=>{const s=document.getElementById('hard-splash');s.style.opacity='0';setTimeout(()=>{s.remove();document.getElementById('viewport-root').style.opacity='1';init();},500)},5000);
function init(){canvas=document.getElementById('game-canvas');ctx=canvas.getContext('2d');resize();window.addEventListener('resize',resize);shuffle(questions);loadQuestion();loop();}
function resize(){const r=canvas.getBoundingClientRect();canvas.width=r.width;canvas.height=r.height;}
function dismissInstructions(){document.getElementById('instruction-modal').remove();}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function loadQuestion(){locked=false;currentQ=questions[qIndex];document.getElementById('q-num').innerText=qIndex+1;document.getElementById('lbl-task').innerText=currentQ.q;document.getElementById('status').innerText='Choose an answer and launch.';document.getElementById('status').style.color='#475569';document.getElementById('btn-launch').disabled=false;answers=shuffle([{t:currentQ.ans,c:true},...currentQ.w.map(x=>({t:x,c:false}))]);for(let i=0;i<4;i++){let b=document.getElementById('opt-'+i);b.className='option-row-btn';b.innerText=String.fromCharCode(65+i)+'.) '+answers[i].t;}train={progress:0,driving:false,crash:false,rot:0,ox:0,oy:0,timer:0};selectOption(0)}
function selectOption(i){if(train.driving||train.crash||locked)return;chosen=i;for(let k=0;k<4;k++)document.getElementById('opt-'+k).classList.toggle('selected',k===i)}
function launchTrain(){if(train.driving||train.crash||locked)return;document.getElementById('btn-launch').disabled=true;train.driving=true;document.getElementById('status').innerText='Geometry Express is checking the angle route...';document.getElementById('status').style.color='#2563eb'}
function update(){if(train.driving){train.progress+=.018;if(train.progress>=1){train.progress=1;train.driving=false;checkAnswer();}}if(train.crash){train.timer++;train.rot+=.22;train.ox+=1.6;train.oy=Math.sin(train.timer*.45)*7;if(train.timer>58){train.crash=false;train.progress=0;train.rot=0;train.ox=0;train.oy=0;train.timer=0;document.getElementById('btn-launch').disabled=false;document.getElementById('status').innerText='Try again. Recheck the angle property.';document.getElementById('status').style.color='#dc2626';}}}
function checkAnswer(){let st=document.getElementById('status');if(answers[chosen].c){document.getElementById('s-correct').play().catch(()=>{});document.getElementById('opt-'+chosen).classList.add('correct');score++;document.getElementById('score').innerText=score;st.innerText='Correct! '+currentQ.exp;st.style.color='#16a34a';confetti();locked=true;setTimeout(()=>{qIndex++;if(qIndex>=questions.length)finish();else loadQuestion();},1700)}else{document.getElementById('s-wrong').play().catch(()=>{});document.getElementById('opt-'+chosen).classList.add('wrong');st.innerText='Oops! The train took the wrong angle route.';st.style.color='#dc2626';train.crash=true;}}
function finish(){document.getElementById('s-claps').play().catch(()=>{});document.getElementById('viewport-root').innerHTML=`<div class="ins-box" style="margin:auto;text-align:center"><h2 class="ins-title">🏆 Geometry Station Reached!</h2><p class="ins-text">You completed all 10 Lines & Angles challenges.<br><b>Final Stars: ${score}/10</b></p><button class="action-btn" onclick="location.reload()">Play Again</button></div>`;}
function render(){ctx.clearRect(0,0,canvas.width,canvas.height);let w=canvas.width,h=canvas.height;ctx.strokeStyle='rgba(37,99,235,.18)';ctx.lineWidth=1;for(let x=0;x<w;x+=35){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}for(let y=0;y<h;y+=35){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}ctx.strokeStyle='#f59e0b';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(20,h-62);ctx.lineTo(w-50,h-62);ctx.stroke();ctx.strokeStyle='#1d4ed8';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(w-75,40);ctx.lineTo(w-35,100);ctx.lineTo(w-105,100);ctx.stroke();ctx.fillStyle='#1d4ed8';ctx.font='bold 14px sans-serif';ctx.fillText('∠',w-83,112);let sx=25,tx=w-90,x=sx+(tx-sx)*train.progress,y=h-62;ctx.save();ctx.translate(x+train.ox,y+train.oy);ctx.rotate(train.rot);ctx.fillStyle='#2563eb';ctx.fillRect(-25,-18,50,25);ctx.fillStyle='#fbbf24';ctx.fillRect(8,-28,22,35);ctx.fillStyle='#dbeafe';ctx.fillRect(-15,-12,16,7);ctx.fillStyle='#111827';ctx.beginPath();ctx.arc(-13,10,6,0,Math.PI*2);ctx.arc(15,10,6,0,Math.PI*2);ctx.fill();ctx.restore();if(train.crash){ctx.fillStyle='rgba(220,38,38,.3)';ctx.beginPath();ctx.arc(x+train.ox,y+train.oy,28,0,Math.PI*2);ctx.fill();}}
function loop(){update();render();loopId=requestAnimationFrame(loop)}
function confetti(){for(let i=0;i<16;i++){let p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=['#2563eb','#f59e0b','#16a34a','#ef4444'][Math.floor(Math.random()*4)];document.body.appendChild(p);setTimeout(()=>p.remove(),1600)}}
</script>
</body>
</html>
