<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quantity Quest: Comparing Quantities</title>
<style>
*{box-sizing:border-box;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,sans-serif;margin:0;padding:0;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;color:#1e293b;background:linear-gradient(180deg,#fff7ed 0%,#fef3c7 38%,#dbeafe 100%);display:flex;justify-content:center;align-items:center}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.35;background:radial-gradient(circle at 15% 15%,rgba(251,146,60,.32),transparent 22%),radial-gradient(circle at 82% 18%,rgba(96,165,250,.28),transparent 24%),radial-gradient(circle at 60% 85%,rgba(34,197,94,.18),transparent 26%),linear-gradient(135deg,rgba(37,99,235,.08) 1px,transparent 1px),linear-gradient(45deg,rgba(217,119,6,.08) 1px,transparent 1px);background-size:auto,auto,auto,44px 44px,44px 44px}
#hard-splash{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;justify-content:center;align-items:center;transition:opacity .5s ease}
.splash-img{max-width:min(270px,72vw);height:auto;object-fit:contain}
#viewport-root{width:100%;max-width:470px;height:100dvh;max-height:790px;display:flex;flex-direction:column;padding:clamp(10px,2.8vw,16px);gap:clamp(8px,2vw,12px);opacity:0;transition:opacity .5s ease;position:relative}
#instruction-modal{position:absolute;inset:0;background:rgba(255,251,235,.96);z-index:5000;display:flex;justify-content:center;align-items:center;padding:20px;text-align:center;border-radius:18px}
.ins-box{background:#fff;border:2px solid #f59e0b;padding:clamp(18px,5vw,26px);border-radius:20px;box-shadow:0 14px 35px rgba(146,64,14,.22)}
.ins-title{font-size:clamp(1.25rem,5vw,1.6rem);color:#2563eb;font-weight:900;margin-bottom:12px}
.ins-text{font-size:clamp(.88rem,3.6vw,1rem);color:#475569;line-height:1.55;margin-bottom:20px;text-align:left}
.top-row{display:flex;justify-content:space-between;align-items:center;color:#1d4ed8;font-weight:900;font-size:clamp(.82rem,3.2vw,.98rem)}
.header-card{background:rgba(255,255,255,.9);border:2px solid #60a5fa;border-radius:18px;padding:clamp(10px,2.4vw,14px);box-shadow:0 10px 24px rgba(37,99,235,.14);text-align:center}
.ticker{background:#eff6ff;border:2px solid #2563eb;border-radius:13px;padding:clamp(10px,2.3vw,13px)}
.ticker-problem{font-size:clamp(.9rem,3.6vw,1.08rem);font-weight:750;color:#1e293b;margin-top:6px;line-height:1.35}
.shop-frame{flex:1;min-height:210px;background:rgba(255,255,255,.76);border:2px solid #f59e0b;border-radius:18px;position:relative;overflow:hidden;box-shadow:inset 0 0 20px rgba(251,191,36,.13)}
canvas{display:block;width:100%;height:100%}
.status{min-height:24px;text-align:center;font-weight:850;font-size:clamp(.8rem,3vw,.92rem);color:#475569;line-height:1.25}
.options{display:grid;grid-template-columns:1fr 1fr;gap:clamp(7px,2vw,10px)}
.opt{background:#fff;border:2px solid #bfdbfe;color:#1e293b;border-radius:14px;padding:clamp(10px,3vw,14px);font-size:clamp(.86rem,3.3vw,.98rem);font-weight:850;cursor:pointer;text-align:left;transition:.2s;min-height:44px}
.opt:active,.opt.selected{background:#dbeafe;border-color:#2563eb;box-shadow:0 0 12px rgba(37,99,235,.25)}
.opt.correct{background:#dcfce7!important;border-color:#16a34a!important}
.opt.wrong{background:#fee2e2!important;border-color:#dc2626!important}
.action-btn{width:100%;background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;border:none;border-radius:15px;padding:clamp(12px,3.2vw,16px);font-size:clamp(.9rem,3.4vw,1rem);font-weight:950;cursor:pointer;text-transform:uppercase;letter-spacing:.7px;box-shadow:0 6px 16px rgba(37,99,235,.28)}
.action-btn:disabled{background:#cbd5e1;color:#64748b;cursor:not-allowed;box-shadow:none}
.confetti{position:fixed;top:-10px;width:10px;height:10px;pointer-events:none;animation:fall 1.4s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
@media(max-width:390px){
  #viewport-root{gap:7px;padding:9px}
  .options{grid-template-columns:1fr;gap:7px}
  .shop-frame{min-height:190px}
  .header-card{padding:9px}
  .ticker{padding:9px}
}
@media(max-height:650px){
  #viewport-root{max-width:720px;max-height:none;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto 1fr auto;gap:8px}
  .top-row{grid-column:1/3}
  .header-card{grid-column:1/2}
  .shop-frame{grid-column:2/3;grid-row:2/5;min-height:300px}
  .status{grid-column:1/2}
  .options{grid-column:1/2}
  .action-btn{grid-column:1/2}
  #instruction-modal{position:fixed;border-radius:0}
}
</style>
</head>
<body>
<audio id="s-correct" src="assets/correct.mp3" preload="auto"></audio>
<audio id="s-wrong" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="s-claps" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

<div id="hard-splash"><img src="assets/innovine-logo.png" class="splash-img" alt="Innovine Logo"></div>

<div id="viewport-root">
  <div id="instruction-modal">
    <div class="ins-box">
      <h2 class="ins-title">Quantity Quest Rules</h2>
      <p class="ins-text">Read each Comparing Quantities challenge. Select the correct value, then send the shopping cart to the billing counter. Correct answers help you earn stars!</p>
      <button class="action-btn" onclick="dismissInstructions()">Start Quest</button>
    </div>
  </div>

  <div class="top-row">
    <span>Challenge: <span id="q-num">1</span>/10</span>
    <span>Stars: ⭐ <span id="score">0</span></span>
  </div>

  <div class="header-card">
    
    <div class="ticker">
      
      <div class="ticker-problem" id="lbl-task">Loading...</div>
    </div>
  </div>

  <div class="shop-frame"><canvas id="game-canvas"></canvas></div>

  <div class="status" id="status"></div>

  <div class="options">
    <button class="opt" id="opt-0" onclick="selectOption(0)">A.) Loading...</button>
    <button class="opt" id="opt-1" onclick="selectOption(1)">B.) Loading...</button>
    <button class="opt" id="opt-2" onclick="selectOption(2)">C.) Loading...</button>
    <button class="opt" id="opt-3" onclick="selectOption(3)">D.) Loading...</button>
  </div>

  <button class="action-btn" id="btn-launch" onclick="launchCart()">Send Cart to Billing</button>
</div>

<script>
let canvas,ctx,currentQ,chosen=0,answers=[],qIndex=0,score=0,locked=false,attempts=0;
let cart={progress:0,moving:false,crash:false,rot:0,ox:0,oy:0,timer:0};
const questions=[
{q:'A shirt costs ₹800. It is sold at a 25% discount. What is the discount amount?',ans:'₹200',w:['₹100','₹250','₹600'],exp:'25% of 800 = 200.'},
{q:'A book costs ₹250. Its price increases by 10%. What is the increase?',ans:'₹25',w:['₹10','₹20','₹275'],exp:'10% of 250 = 25.'},
{q:'Convert 3/4 into percentage.',ans:'75%',w:['34%','60%','80%'],exp:'3/4 = 0.75 = 75%.'},
{q:'Convert 0.35 into percentage.',ans:'35%',w:['3.5%','350%','30%'],exp:'0.35 × 100 = 35%.'},
{q:'There are 40 students. 60% are girls. How many girls are there?',ans:'24',w:['16','20','26'],exp:'60% of 40 = 24.'},
{q:'A pen marked ₹50 is sold for ₹45. What is the discount?',ans:'₹5',w:['₹10','₹45','₹95'],exp:'Discount = Marked Price - Selling Price = 50 - 45.'},
{q:'A toy bought for ₹300 is sold for ₹360. What is the profit?',ans:'₹60',w:['₹30','₹40','₹660'],exp:'Profit = Selling Price - Cost Price = 360 - 300.'},
{q:'A bag bought for ₹500 is sold for ₹450. What is the loss?',ans:'₹50',w:['₹45','₹100','₹950'],exp:'Loss = Cost Price - Selling Price = 500 - 450.'},
{q:'Find 20% of ₹750.',ans:'₹150',w:['₹75','₹125','₹200'],exp:'20% of 750 = 150.'},
{q:'Which is greater?',ans:'40% of 200',w:['20% of 300','10% of 500','25% of 160'],exp:'40% of 200 = 80, which is greater than 60, 50 and 40.'}
];

setTimeout(()=>{const s=document.getElementById('hard-splash');s.style.opacity='0';setTimeout(()=>{s.remove();document.getElementById('viewport-root').style.opacity='1';init();},500)},5000);

function init(){
 canvas=document.getElementById('game-canvas');ctx=canvas.getContext('2d');
 resize();window.addEventListener('resize',resize);
 shuffle(questions);loadQuestion();loop();
}
function resize(){const r=canvas.getBoundingClientRect();canvas.width=Math.max(260,r.width);canvas.height=Math.max(180,r.height);}
function dismissInstructions(){const m=document.getElementById('instruction-modal'); if(m) m.remove();}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function loadQuestion(){
 locked=false;attempts=0;currentQ=questions[qIndex];
 document.getElementById('q-num').innerText=qIndex+1;
 document.getElementById('lbl-task').innerText=currentQ.q;
 document.getElementById('status').innerText='';
 document.getElementById('status').style.color='#475569';
 document.getElementById('btn-launch').disabled=false;
 answers=shuffle([{t:currentQ.ans,c:true},...currentQ.w.map(x=>({t:x,c:false}))]);
 for(let i=0;i<4;i++){let b=document.getElementById('opt-'+i);b.className='opt';b.innerText=String.fromCharCode(65+i)+'.) '+answers[i].t;}
 cart={progress:0,moving:false,crash:false,rot:0,ox:0,oy:0,timer:0};
 selectOption(0);
}
function selectOption(i){if(cart.moving||cart.crash||locked)return;chosen=i;for(let k=0;k<4;k++)document.getElementById('opt-'+k).classList.toggle('selected',k===i)}
function launchCart(){if(cart.moving||cart.crash||locked)return;document.getElementById('btn-launch').disabled=true;cart.moving=true;document.getElementById('status').innerText='';document.getElementById('status').style.color='#2563eb'}
function update(){
 if(cart.moving){cart.progress+=.018;if(cart.progress>=1){cart.progress=1;cart.moving=false;checkAnswer();}}
 if(cart.crash){cart.timer++;cart.rot+=.2;cart.ox+=1.3;cart.oy=Math.sin(cart.timer*.45)*7;if(cart.timer>55){cart.crash=false;cart.progress=0;cart.rot=0;cart.ox=0;cart.oy=0;cart.timer=0;document.getElementById('btn-launch').disabled=false;document.getElementById('status').innerText='Try again. Recheck percentage or profit/loss.';document.getElementById('status').style.color='#dc2626';}}
}
function checkAnswer(){
 let st=document.getElementById('status');
 if(answers[chosen].c){
  document.getElementById('s-correct').play().catch(()=>{});
  document.getElementById('opt-'+chosen).classList.add('correct');
  score++; document.getElementById('score').innerText=score;
  st.innerText='Correct! '+currentQ.exp; st.style.color='#16a34a';
  confetti(); locked=true;
  setTimeout(()=>{qIndex++; if(qIndex>=questions.length)finish(); else loadQuestion();},1800);
 } else {
  attempts++;
  document.getElementById('s-wrong').play().catch(()=>{});
  document.getElementById('opt-'+chosen).classList.add('wrong');
  if(attempts < 2){
   st.innerText='Try again.';
   st.style.color='#dc2626';
   cart.crash=true;
  }else{
   const correctIndex=answers.findIndex(a=>a.c);
   document.getElementById('opt-'+correctIndex).classList.add('correct');
   st.innerText='Correct Answer: '+answers[correctIndex].t+' | '+currentQ.exp;
   st.style.color='#16a34a';
   locked=true;
   setTimeout(()=>{qIndex++; if(qIndex>=questions.length)finish(); else loadQuestion();},2500);
  }
 }
}
function finish(){
 document.getElementById('s-claps').play().catch(()=>{});
 document.getElementById('viewport-root').innerHTML=`<div class="ins-box" style="margin:auto;text-align:center"><h2 class="ins-title">🏆 Quantity Quest Complete!</h2><p class="ins-text" style="text-align:center">You completed all 10 Comparing Quantities challenges.<br><b>Final Stars: ${score}/10</b></p><button class="action-btn" onclick="location.reload()">Play Again</button></div>`;
}
function render(){
 if(!ctx)return;ctx.clearRect(0,0,canvas.width,canvas.height);
 let w=canvas.width,h=canvas.height;
 ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,w,h);
 ctx.strokeStyle='rgba(37,99,235,.14)';ctx.lineWidth=1;
 for(let x=0;x<w;x+=34){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}
 for(let y=0;y<h;y+=34){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}

 // shop shelf
 ctx.fillStyle='#fed7aa';ctx.fillRect(12,18,w-24,42);
 ctx.fillStyle='#fb923c';ctx.fillRect(12,56,w-24,7);
 ctx.fillStyle='#1d4ed8';ctx.font='bold 13px sans-serif';ctx.textAlign='left';ctx.fillText('SALE %  PROFIT  LOSS',22,45);

 // billing counter
 ctx.fillStyle='#bfdbfe';ctx.fillRect(w-92,h-88,72,55);
 ctx.strokeStyle='#2563eb';ctx.lineWidth=3;ctx.strokeRect(w-92,h-88,72,55);
 ctx.fillStyle='#1d4ed8';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('BILL',w-56,h-56);
 ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(w-56,h-103,19,0,Math.PI*2);ctx.fill();
 ctx.fillStyle='#78350f';ctx.font='bold 15px sans-serif';ctx.fillText('₹%',w-56,h-98);

 // road
 ctx.strokeStyle='#2563eb';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(22,h-65);ctx.lineTo(w-105,h-65);ctx.stroke();
 ctx.strokeStyle='#f59e0b';ctx.setLineDash([10,10]);ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(22,h-65);ctx.lineTo(w-105,h-65);ctx.stroke();ctx.setLineDash([]);

 let sx=35,tx=w-123,x=sx+(tx-sx)*cart.progress,y=h-65;
 ctx.save();ctx.translate(x+cart.ox,y+cart.oy);ctx.rotate(cart.rot);
 ctx.fillStyle='#2563eb';ctx.fillRect(-24,-18,48,24);
 ctx.fillStyle='#60a5fa';ctx.fillRect(-18,-28,34,16);
 ctx.fillStyle='#fef3c7';ctx.fillRect(-10,-36,18,10);
 ctx.fillStyle='#111827';ctx.beginPath();ctx.arc(-14,9,6,0,Math.PI*2);ctx.arc(16,9,6,0,Math.PI*2);ctx.fill();
 ctx.restore();
 if(cart.crash){ctx.fillStyle='rgba(220,38,38,.28)';ctx.beginPath();ctx.arc(x+cart.ox,y+cart.oy,28,0,Math.PI*2);ctx.fill();}
}
function loop(){update();render();requestAnimationFrame(loop)}
function confetti(){for(let i=0;i<18;i++){let p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=['#2563eb','#f59e0b','#16a34a','#ef4444'][Math.floor(Math.random()*4)];document.body.appendChild(p);setTimeout(()=>p.remove(),1600)}}
</script>
</body>
</html>
