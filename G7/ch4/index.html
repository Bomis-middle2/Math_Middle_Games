
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grade 7 Linear Equations Racing Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(180deg,#e0f2fe 0%,#f8fafc 48%,#dbeafe 100%);color:#0f172a;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;position:relative}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.32;background:radial-gradient(circle at 12% 18%,#93c5fd 0 70px,transparent 72px),radial-gradient(circle at 86% 22%,#bae6fd 0 82px,transparent 84px),linear-gradient(rgba(37,99,235,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.09) 1px,transparent 1px);background-size:auto,auto,46px 46px,46px 46px}
.screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:24px;text-align:center}.logo{width:220px;max-width:60vw;margin-bottom:24px}.loading-box{width:240px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:15px}.loading-fill{width:0%;height:100%;background:#0ea5e9}
#instruction-screen{background:linear-gradient(180deg,#e0f2fe,#f8fafc);z-index:500}.menu-card{background:rgba(255,255,255,.86);border:2px solid rgba(14,165,233,.25);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:38px 30px;border-radius:24px;max-width:560px;width:100%;box-shadow:0 25px 50px -18px rgba(2,132,199,.35)}.menu-card h2{color:#0369a1;margin-bottom:22px;font-size:2rem}.instructions p{font-size:1.08rem;line-height:1.6;margin-bottom:14px;color:#334155;text-align:left}
button{border:0;border-radius:16px;background:linear-gradient(135deg,#0ea5e9,#2563eb);color:white;font-size:1.12rem;font-weight:bold;padding:14px 34px;cursor:pointer;box-shadow:0 10px 25px -8px rgba(37,99,235,.45);transition:transform .2s,box-shadow .2s}button:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 15px 30px -8px rgba(37,99,235,.5)}button:disabled{opacity:.6;cursor:not-allowed}.hidden{display:none!important}
#game-container{display:flex;flex-direction:column;width:100%;height:100%;max-width:1000px;margin:0 auto;padding:16px;position:relative;z-index:1}#hud{display:flex;justify-content:space-between;align-items:center;width:100%;padding:12px 16px;font-size:1.15rem;font-weight:800;color:#0369a1}#progress{width:100%;height:9px;background:#bfdbfe;border-radius:9999px;overflow:hidden;margin-bottom:4px}#bar{height:100%;width:0%;background:linear-gradient(90deg,#0ea5e9,#2563eb);border-radius:9999px;transition:width .6s cubic-bezier(.25,1,.5,1)}
#track{width:100%;height:130px;margin:15px 0;background:linear-gradient(180deg,#dbeafe,#bfdbfe);border:4px solid #60a5fa;border-radius:22px;position:relative;overflow:hidden;box-shadow:inset 0 4px 22px rgba(59,130,246,.22),0 16px 30px -24px #1d4ed8}#line{position:absolute;top:50%;transform:translateY(-50%);width:100%;height:6px;background:repeating-linear-gradient(to right,#ffffff 0,#ffffff 30px,transparent 30px,transparent 60px);opacity:.9}#finish{position:absolute;right:20px;width:16px;height:100%;background:repeating-linear-gradient(to bottom,#fff 0,#fff 10px,#111827 10px,#111827 20px);border-left:2px solid #2563eb;border-right:2px solid #2563eb}
#car{width:70px;height:36px;background:linear-gradient(90deg,#f97316,#ef4444);position:absolute;top:calc(50% - 18px);left:15px;border-radius:8px;box-shadow:0 0 18px rgba(249,115,22,.45);transition:left .6s cubic-bezier(.25,1,.5,1)}#car:before,#car:after{content:"";position:absolute;width:14px;height:8px;background:#111827;border-radius:2px}#car:before{top:-4px;left:10px;box-shadow:0 0 0 2px #475569}#car:after{bottom:-4px;left:10px;box-shadow:0 0 0 2px #475569}.cockpit{position:absolute;right:12px;top:6px;width:24px;height:24px;background:#7dd3fc;border-radius:4px;opacity:.9}
#questionBox{background:rgba(255,255,255,.9);border:2px solid #93c5fd;border-radius:22px;padding:24px;margin:10px 0;text-align:center;box-shadow:0 18px 45px -30px rgba(37,99,235,.5)}#q{font-size:1.35rem;font-weight:750;line-height:1.5;color:#0f172a;margin-bottom:24px}#options{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.option-btn{background:#e0f2fe;color:#0f172a;border:2px solid #bae6fd;border-radius:14px;padding:16px;font-size:1.15rem;font-weight:750;cursor:pointer;transition:background .2s,border-color .2s,transform .1s}.option-btn:hover:not(:disabled){background:#bfdbfe;border-color:#60a5fa}.reveal-correct{background:#10b981!important;border-color:#059669!important;color:#fff!important}.reveal-wrong{background:#ef4444!important;border-color:#dc2626!important;color:#fff!important}
#feedback-box{margin-top:20px;padding:16px;border-radius:12px;background:#eff6ff;border-left:5px solid #0ea5e9;color:#1e293b;font-size:1.05rem;line-height:1.5;text-align:left}.shake{animation:trackShake .4s ease-in-out}@keyframes trackShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.action-row{height:70px;display:flex;justify-content:center;align-items:center;margin-top:15px}
#result-screen{background:linear-gradient(180deg,#e0f2fe,#ffffff);z-index:600}.creative-pop{font-size:4.5rem;animation:bouncePop 1.5s infinite alternate cubic-bezier(.45,0,.55,1);margin-bottom:20px}@keyframes bouncePop{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-10px) scale(1.08)}}
.confetti{position:fixed;top:-10px;width:10px;height:10px;pointer-events:none;animation:fall 1.4s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
.equation-badge{display:inline-block;background:#dbeafe;border:1px solid #60a5fa;color:#1d4ed8;border-radius:999px;padding:5px 12px;margin-bottom:8px;font-size:.9rem;font-weight:800}
@media(max-width:640px){#hud{font-size:.92rem;padding:10px 4px}#options{grid-template-columns:1fr;gap:12px}#track{height:100px}#car{width:56px;height:30px;top:calc(50% - 15px)}.cockpit{width:18px;height:18px;top:6px;right:8px}#q{font-size:1.12rem}.menu-card{padding:30px 20px}.instructions p{font-size:1rem}}
</style>
</head>
<body>
<div id="loader" class="screen"><img src="assets/innovine-logo.png" alt="Innovine Logo" class="logo"><div class="loading-box"><div id="loading-fill" class="loading-fill"></div></div></div>
<div id="instruction-screen" class="screen hidden"><div class="menu-card"><h2>Linear Equation Race</h2><div class="instructions"><p>• Solve one-step and simple two-step linear equations.</p><p>• The car moves ahead after every question.</p><p>• You get 2 chances. First-try correct answers add more speed.</p></div><button onclick="startGame()">Start Equation Race</button></div></div>
<div id="game-container" class="hidden"><div id="hud"><span>Track Progress: <span id="q-num">1</span>/10</span><span>Equation Speed: <span id="score-display">0</span> KM/H</span></div><div id="progress"><div id="bar"></div></div><div id="track"><div id="line"></div><div id="finish"></div><div id="car"><div class="cockpit"></div></div></div><div id="questionBox"><div class="equation-badge">GRADE 7 LINEAR EQUATIONS</div><h3 id="q"></h3><div id="options"></div><div id="feedback-box" class="hidden"></div></div><div class="action-row"><button id="next-btn" class="hidden" onclick="loadNextQuestion()">Next Equation ➡️</button></div></div>
<div id="result-screen" class="screen hidden"><div class="menu-card" style="text-align:center"><div class="creative-pop">🏁📘🏆</div><h2 style="color:#0369a1;margin-bottom:16px">Finish Line Crossed!</h2><p id="result-msg" style="font-size:1.15rem;color:#334155;margin-bottom:30px;line-height:1.6"></p><button onclick="location.reload()">Restart Race</button></div></div>
<script>
const audio={correct:new Audio('assets/correct.mp3'),wrong:new Audio('assets/wrong.mp3'),claps:new Audio('assets/freesound_community-claps-44774.mp3')};
const allQuestions=[
{q:"Solve: x + 7 = 19",options:["x = 12","x = 26","x = 10","x = 14"],ans:"x = 12",exp:"Subtract 7 from both sides: x = 19 - 7 = 12."},
{q:"Solve: y - 9 = 6",options:["y = 3","y = 15","y = -15","y = 54"],ans:"y = 15",exp:"Add 9 to both sides: y = 6 + 9 = 15."},
{q:"Solve: 5a = 40",options:["a = 5","a = 8","a = 35","a = 45"],ans:"a = 8",exp:"Divide both sides by 5: a = 40 ÷ 5 = 8."},
{q:"Solve: p/4 = 7",options:["p = 11","p = 3","p = 28","p = 14"],ans:"p = 28",exp:"Multiply both sides by 4: p = 7 × 4 = 28."},
{q:"Solve: 2x + 3 = 15",options:["x = 6","x = 9","x = 12","x = 5"],ans:"x = 6",exp:"Subtract 3: 2x = 12. Then divide by 2: x = 6."},
{q:"Solve: 3m - 4 = 11",options:["m = 3","m = 5","m = 7","m = 15"],ans:"m = 5",exp:"Add 4: 3m = 15. Then divide by 3: m = 5."},
{q:"Solve: x/3 + 2 = 6",options:["x = 4","x = 8","x = 12","x = 18"],ans:"x = 12",exp:"Subtract 2: x/3 = 4. Then multiply by 3: x = 12."},
{q:"Riya thinks of a number. She doubles it and gets 18. What is the number?",options:["6","9","16","36"],ans:"9",exp:"Let the number be n. 2n = 18, so n = 9."},
{q:"A number increased by 11 gives 25. Which equation and solution is correct?",options:["x + 11 = 25, x = 14","x - 11 = 25, x = 36","11x = 25, x = 14","x + 25 = 11, x = 14"],ans:"x + 11 = 25, x = 14",exp:"Increased by 11 means x + 11. So x = 25 - 11 = 14."},
{q:"The cost of 4 same notebooks is ₹60. What is the cost of 1 notebook?",options:["₹12","₹15","₹20","₹24"],ans:"₹15",exp:"Let one notebook cost c. 4c = 60, so c = 60 ÷ 4 = 15."}
];
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
let questions=shuffle([...allQuestions]);let qIndex=0;let correctAns=null;let milestoneScore=0;let attempts=0;let locked=false;
window.addEventListener('DOMContentLoaded',()=>{const fill=document.getElementById('loading-fill');let progress=0;const interval=setInterval(()=>{progress+=1;fill.style.width=Math.min(progress,100)+'%';if(progress>=100){clearInterval(interval);document.getElementById('loader').classList.add('hidden');document.getElementById('instruction-screen').classList.remove('hidden')}},50)});
function startGame(){document.getElementById('instruction-screen').classList.add('hidden');document.getElementById('game-container').classList.remove('hidden');loadQ()}
function loadQ(){locked=false;attempts=0;document.getElementById('next-btn').classList.add('hidden');document.getElementById('feedback-box').classList.add('hidden');document.getElementById('q-num').innerText=qIndex+1;let qObj=questions[qIndex];document.getElementById('q').innerHTML=qObj.q;correctAns=qObj.ans;let box=document.getElementById('options');box.innerHTML='';let opts=shuffle([...qObj.options]);opts.forEach((opt,idx)=>{const btn=document.createElement('button');btn.className='option-btn';btn.id='opt-btn-'+idx;btn.innerText=opt;btn.onclick=()=>check(String(opt),idx);box.appendChild(btn)})}
function check(selected,idx){if(locked)return;const fb=document.getElementById('feedback-box');const selectedBtn=document.getElementById('opt-btn-'+idx);let qObj=questions[qIndex];if(selected===String(correctAns)){locked=true;selectedBtn.classList.add('reveal-correct');try{audio.correct.play()}catch(e){}if(attempts===0){milestoneScore+=10;document.getElementById('score-display').innerText=milestoneScore}fb.innerHTML='<b>✅ Correct!</b> '+qObj.exp;fb.classList.remove('hidden');moveCarAndProgress();disableAllOptions();confetti();document.getElementById('next-btn').classList.remove('hidden')}else{attempts++;try{audio.wrong.play()}catch(e){}document.getElementById('track').classList.add('shake');setTimeout(()=>document.getElementById('track').classList.remove('shake'),400);if(attempts<2){selectedBtn.classList.add('reveal-wrong');selectedBtn.disabled=true;fb.innerHTML='<b>Try again!</b> Use inverse operations to balance both sides.';fb.classList.remove('hidden')}else{locked=true;selectedBtn.classList.add('reveal-wrong');disableAllOptions();document.querySelectorAll('.option-btn').forEach(btn=>{if(btn.innerText===String(correctAns))btn.classList.add('reveal-correct')});fb.innerHTML='<b>Out of attempts!</b> Correct answer: <b>'+correctAns+'</b>. '+qObj.exp;fb.classList.remove('hidden');moveCarAndProgress();document.getElementById('next-btn').classList.remove('hidden')}}}
function disableAllOptions(){document.querySelectorAll('.option-btn').forEach(btn=>btn.disabled=true)}
function moveCarAndProgress(){let completed=qIndex+1;let targetPercent=Math.min((completed/10)*85,85);document.getElementById('car').style.left='calc('+targetPercent+'% + 15px)';document.getElementById('bar').style.width=(completed/10)*100+'%'}
function loadNextQuestion(){qIndex++;if(qIndex>=questions.length){showWinScreen();return}loadQ()}
function showWinScreen(){document.getElementById('game-container').classList.add('hidden');document.getElementById('result-screen').classList.remove('hidden');try{audio.claps.play()}catch(e){}let msg='Great driving! You completed all 10 Linear Equation challenges. Score: '+milestoneScore+' KM/H.';if(milestoneScore>=90)msg='Excellent Podium Finish! You balanced equations confidently and solved them with accuracy.';document.getElementById('result-msg').innerText=msg}
function confetti(){for(let i=0;i<18;i++){let p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=['#0ea5e9','#10b981','#f59e0b','#ef4444'][Math.floor(Math.random()*4)];p.style.animationDelay=Math.random()*0.25+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),1600)}}
</script>
</body>
</html>
