<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Triangle Trail: Properties Game</title>
<style>
*{box-sizing:border-box;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,sans-serif;margin:0;padding:0;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;color:#1f2937;background:linear-gradient(180deg,#ecfeff 0%,#dbeafe 45%,#fef9c3 100%);display:flex;justify-content:center;align-items:center}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.45;background:radial-gradient(circle at 15% 15%,rgba(14,165,233,.22),transparent 22%),radial-gradient(circle at 80% 18%,rgba(250,204,21,.28),transparent 20%),linear-gradient(60deg,rgba(37,99,235,.08) 1px,transparent 1px),linear-gradient(120deg,rgba(245,158,11,.08) 1px,transparent 1px);background-size:auto,auto,48px 48px,48px 48px}
#viewport-root{width:100%;max-width:480px;height:100%;max-height:780px;display:flex;flex-direction:column;padding:clamp(10px,2vw,16px);gap:clamp(8px,1.6vh,12px);opacity:0;transition:opacity .5s ease;position:relative}
#hard-splash{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;justify-content:center;align-items:center;transition:opacity .5s ease}.splash-img{width:min(280px,70vw);height:auto;object-fit:contain}
#instruction-modal{position:absolute;inset:0;background:rgba(239,246,255,.97);z-index:5000;display:flex;justify-content:center;align-items:center;padding:20px;text-align:center;border-radius:16px}.ins-box{background:#fff;border:2px solid #38bdf8;padding:clamp(18px,5vw,26px);border-radius:20px;box-shadow:0 12px 30px rgba(14,116,144,.2)}.ins-title{font-size:clamp(1.25rem,4vw,1.55rem);color:#0369a1;font-weight:900;margin-bottom:12px}.ins-text{font-size:clamp(.88rem,2.6vw,.98rem);color:#475569;line-height:1.55;margin-bottom:20px}
.header-card{background:rgba(255,255,255,.88);border:2px solid #38bdf8;border-radius:18px;padding:clamp(10px,2.4vw,14px);box-shadow:0 10px 24px rgba(14,165,233,.18);text-align:center}.signpost{background:#f0f9ff;border:2px solid #0284c7;border-radius:12px;padding:clamp(9px,2vw,12px)}.signpost-value{font-size:clamp(.96rem,3.2vw,1.18rem);font-weight:850;color:#1e293b;margin-top:5px;line-height:1.35}
.score-row{display:flex;justify-content:space-between;gap:8px;color:#0369a1;font-weight:900;font-size:clamp(.86rem,2.8vw,1rem);padding:0 2px}.map-frame{flex:1 1 auto;background:rgba(255,255,255,.78);border:2px solid #f59e0b;border-radius:18px;position:relative;overflow:hidden;min-height:220px;box-shadow:inset 0 0 20px rgba(251,191,36,.13)}canvas{display:block;width:100%;height:100%}
.toast-banner{text-align:center;font-weight:800;font-size:clamp(.82rem,2.6vw,.92rem);min-height:24px;color:#475569;line-height:1.25}.switch-deck{display:flex;justify-content:space-between;gap:8px;width:100%}.btn-switch{flex:1;background:#fff;border:2px solid #bfdbfe;color:#1e293b;border-radius:14px;padding:clamp(10px,2.4vw,14px) 6px;font-size:clamp(.75rem,2.4vw,.9rem);font-weight:850;cursor:pointer;text-transform:uppercase;transition:.2s}.btn-switch.active{background:#dbeafe;border-color:#0284c7;color:#0369a1;box-shadow:0 0 15px rgba(14,165,233,.25)}.btn-switch.correct{background:#dcfce7!important;border-color:#16a34a!important;color:#166534!important}.btn-switch.wrong{background:#fee2e2!important;border-color:#dc2626!important;color:#991b1b!important}
.btn-submit{width:100%;background:linear-gradient(135deg,#0ea5e9,#22c55e);color:#fff;border:none;border-radius:14px;padding:clamp(13px,3vw,16px);font-size:clamp(.88rem,2.8vw,1rem);font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:.7px;box-shadow:0 6px 16px rgba(14,165,233,.28)}.btn-submit:disabled{background:#cbd5e1;color:#64748b;cursor:not-allowed;box-shadow:none}.confetti{position:fixed;top:-10px;width:10px;height:10px;pointer-events:none;animation:fall 1.4s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
@media(max-width:380px){#viewport-root{padding:8px;gap:7px}.switch-deck{gap:6px}.map-frame{min-height:200px}.btn-submit{letter-spacing:.2px}}
@media(max-height:650px){#viewport-root{max-height:none;gap:7px}.header-card{padding:8px}.signpost{padding:8px}.map-frame{min-height:180px}.btn-switch{padding:9px 5px}.btn-submit{padding:11px}.ins-box{padding:18px}}
@media(orientation:landscape) and (max-height:520px){#viewport-root{max-width:820px;display:grid;grid-template-columns:1fr 1.2fr;grid-template-rows:auto 1fr auto auto;gap:8px}.score-row{grid-column:1/3}.header-card{grid-column:1/2;grid-row:2/3}.map-frame{grid-column:2/3;grid-row:2/5;min-height:0}.toast-banner{grid-column:1/2}.switch-deck{grid-column:1/2}.btn-submit{grid-column:1/2}}
</style>
</head>
<body>
<audio id="s-correct" src="assets/correct.mp3" preload="auto"></audio>
<audio id="s-wrong" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="s-claps" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>
<div id="hard-splash"><img src="assets/innovine-logo.png" class="splash-img" alt="Innovine Logo"></div>
<div id="viewport-root">
  <div id="instruction-modal"><div class="ins-box"><h2 class="ins-title">Triangle Trail Rules</h2><p class="ins-text">Read each triangle property challenge. Select Trail 1, 2, or 3 to guide the triangle rover to the correct answer.</p><button class="btn-submit" onclick="dismissInstructions()">Start Mission</button></div></div>
  <div class="score-row"><span>Challenge: <span id="q-num">1</span>/10</span><span>Stars: ⭐ <span id="score">0</span></span></div>
  <div class="header-card"><div class="signpost"><div class="signpost-value" id="lbl-directive">Loading...</div></div></div>
  <div class="map-frame"><canvas id="tri-canvas"></canvas></div>
  <div class="toast-banner" id="lbl-feedback"></div>
  <div class="switch-deck"><button class="btn-switch" id="sw-0" onclick="chooseTrail(0)">Trail 1</button><button class="btn-switch" id="sw-1" onclick="chooseTrail(1)">Trail 2</button><button class="btn-switch" id="sw-2" onclick="chooseTrail(2)">Trail 3</button></div>
  <button class="btn-submit" id="btn-dispatch" onclick="launchRover()">Launch Triangle Rover</button>
</div>
<script>
let canvas,ctx,currentQ,selected=0,options=[],qIndex=0,score=0,locked=false,animationId=null,attempts=0;
let rover={progress:0,moving:false,tumbling:false,timer:0,rot:0,ox:0,oy:0,color:'#0ea5e9',finalReveal:false};
const questions=[
{q:'Two angles of a triangle are 50° and 60°. Find the third angle.',ans:'70°',w:['60°','80°'],exp:'Angles of a triangle add up to 180°.'},
{q:'A triangle has all three sides equal. It is called:',ans:'Equilateral triangle',w:['Scalene triangle','Isosceles triangle'],exp:'An equilateral triangle has 3 equal sides.'},
{q:'A triangle with exactly two equal sides is called:',ans:'Isosceles triangle',w:['Equilateral triangle','Scalene triangle'],exp:'An isosceles triangle has exactly two equal sides.'},
{q:'A triangle with sides 4 cm, 5 cm and 6 cm is:',ans:'Scalene triangle',w:['Equilateral triangle','Isosceles triangle'],exp:'All three sides are different, so it is scalene.'},
{q:'In a right-angled triangle, one angle is always:',ans:'90°',w:['60°','180°'],exp:'A right-angled triangle has one angle equal to 90°.'},
{q:'Can 3 cm, 4 cm and 8 cm form a triangle?',ans:'No',w:['Yes','Always'],exp:'Sum of two smaller sides must be greater than the third side. 3 + 4 < 8.'},
{q:'Can 5 cm, 6 cm and 10 cm form a triangle?',ans:'Yes',w:['No','Only if angles are equal'],exp:'5 + 6 > 10, so these sides can form a triangle.'},
{q:'An exterior angle of a triangle is equal to:',ans:'Sum of two opposite interior angles',w:['Sum of all interior angles','One adjacent interior angle'],exp:'Exterior angle property: exterior angle = sum of two opposite interior angles.'},
{q:'If all angles of a triangle are less than 90°, it is a/an:',ans:'Acute-angled triangle',w:['Obtuse-angled triangle','Right-angled triangle'],exp:'A triangle with all angles less than 90° is acute-angled.'},
{q:'If one angle of a triangle is greater than 90°, it is a/an:',ans:'Obtuse-angled triangle',w:['Acute-angled triangle','Equilateral triangle'],exp:'A triangle with one angle greater than 90° is obtuse-angled.'}
];
setTimeout(()=>{const s=document.getElementById('hard-splash');s.style.opacity='0';setTimeout(()=>{s.remove();document.getElementById('viewport-root').style.opacity='1';init();},500)},5000);
function init(){canvas=document.getElementById('tri-canvas');ctx=canvas.getContext('2d');resize();window.addEventListener('resize',resize);shuffle(questions);loadQuestion();loop();}
function resize(){const r=canvas.getBoundingClientRect();canvas.width=Math.max(260,Math.floor(r.width));canvas.height=Math.max(170,Math.floor(r.height));}
function dismissInstructions(){const m=document.getElementById('instruction-modal');if(m)m.remove();}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function loadQuestion(){locked=false;attempts=0;currentQ=questions[qIndex];document.getElementById('q-num').innerText=qIndex+1;document.getElementById('lbl-directive').innerText=currentQ.q;document.getElementById('lbl-feedback').innerText='';document.getElementById('lbl-feedback').style.color='#475569';document.getElementById('btn-dispatch').disabled=false;options=shuffle([{text:currentQ.ans,correct:true},{text:currentQ.w[0],correct:false},{text:currentQ.w[1],correct:false}]);rover={progress:0,moving:false,tumbling:false,timer:0,rot:0,ox:0,oy:0,color:['#0ea5e9','#22c55e','#f59e0b','#8b5cf6'][Math.floor(Math.random()*4)],finalReveal:false};for(let i=0;i<3;i++){document.getElementById('sw-'+i).innerText='Trail '+(i+1)+'\n'+options[i].text;document.getElementById('sw-'+i).classList.remove('correct','wrong');}chooseTrail(0);}
function chooseTrail(i){if(rover.moving||rover.tumbling||locked)return;selected=i;for(let k=0;k<3;k++)document.getElementById('sw-'+k).classList.toggle('active',k===i);}
function launchRover(){if(rover.moving||rover.tumbling||locked)return;document.getElementById('btn-dispatch').disabled=true;rover.moving=true;document.getElementById('lbl-feedback').innerText='Checking trail...';document.getElementById('lbl-feedback').style.color='#0284c7';}
function update(){if(rover.moving){rover.progress+=.016;if(rover.progress>=.88){rover.moving=false;checkAnswer();}}if(rover.tumbling){rover.timer++;rover.rot+=.25;rover.ox+=2;rover.oy=Math.sin(rover.timer*.4)*6;if(rover.timer>=58){rover.tumbling=false;rover.progress=0;rover.rot=0;rover.ox=0;rover.oy=0;rover.timer=0;if(rover.finalReveal){revealCorrectAnswer();}else{document.getElementById('btn-dispatch').disabled=false;document.getElementById('lbl-feedback').innerText='Try again.';document.getElementById('lbl-feedback').style.color='#dc2626';}}}}
function checkAnswer(){
 const fb=document.getElementById('lbl-feedback');
 if(options[selected].correct){
  document.getElementById('s-correct').play().catch(()=>{});
  score++;
  document.getElementById('score').innerText=score;
  document.getElementById('sw-'+selected).classList.add('correct');
  fb.innerText='Correct! '+currentQ.exp;
  fb.style.color='#16a34a';
  confetti();
  locked=true;
  setTimeout(()=>{qIndex++;if(qIndex>=questions.length)finish();else loadQuestion();},1700);
 }else{
  attempts++;
  document.getElementById('s-wrong').play().catch(()=>{});
  document.getElementById('sw-'+selected).classList.add('wrong');
  fb.style.color='#dc2626';
  if(attempts<2){
   fb.innerText='Try again.';
   rover.tumbling=true;
  }else{
   fb.innerText='Second wrong attempt. The triangle topples first.';
   fb.style.color='#dc2626';
   locked=true;
   document.getElementById('btn-dispatch').disabled=true;
   rover.finalReveal=true;
   rover.tumbling=true;
  }
 }
}

function revealCorrectAnswer(){
 const fb=document.getElementById('lbl-feedback');
 const correctIndex=options.findIndex(o=>o.correct);
 document.getElementById('sw-'+correctIndex).classList.add('correct');
 selected=correctIndex;
 for(let k=0;k<3;k++)document.getElementById('sw-'+k).classList.toggle('active',k===correctIndex);
 fb.innerText='Correct Answer: '+options[correctIndex].text+' | '+currentQ.exp;
 fb.style.color='#16a34a';
 setTimeout(()=>{qIndex++;if(qIndex>=questions.length)finish();else loadQuestion();},2800);
}
function bezier(t,p0,p1,p2,p3){let x=(1-t)**3*p0.x+3*(1-t)**2*t*p1.x+3*(1-t)*t*t*p2.x+t**3*p3.x;let y=(1-t)**3*p0.y+3*(1-t)**2*t*p1.y+3*(1-t)*t*t*p2.y+t**3*p3.y;return{x,y};}
function render(){ctx.clearRect(0,0,canvas.width,canvas.height);let w=canvas.width,h=canvas.height;let ys=[h*.24,h*.5,h*.76];ctx.strokeStyle='rgba(14,165,233,.18)';ctx.lineWidth=1;for(let x=0;x<w;x+=34){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}for(let y=0;y<h;y+=34){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}ctx.fillStyle='#e0f2fe';ctx.fillRect(0,h/2-24,55,48);ctx.lineWidth=Math.max(5,w*.018);ctx.lineCap='round';for(let i=0;i<3;i++){ctx.strokeStyle=i===selected?'#0ea5e9':'rgba(148,163,184,.45)';ctx.beginPath();ctx.moveTo(15,h/2);ctx.lineTo(55,h/2);ctx.bezierCurveTo(w*.38,h/2,w*.38,ys[i],w-90,ys[i]);ctx.lineTo(w-8,ys[i]);ctx.stroke();}
for(let i=0;i<3;i++){ctx.fillStyle=i===selected?'#dbeafe':'#ffffff';ctx.strokeStyle=i===selected?'#0284c7':'#bae6fd';ctx.lineWidth=2;roundRect(ctx,w-104,ys[i]-17,96,34,8,true,true);ctx.fillStyle='#1e293b';ctx.font='bold '+Math.max(10,Math.min(13,w*.03))+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';fitText(options[i]?.text||'',w-56,ys[i],86);}
let p=bezier(rover.progress,{x:28,y:h/2},{x:w*.38,y:h/2},{x:w*.38,y:ys[selected]},{x:w-58,y:ys[selected]});ctx.save();ctx.translate(p.x+rover.ox,p.y+rover.oy);ctx.rotate(rover.rot);drawRover();ctx.restore();if(rover.tumbling){ctx.fillStyle='rgba(220,38,38,.25)';ctx.beginPath();ctx.arc(p.x+rover.ox,p.y+rover.oy,26,0,Math.PI*2);ctx.fill();}}
function drawRover(){ctx.fillStyle=rover.color;ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(24,16);ctx.lineTo(-24,16);ctx.closePath();ctx.fill();ctx.strokeStyle='#0f172a';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(0,4,7,0,Math.PI*2);ctx.fill();}
function roundRect(c,x,y,w,h,r,fill,stroke){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();if(fill)c.fill();if(stroke)c.stroke();}
function fitText(text,x,y,max){let size=parseInt(ctx.font.match(/\d+/)[0]);while(ctx.measureText(text).width>max&&size>8){size--;ctx.font='bold '+size+'px sans-serif'}ctx.fillText(text,x,y)}
function loop(){update();render();animationId=requestAnimationFrame(loop)}
function finish(){document.getElementById('s-claps').play().catch(()=>{});document.getElementById('viewport-root').innerHTML='<div class="ins-box" style="margin:auto;text-align:center"><h2 class="ins-title">🏆 Triangle Trail Complete!</h2><p class="ins-text">You completed all 10 Triangles & Properties challenges.<br><b>Final Stars: '+score+'/10</b></p><button class="btn-submit" onclick="location.reload()">Play Again</button></div>';}
function confetti(){for(let i=0;i<16;i++){let p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=['#0ea5e9','#f59e0b','#16a34a','#8b5cf6'][Math.floor(Math.random()*4)];document.body.appendChild(p);setTimeout(()=>p.remove(),1600)}}
</script>
</body>
</html>
